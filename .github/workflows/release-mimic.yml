name: Release Mimic (Electron)

# Builds the Wolf Pack Mimic desktop installer on a real Windows runner and
# attaches the .exe + latest.yml (electron-updater manifest for the stable
# `latest` channel) to a GitHub release. The release tag is auto-derived from
# apps/mimic/package.json's version field.
#
# TAG FORMAT — plain semver `v<version>` (e.g. v1.0.0, v1.1.0, or
# v1.1.0-rc.1 for prereleases). electron-updater on the stable channel picks
# up tags whose semver has no prerelease suffix. Older prerelease lines (e.g.
# the retired v0.x.y-mimic-beta.N) used the `mimic-beta` channel and a
# matching prerelease identifier on the version; that bridge was removed at
# 1.0.0 — beta installs won't auto-update across the channel switch.
#
# TRIGGERS:
#   1. Push to main that changes apps/mimic/package.json AND bumps the
#      version field → workflow runs, builds, and softprops creates a fresh
#      release tagged v<new_version> at the merge commit. Tag, release, and
#      assets all materialize in one pass — no human clicks.
#   2. Manual workflow_dispatch with a tag input — for retrying a failed
#      build, or rebuilding from a tag that was created some other way.
on:
  push:
    branches: [main, beta]
    paths:    ['apps/mimic/package.json']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0, or v1.0.0-beta.1 for prerelease)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Need previous commit so we can diff the package.json version and
          # decide whether this is a real bump vs an unrelated change.
          fetch-depth: 2

      - name: Resolve tag (auto-bump or manual)
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            echo "Manual dispatch: tag=$tag"
            echo "name=$tag"  >> "$GITHUB_OUTPUT"
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Auto-bump path. Compare versions HEAD~1 vs HEAD; only build if
          # the version actually changed (skips dependency-only edits etc).
          new_version=$(jq -r .version apps/mimic/package.json)
          prev_version=$(git show HEAD~1:apps/mimic/package.json 2>/dev/null \
                          | jq -r .version 2>/dev/null || echo "")
          # Plain semver tag (v-prefixed) so electron-updater can parse the
          # prerelease channel. NOT `mimic-v…` — that breaks the updater.
          tag="v$new_version"
          echo "Detected: new=$new_version prev=$prev_version tag=$tag"

          if [ -z "$new_version" ] || [ "$new_version" = "null" ]; then
            echo "No version in package.json — skipping."
            echo "build=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ "$new_version" = "$prev_version" ]; then
            echo "Version unchanged — nothing to release."
            echo "build=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Idempotency: if the tag already exists on the remote, the
          # release was already cut. Don't rebuild on top.
          if git ls-remote --tags origin "refs/tags/$tag" | grep -q "$tag"; then
            echo "Tag $tag already exists on remote — skipping."
            echo "build=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          echo "name=$tag"  >> "$GITHUB_OUTPUT"
          echo "build=true" >> "$GITHUB_OUTPUT"

      # On manual dispatch, pin the built version to the tag (minus the leading
      # `v`). This lets us cut a BETA channel build from a feature branch — a tag
      # like v1.0.20-beta.1 makes electron-builder use channel `beta` + emit
      # beta.yml — without committing a `-beta` suffix into the branch's
      # package.json (which would muddy the eventual merge to main). The
      # auto-bump path (push to main) is untouched and keeps using package.json.
      - name: Pin version to dispatch tag (beta/manual builds)
        if: github.event_name == 'workflow_dispatch' && steps.tag.outputs.build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          v="${{ steps.tag.outputs.name }}"; v="${v#v}"
          tmp=$(mktemp)
          jq --arg v "$v" '.version=$v' apps/mimic/package.json > "$tmp"
          mv "$tmp" apps/mimic/package.json
          echo "Pinned apps/mimic/package.json version → $v"

      - uses: actions/setup-node@v5
        if: steps.tag.outputs.build == 'true'
        with:
          node-version: 20

      - name: Install + stage agent
        if: steps.tag.outputs.build == 'true'
        working-directory: apps/mimic
        run: npm install
        # postinstall (scripts/stage-agent.js) copies the agent into
        # apps/mimic/staged-agent so electron-builder's extraResources bundles it.

      - name: Build Windows installer
        if: steps.tag.outputs.build == 'true'
        working-directory: apps/mimic
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # (SignPath code-signing block removed — the Foundation declined the
      #  certificate request. docs/code-signing.md kept for a future provider.)

      - name: Publish release with installer
        if: steps.tag.outputs.build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name:         ${{ steps.tag.outputs.name }}
          name:             ${{ steps.tag.outputs.name }}
          # Flag the release as prerelease IFF the tag carries a prerelease
          # suffix (e.g. v1.1.0-beta.3). Plain semver (v1.0.0, v1.1.0) ships
          # as stable. Mimic graduated out of beta at 1.0.0; older betas used
          # the v0.x.y-mimic-beta.N channel which no longer auto-updates.
          prerelease:       ${{ contains(steps.tag.outputs.name, '-') }}
          # softprops creates the tag at this commit if it doesn't exist —
          # that's how the auto-bump path materializes the tag without us
          # needing tag-push permissions in the sandbox.
          target_commitish: ${{ github.sha }}
          body: |
            Wolf Pack Mimic — Electron desktop client.
            Bundles its own Node runtime; no separate Node.js install needed.
            Not code-signed — Windows SmartScreen will warn: More info → Run anyway.

            Auto-updates: once installed, future Mimic releases land in place via electron-updater. No re-download.

            > **Upgrading from a pre-1.0.0 beta?** The `mimic-beta` update channel was retired at 1.0.0 — beta installs won't auto-update across the channel switch. Reinstall once from <https://wolfpack.quest/mimic> and you're back on auto-update for everything after.
          files: |
            apps/mimic/dist/Wolf-Pack-Mimic-Setup-*.exe
            apps/mimic/dist/Wolf-Pack-Mimic-*.zip
            apps/mimic/dist/*.yml
            apps/mimic/dist/*.blockmap
