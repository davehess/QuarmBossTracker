<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>buffqueue</title>
<style>
  /* Buff Queue overlay — same data the web /raid page shows in its two-column
     queue (buff queue + debuff/cure queue), pinned in-game so a buffer can
     work the list without alt-tabbing. Polls localhost:<port>/api/buff-queue
     which the agent proxies from the bot with a 3s TTL. */
  /* --bg-alpha: card-surface alpha, driven by slider via main → preload
     'bg-alpha' IPC. 1.0 = opaque (EQ hidden); text stays bright at every value. */
  :root{ --bg-alpha:0.55; }
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;
    font-family:ui-monospace,Menlo,Consolas,monospace;color:#fff;user-select:none;}
  /* Long queues: the window height clamps to the work area (auto-height),
     so anything beyond scrolls inside the overlay instead of clipping.
     Thin scrollbar so it doesn't read as a browser widget. */
  #wrap{padding:6px 8px;max-height:100vh;overflow-y:auto;overflow-x:hidden;}
  #wrap::-webkit-scrollbar{width:6px}
  #wrap::-webkit-scrollbar-thumb{background:rgba(110,118,129,0.5);border-radius:3px}
  .title{display:flex;align-items:center;gap:6px;
    font-size:12px;color:#79c0ff;text-shadow:0 1px 2px #000;margin-bottom:5px;}
  .title .conn{font-size:11px}
  .conn.ok{color:#56d364} .conn.bad{color:#8b949e}
  /* margin-right reserves a gutter so the class picker doesn't sit UNDER the
     ✕ hide button (top:6/right:6, 18px wide) — selecting a class from the
     dropdown lands the cursor right next to ✕, and one stray click hides
     the whole overlay. 30px = X width + breathing room. */
  .clsPick{margin-left:auto;margin-right:30px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;
    border-radius:3px;font-size:10px;padding:1px 4px;font-family:inherit;cursor:pointer;}
  .clsPick:focus{outline:1px solid #58a6ff}
  /* Two stacked sections — buff queue on top, debuff queue below. Each section
     has its own header chip and row list. */
  .sec{margin-bottom:6px}
  .sec .hdr{font-size:9px;color:#8b949e;letter-spacing:0.06em;text-transform:uppercase;
    margin-bottom:2px;display:flex;align-items:baseline;gap:5px}
  .sec.buffs .hdr .lab{color:#7ee787}
  .sec.debuffs .hdr .lab{color:#f87171}
  .sec.burst .hdr .lab{color:#f0b429}
  /* Burst queue (Feral Avatar / Savagery) — amber/gold border on each row so
     it reads as "the burst-buff target list" without colliding with buff
     severity tiers. */
  .row.burst{border-left-color:#f0b429;background:rgb(40 28 8 / var(--bg-alpha))}
  .row.burst .miss{color:#fde68a;font-variant-numeric:tabular-nums}
  .sec .hdr .ct{color:#6e7681;font-variant-numeric:tabular-nums}
  .sec .hdr .hint{color:#6e7681;font-size:9px;text-transform:none;letter-spacing:0;font-style:italic}
  .row{position:relative;display:flex;align-items:baseline;gap:5px;padding:2px 5px;
    background:rgb(8 5 16 / var(--bg-alpha));border-radius:3px;border-left:3px solid #58a6ff;
    text-shadow:0 1px 2px #000;font-size:10px;margin-bottom:2px}
  .row.r{border-left-color:#f85149}
  .row.o{border-left-color:#f0883e}
  .row.y{border-left-color:#d4a72c}
  .row.d{border-left-color:#f87171;background:rgb(40 12 12 / var(--bg-alpha))}
  .row .nm{color:#e6edf3;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
  .row .grp{color:#6e7681;font-variant-numeric:tabular-nums}
  .row .cls{color:#9aa4ad;font-size:9px}
  /* State chips that ride between class and the right column — inferred,
     Avatar active, Celestial Tranquility, SK T. of Hate Recourse. Compact;
     tooltip carries the detail. */
  .row .chip{display:inline-flex;align-items:center;justify-content:center;
    height:14px;min-width:14px;padding:0 3px;border-radius:3px;font-size:10px;
    line-height:1;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#c9d1d9;cursor:help}
  .row .chip.inferred{background:rgba(88,166,255,0.15);border-color:rgba(88,166,255,0.4);color:#79c0ff}
  .row .chip.avatar  {background:rgba(240,180,41,0.18);border-color:rgba(240,180,41,0.5);color:#f0b429}
  .row .chip.ct      {background:rgba(126,231,135,0.15);border-color:rgba(126,231,135,0.4);color:#7ee787}
  .row .chip.rec     {background:rgba(248,113,113,0.18);border-color:rgba(248,113,113,0.5);color:#fca5a5}
  /* "✓ cured" — manual raid-wide clear for INFERRED debuff chips (neither
     party on Mimic → nothing can observe the cure; the button is the human
     fallback). Subtle until hover so the chip stays readable. */
  .ch .chClear{background:none;border:1px solid rgba(126,231,135,0.4);color:#7ee787;
    border-radius:3px;font-size:9px;line-height:1;padding:0 3px;margin-left:3px;
    cursor:pointer;opacity:0.55;vertical-align:middle}
  .ch .chClear:hover{opacity:1;background:rgba(126,231,135,0.18)}
  /* Inferred rows dim slightly to differentiate from authoritative Mimic data. */
  /* Inferred rows scale to ~73% of the main surface alpha so they read as faded. */
  .row.inferred{background:rgb(8 5 16 / calc(var(--bg-alpha) * 0.73))}
  .row.inferred .nm{color:#c9d1d9}
  .row .miss{margin-left:auto;color:#c9d1d9;font-size:9px;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;max-width:160px;text-align:right}
  .row.r .miss{color:#fca5a5}
  .row.o .miss{color:#fed7aa}
  .row.y .miss{color:#fde68a}
  /* Curse chip on debuff rows — name + remaining time. Red border so it reads
     as "needs cure". */
  .row .curse{margin-left:auto;display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end;max-width:170px}
  .row .curse .ch{padding:0 4px;border-radius:3px;border:1px solid rgba(248,113,113,0.45);
    background:rgba(248,113,113,0.15);color:#fca5a5;font-size:9px;line-height:1.4}
  .row .curse .ch .t{color:#fed7aa;font-variant-numeric:tabular-nums;margin-left:3px}
  /* "Carol casting Aego 2s" inline — sits underneath the row when a buffer is
     in-flight on that target, so a second cleric sees the queue is already
     covered and skips it. */
  .casting{font-size:9px;color:#79c0ff;padding:0 5px 1px;line-height:1.3;
    display:flex;flex-wrap:wrap;gap:4px;align-items:baseline}
  .casting .who{color:#79c0ff;font-weight:600}
  .casting .sp{color:#c9d1d9}
  .casting .t{color:#6e7681;font-variant-numeric:tabular-nums}
  #empty{color:rgba(255,255,255,0.5);font-size:11px;text-shadow:0 1px 2px #000;padding:6px 4px;font-style:italic}
  /* drag/lock/setup chrome — same pattern as the other overlays. */
  #drag-controls{display:none;position:fixed;top:4px;left:4px;gap:4px;z-index:60}
  body.unlocked #drag-controls{display:flex}
  body.unlocked{outline:2px solid rgba(88,166,255,0.7);outline-offset:-2px}
  .drag-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    background:rgba(88,166,255,0.92);color:#fff;border:1px solid rgba(255,255,255,0.4);
    border-radius:4px;font-size:13px;line-height:1;cursor:move;user-select:none}
  #lock-btn{cursor:pointer;font-size:11px}
  #setupbar{display:none;position:fixed;top:0;left:0;right:0;align-items:center;gap:8px;
    padding:4px 8px;background:rgba(88,166,255,0.92);color:#fff;font-size:10px;font-weight:600;z-index:50}
  body.setup #setupbar{display:flex}
  body.setup #drag-controls{top:28px}
  body.setup #wrap{margin-top:26px}
  #setupbar input[type=range]{flex:1;cursor:pointer}
  #hide-btn{position:fixed;top:6px;right:6px;z-index:65;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;border-radius:4px;
    background:rgba(14,17,22,0.6);color:#8b949e;border:1px solid rgba(110,118,129,0.3);
    font-size:11px;line-height:1;cursor:pointer;opacity:0.45;transition:opacity .12s}
  #hide-btn:hover{opacity:1;color:#f87171;border-color:#f87171}
  body.setup #hide-btn{top:30px}
  #move-btn{position:fixed;top:6px;left:6px;z-index:65;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;border-radius:4px;
    background:rgba(14,17,22,0.6);color:#8b949e;border:1px solid rgba(110,118,129,0.3);
    font-size:11px;line-height:1;cursor:move;opacity:0.45;transition:opacity .12s}
  #move-btn:hover{opacity:1;color:#58a6ff;border-color:#58a6ff}
  body.setup #move-btn{top:30px}
  /* "Buffs feel laggy" reporter — sits inside the title bar. Quiet by default
     so it doesn't compete with the live queue; pulses green for 60s after a
     click to confirm snappy mode kicked in. */
  #lag-btn{font-size:9px;line-height:1;padding:2px 5px;border-radius:3px;
    background:rgba(14,17,22,0.6);color:#8b949e;border:1px solid rgba(110,118,129,0.4);
    cursor:pointer;opacity:0.6;transition:opacity .12s,color .12s,border-color .12s;
    white-space:nowrap}
  #lag-btn:hover{opacity:1;color:#fde68a;border-color:#fde68a}
  #lag-btn.active{opacity:1;color:#86efac;border-color:#86efac;
    background:rgba(34,197,94,0.12)}
</style></head>
<body>
  <button id="move-btn" title="Drag from this icon to move the overlay">✥</button>
  <button id="hide-btn" title="Hide the buff queue (turn back on from the tray → Overlays)">✕</button>
  <div id="drag-controls">
    <div id="move-handle" class="drag-btn" title="Drag to move">✥</div>
    <div id="lock-btn"   class="drag-btn" title="Lock in place">🔒</div>
  </div>
  <div id="setupbar">
    <span>🛠 Buff queue</span>
    <span>opacity</span><input id="opacitySlider" type="range" min="0.15" max="1" step="0.05" value="1" /><span id="opacityVal">100%</span>
    <button id="exitSetupBtn">Done</button>
  </div>
  <div id="wrap">
    <div class="title">
      <span id="conn" class="conn bad">○</span>
      <span>🛡 Buff queue</span>
      <select id="clsPick" class="clsPick" title="The class you're buffing as. Filters the buff list to gaps you can fill.">
        <option value="">(any class)</option>
        <option>Cleric</option><option>Druid</option><option>Shaman</option>
        <option>Enchanter</option><option>Bard</option><option>Paladin</option>
        <option>Ranger</option><option>Beastlord</option><option>Magician</option>
      </select>
      <button id="lag-btn" style="margin-right:30px" title="Buff queue feeling stale? Click to log it AND switch to fast refresh for 60s.">lag?</button>
    </div>
    <div id="body"></div>
    <div id="empty">no raid roster yet — start any Mimic in raid and the queue fills in within seconds</div>
  </div>
<script>
  let PORT = 7779;
  window.mimic && window.mimic.onAgentPort && window.mimic.onAgentPort(p => { PORT = p; });
  window.mimic && window.mimic.getAgentPort && window.mimic.getAgentPort().then(p => { if (p) PORT = p; });

  if (window.mimic && window.mimic.onOverlayLocked) {
    window.mimic.onOverlayLocked(locked => { document.body.classList.toggle('unlocked', !locked); });
  }
  var lockBtn = document.getElementById('lock-btn');
  if (lockBtn) lockBtn.addEventListener('click', function(){ try { window.mimic.setOverlaysLocked(true); } catch (e) {} });

  var hideBtn = document.getElementById('hide-btn');
  if (hideBtn) {
    // Stray-click guard — the class dropdown's native popup dismisses with a
    // click that frequently lands on ✕ ("buff queue keeps disappearing even
    // though I have it enabled"). A deliberate hide hovers the button first;
    // a drive-by click arrives with ~0ms of hover. Require 250ms on-button
    // before the click counts; a blocked click flashes the ✕ as the cue.
    var _hideHoverAt = 0;
    hideBtn.addEventListener('mouseenter', function(){ _hideHoverAt = Date.now(); try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    hideBtn.addEventListener('mouseleave', function(){ _hideHoverAt = 0; try { window.mimic.overlayHoverInteractive(false); } catch (e) {} });
    hideBtn.addEventListener('click', function(){
      if (!_hideHoverAt || (Date.now() - _hideHoverAt) < 250) {
        hideBtn.style.opacity = '1'; hideBtn.style.borderColor = '#f87171'; hideBtn.style.color = '#f87171';
        setTimeout(function(){ hideBtn.style.opacity = ''; hideBtn.style.borderColor = ''; hideBtn.style.color = ''; }, 600);
        return;
      }
      try { window.mimic.hideThisOverlay(); } catch (e) {}
    });
  }

  // Manual drag — same workaround as the other overlays.
  var moveHandle = document.getElementById('move-handle');
  var moveBtn    = document.getElementById('move-btn');
  var _dragging = false;
  function _beginDrag(e){
    if (e.button !== 0) return; e.preventDefault(); _dragging = true;
    try { window.mimic.overlayDragStart(); } catch (err) {}
  }
  if (moveHandle) moveHandle.addEventListener('mousedown', _beginDrag);
  if (moveBtn) {
    moveBtn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    moveBtn.addEventListener('mouseleave', function(){ if (!_dragging) { try { window.mimic.overlayHoverInteractive(false); } catch (e) {} } });
    moveBtn.addEventListener('mousedown', _beginDrag);
    // Right-click ✥ → shared chrome menu (resize presets + Setup THIS/ALL).
    try { window.mimic.attachOverlayMenu(moveBtn); } catch (e) {}
  }
  document.addEventListener('mouseup', function(){ if (_dragging){ _dragging=false; try{window.mimic.overlayDragEnd();}catch(e){} try{window.mimic.overlayHoverInteractive(false);}catch(e){} } });
  window.addEventListener('blur', function(){ if (_dragging){ _dragging=false; try{window.mimic.overlayDragEnd();}catch(e){} } });

  // Setup mode + opacity slider. _setupScope tracks 'this' (right-click → Setup
  // THIS overlay) vs 'all' (tray → Setup mode — place all overlays) so the Done
  // button routes to the right IPC; without scope tracking, Done is a no-op in
  // single-overlay mode because it calls setSetupMode(false) which exits the
  // GLOBAL flag — never set in single-overlay mode.
  var _overlayKey = null;
  var _setupScope = null;
  if (window.mimic && window.mimic.onSetupMode) {
    window.mimic.onSetupMode(function(p){
      _overlayKey = p && p.overlayKey;
      if (p && p.scope) _setupScope = p.scope;
      else if (p && p.active) _setupScope = 'all';
      document.body.classList.toggle('setup', !!(p && p.active));
    });
  }
  if (window.mimic && window.mimic.onBgAlpha) {
    window.mimic.onBgAlpha(function(v){
      var a = (typeof v === 'number' && v >= 0.15 && v <= 1.0) ? v : 0.55;
      try { document.documentElement.style.setProperty('--bg-alpha', String(a)); } catch (e) {}
    });
  }
  var slider = document.getElementById('opacitySlider'); var oVal = document.getElementById('opacityVal');
  if (slider) slider.addEventListener('input', function(){
    var v = parseFloat(slider.value || '1'); if (oVal) oVal.textContent = Math.round(v*100)+'%';
    if (_overlayKey && window.mimic && window.mimic.setOverlayOpacity) { try { window.mimic.setOverlayOpacity(_overlayKey, v); } catch (e) {} }
  });
  var doneBtn = document.getElementById('exitSetupBtn');
  if (doneBtn) doneBtn.addEventListener("click", function(){ try { document.body.classList.remove("setup"); } catch (e) {} try { if (_setupScope === "this") window.mimic.setSetupModeThis(false); else window.mimic.setSetupMode(false); } catch (e) {} _setupScope = null; });

  // Buffer class — persists per-overlay in localStorage so a relog comes back to
  // the same setting. The agent uses this to filter the buff queue.
  var clsPick = document.getElementById('clsPick');
  var bufferClass = '';
  try { bufferClass = localStorage.getItem('wp:bufferClass') || ''; } catch (e) {}
  if (clsPick) { clsPick.value = bufferClass; }
  // Hover-interact handshake — when LOCKED, mouse events normally pass through
  // to EQ. Flip interactive while the cursor is over the picker so the click
  // lands. Same pattern Mob Info's tabs use.
  if (clsPick) {
    clsPick.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    clsPick.addEventListener('mouseleave', function(){ try { window.mimic.overlayHoverInteractive(false); } catch (e) {} });
    clsPick.addEventListener('change', function(){
      bufferClass = clsPick.value || '';
      try { localStorage.setItem('wp:bufferClass', bufferClass); } catch (e) {}
      tick();    // refresh immediately so the user sees the new queue
    });
  }

  // "Buffs feel laggy" button. POST to local agent → drops the agent's
  // BUFF_QUEUE_TTL into 500ms-snappy mode for 60s AND forwards the click to
  // the bot for audit. The overlay's own 1.5s tick is unchanged — the cache
  // dropping is what makes ticks fetch fresh data.
  // Delegated "✓ cured" handling — the rows container is rebuilt every poll,
  // so bind ONCE on #body. mouseover/out delegation keeps the click-through
  // handshake honest for buttons that didn't exist at bind time.
  (function(){
    var bodyEl = document.getElementById('body');
    if (!bodyEl) return;
    bodyEl.addEventListener('mouseover', function(e){
      if (e.target && e.target.classList && e.target.classList.contains('chClear')) {
        try { window.mimic.overlayHoverInteractive(true); } catch (er) {}
      }
    });
    bodyEl.addEventListener('mouseout', function(e){
      if (e.target && e.target.classList && e.target.classList.contains('chClear')) {
        try { window.mimic.overlayHoverInteractive(false); } catch (er) {}
      }
    });
    bodyEl.addEventListener('click', function(e){
      var btn = e.target && e.target.closest ? e.target.closest('.chClear') : null;
      if (!btn) return;
      e.preventDefault(); e.stopPropagation();
      var target = btn.getAttribute('data-target');
      var spell  = btn.getAttribute('data-spell');
      if (!target || !spell) return;
      // Optimistic: strike the chip immediately; the bot-side mark makes it
      // stick raid-wide on the next queue refresh.
      var chip = btn.closest('.ch');
      if (chip) { chip.style.opacity = '0.35'; chip.style.textDecoration = 'line-through'; }
      btn.disabled = true;
      fetch('http://127.0.0.1:'+PORT+'/api/debuff-clear', {
        method: 'POST', cache: 'no-store',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target: target, spell_name: spell }),
      }).catch(function(){});
    });
  })();

  var lagBtn = document.getElementById('lag-btn');
  if (lagBtn) {
    lagBtn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    lagBtn.addEventListener('mouseleave', function(){ try { window.mimic.overlayHoverInteractive(false); } catch (e) {} });
    var _lagActiveUntil = 0;
    lagBtn.addEventListener('click', function(){
      try {
        fetch('http://127.0.0.1:'+PORT+'/api/buff-lag-report', { method: 'POST', cache: 'no-store' })
          .catch(function(){});
      } catch (e) {}
      _lagActiveUntil = Date.now() + 60000;
      lagBtn.classList.add('active');
      lagBtn.textContent = 'fast 60s';
      tick();  // immediate fetch — don't make the user wait 1.5s for proof it worked
    });
    setInterval(function(){
      if (_lagActiveUntil && Date.now() > _lagActiveUntil) {
        _lagActiveUntil = 0;
        lagBtn.classList.remove('active');
        lagBtn.textContent = 'lag?';
      }
    }, 1000);
  }

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]); }); }
  function fmtSecs(s){
    if (s == null || s < 0) return '?';
    if (s < 60) return Math.round(s) + 's';
    var m = Math.floor(s/60), r = Math.round(s%60);
    if (m < 60) return r ? m+'m'+r+'s' : m+'m';
    var h = Math.floor(m/60); m = m % 60;
    return m ? h+'h'+m+'m' : h+'h';
  }
  function tierClass(t){
    if (t === 'red')    return 'r';
    if (t === 'orange') return 'o';
    if (t === 'yellow') return 'y';
    return '';
  }
  // Casting tagline: "Carol · Aegolism · 2s" — uses ends_at_ms when present so
  // the countdown stays accurate without a re-fetch every second.
  function castingRow(casting){
    if (!casting || !casting.length) return '';
    var now = Date.now();
    var bits = [];
    for (var i = 0; i < casting.length; i++) {
      var c = casting[i]; if (!c || !c.caster || !c.spell) continue;
      var rem = (c.ends_at_ms != null) ? Math.max(0, (c.ends_at_ms - now) / 1000)
              : (c.remaining_secs != null ? c.remaining_secs : 0);
      bits.push('<span><span class="who">'+esc(c.caster)+'</span> <span class="sp">→ '+esc(c.spell)+'</span> <span class="t">'+fmtSecs(rem)+'</span></span>');
    }
    if (!bits.length) return '';
    return '<div class="casting"><span style="color:#6e7681">🔮</span>'+bits.join(' · ')+'</div>';
  }
  // Buff-state chips that ride on every row — gives the buffer info that
  // changes how they target:
  //   🔍 inferred   — buff state came from observed casts, not Zeal (no Mimic).
  //   🪶 Avatar     — already has Feral/Primal/proc Avatar (worn-atk hint).
  //   🦅 CT         — has Celestial Tranquility (+40 ATK; stacks with Avatar).
  //   ⚠ T.of Hate  — SK carrying T. of Hate Recourse (Savagery overwrites it).
  function stateChips(r){
    var bits = '';
    if (r.inferred)               bits += '<span class="chip inferred" title="Buffs inferred from observed casts — this raider isn\'t running Mimic">🔍</span>';
    if (r.avatar_buff)            bits += '<span class="chip avatar" title="'+esc(r.avatar_buff)+' is active">🪶</span>';
    if (r.celestial_tranquility)  bits += '<span class="chip ct" title="Celestial Tranquility (+40 ATK) is active — stacks with Avatar (not overwritten)">🦅</span>';
    if (r.sk_recourse)            bits += '<span class="chip rec" title="'+esc(r.sk_recourse)+' active — Savagery will overwrite">⚠</span>';
    if (r.skip_group_aego)        bits += '<span class="chip ct" title="'+esc(r.hp_a || 'POTG/POTC')+' fills HP slot A — single-target the Symbol, do NOT group-cast Aegolism over it">🌿</span>';
    return bits;
  }

  // Category → "spells you might have memmed" hint. recent_casts comes from
  // the agent's per-character rotation tracker; a spell cast this session is
  // almost certainly still on a gem. SLOT-AWARE — HP A only matches slot A
  // spells (Aego line + group HP+AC), HP B only matches the Symbol line,
  // HP C only matches the Shaman HP single-target line + Brell + Arch
  // Shielding. Without this, casting Symbol of Transal once made the queue
  // suggest it for HP A forever even after the user re-memmed Aegolism.
  // Specific labels (HP A/B/C) checked before the generic /^HP/ fallback.
  var CAT_HINTS = [
    [/^HP A$/, /aegolism|blessing of aegolism|ancient: gift of aegolism|temperance|protection of the (glades|cabbage)|talisman of wunshi|courage|center|daring|bravery|valor|resolution|heroism|heroic bond|fortitude|virtue|conviction/i],
    [/^HP B$/, /aegolism|blessing of aegolism|ancient: gift of aegolism|symbol of/i],
    [/^HP C$/, /khura|focus of spirit|talisman of (kragg|tnarg)|inner fire|brell|arch shielding/i],
    [/^HP$/,   /aegolism|temperance|symbol of|khura|focus of spirit|talisman of (kragg|tnarg|wunshi)|inner fire|protection of the (glades|cabbage)|brell|arch shielding|virtue|conviction|courage|daring|bravery|valor|resolution|heroism|heroic bond|fortitude/i],
    [/^HP Regen$/,      /regrowth|regenerat|chloroplast|replenish|elixir/i],
    [/^Mana$/,          /brilliance|iridescence/i],
    [/^Mana Regen$/,    /clarity|koadic|breeze|gift of (pure thought|insight)|clairvoyance/i],
    [/^Haste$/,         /haste|celerity|quickness|swift|alacrity|aanya|visions of grandeur|speed of/i],
    [/^Run Speed$/,     /spirit of (the )?wolf|flight of eagle|pack spirit|bihli/i],
    [/^Attack$/,        /avatar|ferocity|strength|might of|predator|bihli/i],
    [/^Dmg Shield$/,    /thorn|thistle|shield of|bramblecoat|legacy of/i],
    [/^Survival$/,      /divine aura|kazumi|bestowal of divinity|quivering veil/i],
    [/^Levitate$/,      /levitat|dead m[ae]n floating/i],
    [/^Resists$/,       /resist|endure|talisman of (epuration|jasinth|shadoo)|circle of seasons/i],
  ];
  function memmedHint(label, recentCasts){
    if (!recentCasts || !recentCasts.length) return null;
    for (var i = 0; i < CAT_HINTS.length; i++) {
      if (!CAT_HINTS[i][0].test(label)) continue;
      for (var j = 0; j < recentCasts.length; j++) {
        if (CAT_HINTS[i][1].test(recentCasts[j])) return recentCasts[j];
      }
    }
    return null;
  }

  // Collapsed category sections persist across polls + relaunches.
  var _collapsed = {};
  try { _collapsed = JSON.parse(localStorage.getItem('wp:bq:collapsed') || '{}') || {}; } catch (e) {}
  function _saveCollapsed(){ try { localStorage.setItem('wp:bq:collapsed', JSON.stringify(_collapsed)); } catch (e) {} }

  function renderRow(r, kind){
    var groupLbl = r.group != null ? ('G' + r.group) : '';
    var cls = kind === 'd' ? 'd' : kind === 'burst' ? 'burst' : tierClass(r.tier);
    if (r.inferred) cls += ' inferred';
    var line = '<div class="row '+cls+'">'
             +    '<span class="nm">'+esc(r.name)+'</span>'
             +    (groupLbl ? '<span class="grp">'+esc(groupLbl)+'</span>' : '')
             +    '<span class="cls">'+esc(r.class || '?')+'</span>'
             +    stateChips(r);
    if (kind === 'd') {
      var chips = '';
      for (var i = 0; i < r.curses.length; i++) {
        var c = r.curses[i];
        var t = (c.remaining_secs != null) ? '<span class="t">'+fmtSecs(c.remaining_secs)+'</span>' : '';
        // Zeal buff-window slot — slots 1-4 highlight green: a group member
        // can dispel without clipping many real buffs (matters most on
        // high-damage debuffs).
        var sl = '';
        if (c.slot != null) {
          sl = c.low_slot
            ? ' <span style="color:#7ee787" title="Buff slot '+c.slot+' — low slot; dispellable without clipping much">s'+c.slot+'✂</span>'
            : ' <span style="color:#8b949e" title="Buff slot '+c.slot+'">s'+c.slot+'</span>';
        }
        // Cure type from the catalog counters (bot v3.0.88+): tells the cure
        // caster WHICH cure to reach for. Counters ride in the tooltip.
        var cu = '';
        if (c.cure) {
          var cuCol = c.cure === 'poison' ? '#56d364' : c.cure === 'disease' ? '#d4a72c' : c.cure === 'blind' ? '#8b949e' : '#f0883e';
          cu = ' <span style="color:'+cuCol+'" title="Cure type: '+esc(c.cure)+(c.counters ? ' — '+c.counters+' counters' : '')+'">'+esc(c.cure)+'</span>';
        }
        // Being cured (bot v3.0.90+): a matching cure is in flight on this
        // target — show who + secs and dim/strike the chip so a second curer
        // skips it. The chip vanishes on its own the moment the cure lands.
        var cured = '';
        var chipStyle = '';
        if (c.being_cured) {
          chipStyle = 'opacity:0.5;text-decoration:line-through';
          cured = ' <span style="color:#7ee787;text-decoration:none" title="'+esc(c.cured_by||'someone')+' is curing this — skip it">✓ '+esc(c.cured_by||'curing')+(c.cure_secs ? ' '+c.cure_secs+'s' : '')+'</span>';
        }
        // Manual clear — only meaningful on 🔍 inferred rows (a Mimic-verified
        // player's own Zeal list governs; the bot ignores marks for them).
        var clearBtn = '';
        if (r.inferred && !c.being_cured) {
          clearBtn = '<button class="chClear" data-target="'+esc(r.name)+'" data-spell="'+esc(c.name)+'"'
                   + ' title="Mark cured — clears this chip from the WHOLE raid\'s queues (shown because '+esc(r.name)+' isn\'t on Mimic, so no agent can see the cure land). Comes back automatically if it lands again.">✓</button>';
        }
        chips += '<span class="ch" style="'+chipStyle+'">'+esc(c.name)+t+cu+sl+cured+clearBtn+'</span>';
      }
      line += '<span class="curse">'+chips+'</span>';
    } else if (kind === 'burst') {
      var dmg = (r.damage || 0);
      var dmgTxt = dmg >= 1e6 ? (dmg/1e6).toFixed(1)+'M'
                : dmg >= 1e3 ? (dmg/1e3).toFixed(0)+'k'
                : dmg > 0    ? String(dmg)
                :             'no data';
      line += '<span class="miss">'+esc(dmgTxt)+'</span>';
    } else {
      line += '<span class="miss">'+esc((r.missing || []).join(' · '))+'</span>';
    }
    line += '</div>';
    line += castingRow(r.casting);
    return line;
  }
  function render(payload){
    var bq = (payload && payload.buff_queue) || [];
    var dq = (payload && payload.debuff_queue) || [];
    // Shaman → feral_queue, Beastlord → savagery_queue. burst_label drives the
    // section header so the bot can pick the right ability name.
    var burst = (payload && (payload.feral_queue || payload.savagery_queue)) || [];
    var burstLabel = (payload && payload.burst_label) || null;
    // group_mode = no active raid roster → caption switches from "raid" to
    // "group" and the empty-state hint changes.
    var groupMode = !!(payload && payload.group_mode);
    var body = document.getElementById('body');
    var empty = document.getElementById('empty');
    if (bq.length === 0 && dq.length === 0 && burst.length === 0) {
      body.innerHTML = '';
      empty.style.display = '';
      var noun = groupMode ? 'group' : 'raid';
      empty.textContent = bufferClass
        ? ('no gaps a '+bufferClass+' can fix right now — every '+(groupMode ? 'tracked groupmate' : 'Mimic-running raider')+' is covered')
        : ('no '+noun+' roster yet — start any Mimic in '+noun+' and the queue fills in within seconds');
      return;
    }
    empty.style.display = 'none';
    var html = '';
    // Debuff / cure queue FIRST (per user) — cures are time-critical and the
    // bot already orders them curse → blind → poison → disease.
    if (dq.length) {
      html += '<div class="sec debuffs"><div class="hdr"><span class="lab">🩸 Debuff queue</span><span class="ct">'+dq.length+'</span><span class="hint">cures needed · curse → blind → poison → disease</span></div>';
      for (var di = 0; di < dq.length; di++) html += renderRow(dq[di], 'd');
      html += '</div>';
    }
    if (bq.length) {
      var hint = bufferClass ? ('severity-first · gaps a '+esc(bufferClass)+' can fix') : 'pick a class to filter';
      html += '<div class="sec buffs"><div class="hdr"><span class="lab">🛡 Buff queue</span><span class="ct">'+bq.length+'</span><span class="hint">'+hint+'</span></div>';
      // Group by buff line: a raider missing two categories appears under
      // both, so the buffer can work one spell line top to bottom. Each
      // section collapses (▸/▾ persists) and shows a 🔮 hint when a spell
      // matching the line was cast this session (likely still memmed).
      var recent = (payload && payload.recent_casts) || [];
      var byCat = {};
      var catOrder = [];
      for (var i = 0; i < bq.length; i++) {
        var labels = (bq[i].missing && bq[i].missing.length) ? bq[i].missing : ['Other'];
        for (var j = 0; j < labels.length; j++) {
          var L = labels[j];
          if (!byCat[L]) { byCat[L] = []; catOrder.push(L); }
          byCat[L].push(bq[i]);
        }
      }
      for (var ci = 0; ci < catOrder.length; ci++) {
        var label = catOrder[ci];
        var rowsC = byCat[label];
        var isCollapsed = !!_collapsed[label];
        var mem = memmedHint(label, recent);
        html += '<div class="cat">'
              +   '<div class="cathdr" data-cat="'+esc(label)+'" style="display:flex;align-items:baseline;gap:5px;cursor:pointer;padding:2px 4px;font-size:10px;color:#79c0ff;background:rgba(88,166,255,0.07);border-radius:3px;margin:3px 0 2px">'
              +     '<span style="font-size:9px">'+(isCollapsed ? '▸' : '▾')+'</span>'
              +     '<span style="font-weight:600">'+esc(label)+'</span>'
              +     '<span style="color:#6e7681;font-variant-numeric:tabular-nums">'+rowsC.length+'</span>'
              +     (mem ? '<span style="margin-left:auto;color:#7ee787;font-size:9px" title="You cast '+esc(mem)+' this session — likely still on a gem">🔮 '+esc(mem)+'</span>' : '')
              +   '</div>';
        if (!isCollapsed) {
          for (var ri = 0; ri < rowsC.length; ri++) html += renderRow(rowsC[ri], 'b');
        }
        html += '</div>';
      }
      html += '</div>';
    }
    if (burst.length && burstLabel) {
      html += '<div class="sec burst"><div class="hdr"><span class="lab">⚡ '+esc(burstLabel)+' queue</span><span class="ct">'+burst.length+'</span><span class="hint">damage descending · tonight\'s session</span></div>';
      for (var i = 0; i < burst.length; i++) html += renderRow(burst[i], 'burst');
      html += '</div>';
    }
    // Byte-stability guard (2026-07-07 review): identical HTML -> skip the
    // innerHTML re-layout and the auto-fit (window height only changes when
    // the content does). Delegated listeners on #body survive either way.
    if (body.__wpHtml !== html) {
      body.innerHTML = html;
      body.__wpHtml = html;
      try { window.mimic && window.mimic.autoFitOverlay && window.mimic.autoFitOverlay(document.getElementById('wrap')); } catch (e) {}
    }
  }
  // Collapse/expand a category section. Delegated once (render replaces the
  // body's innerHTML every poll); re-renders from the last payload so the
  // toggle is instant instead of waiting for the next tick.
  var _lastPayload = null;
  document.getElementById('body').addEventListener('click', function(ev){
    var hdr = ev.target && ev.target.closest ? ev.target.closest('.cathdr') : null;
    if (!hdr) return;
    var label = hdr.getAttribute('data-cat');
    if (!label) return;
    _collapsed[label] = !_collapsed[label];
    _saveCollapsed();
    if (_lastPayload) render(_lastPayload);
  });

  async function tick(){
    try {
      var qs = bufferClass ? '?class=' + encodeURIComponent(bufferClass) : '';
      var r = await fetch('http://127.0.0.1:'+PORT+'/api/buff-queue'+qs, { cache: 'no-store' });
      var s = await r.json();
      document.getElementById('conn').className = 'conn ok';
      document.getElementById('conn').textContent = '●';
      _lastPayload = s;
      render(s);
    } catch (e) {
      var c = document.getElementById('conn'); c.className = 'conn bad'; c.textContent = '○';
    }
  }
  tick(); setInterval(tick, 1500);
</script>
</body>
</html>
