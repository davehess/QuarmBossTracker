<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>charm</title>
<style>
  /* Charm tracker overlay — transparent, always-on-top. Shows each active
     charmed pet with: the 6s MOB-TICK countdown (each tick is a break-risk
     moment), ticks survived, elapsed charm time, and — for timed (non-Dire)
     charm — an optional user-set "recharm warn" countdown. Speaks "recharm
     pet" the instant a charm BREAKS (reliable safety net) and at the user's
     warn threshold (proactive). */
  /* --bg-alpha: card-surface alpha, driven by slider via main → preload
     'bg-alpha' IPC. 1.0 = opaque (EQ hidden); text stays bright at every value. */
  :root{ --bg-alpha:0.55; }
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;
    font-family:ui-monospace,Menlo,Consolas,monospace;color:#fff;user-select:none;}
  #wrap{padding:6px 8px;}
  .title{display:flex;align-items:center;gap:8px;
    font-size:12px;color:#c9a0ff;text-shadow:0 1px 2px #000;margin-bottom:4px;}
  .conn{font-size:11px}
  .conn.ok{color:#56d364} .conn.bad{color:#8b949e}
  .charm{position:relative;padding:5px 8px;margin-bottom:5px;background:rgb(0 0 0 / var(--bg-alpha));
    border-radius:5px;border-left:3px solid #a371f7;text-shadow:0 1px 2px #000;}
  /* ✕ dismiss — top-right of each card, dim by default, light up on hover.
     Click drops the entry from the agent's tracker. Pointer-events: auto on
     a transparent overlay so the click lands when the overlay is locked. */
  .charm .dismiss{position:absolute;top:3px;right:4px;width:14px;height:14px;display:flex;
    align-items:center;justify-content:center;background:rgba(14,17,22,0.4);color:#6e7681;
    border:1px solid rgba(110,118,129,0.25);border-radius:3px;font-size:10px;line-height:1;
    cursor:pointer;padding:0;opacity:0.35;transition:opacity .12s;font-family:inherit}
  .charm .dismiss:hover{opacity:1;color:#f87171;border-color:#f87171;background:rgba(40,10,10,0.7)}
  .charm.dire{border-left-color:#56d364}
  .charm.warn{border-left-color:#f0883e;animation:pulse 0.8s ease-in-out infinite}
  .charm.imminent{border-left-color:#f85149}
  .charm.broke{border-left-color:#f85149;background:rgba(80,12,12,0.7)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.55}}
  /* Break imminent → flash the OUTSIDE of the overlay (the whole card stack). */
  body.imminent #wrap{border-radius:6px;animation:overlayflash 0.55s ease-in-out infinite}
  @keyframes overlayflash{
    0%,100%{box-shadow:inset 0 0 0 2px rgba(248,81,73,0.30), 0 0 0 0 rgba(248,81,73,0)}
    50%    {box-shadow:inset 0 0 0 2px rgba(248,81,73,0.98), 0 0 13px 3px rgba(248,81,73,0.85)}
  }
  .charm .head{display:flex;justify-content:space-between;gap:8px;font-size:12px}
  .charm .pet{font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .charm .owner{color:#8b949e;font-size:10px}
  .charm .meta{font-size:10px;color:#c9d1d9;margin-top:1px;font-variant-numeric:tabular-nums}
  /* "up" elapsed-time turns red once the charm has been up long enough that
     a recharm is overdue. Threshold mirrors the user-tuned RECHARM_RED_AT_S
     (default 54s — the canonical bard SBB "you're about to lose it" mark). */
  .charm .meta .up.danger{color:#f85149;font-weight:bold}
  .charm .badge{font-size:9px;padding:0 4px;border-radius:3px;background:#2d2150;color:#c9a0ff;margin-left:4px}
  .charm.dire .badge{background:#16361f;color:#56d364}
  /* Inline "remove" button next to the BROKE badge — bigger target than the
     ✕ corner dismiss for clearing stale broken-charm cards after a mez break
     or a botched cycle. Reuses the same data-dismiss path via class="dismiss". */
  .charm .remove-broken{margin-left:6px;font-size:9px;padding:1px 6px;border-radius:3px;
    background:#3d1d1d;color:#fca5a5;border:1px solid #5a2a2a;cursor:pointer;
    font-family:inherit;letter-spacing:0.5px;text-transform:uppercase;line-height:1.3}
  .charm .remove-broken:hover{background:#5a2a2a;color:#fff;border-color:#f87171}
  .tickbar{height:4px;background:rgba(255,255,255,0.14);border-radius:2px;overflow:hidden;margin-top:3px}
  .tickbar > div{height:100%;background:#a371f7;transition:width 100ms linear}
  .charm .meta .hp{color:#56d364;font-weight:bold}
  .petbuff .t.q{color:#6e7681}
  .hpbar{height:5px;background:rgba(255,255,255,0.14);border-radius:2px;overflow:hidden;margin-top:3px}
  .hpbar > div{height:100%;transition:width 200ms linear,background 200ms linear}
  /* Buff countdown bars — one per timed buff observed on the pet (from the
     cast-land message), drawn under the charm-duration bar. */
  .buffbars{margin-top:4px;display:flex;flex-direction:column;gap:3px}
  .buffrow{display:flex;align-items:center;gap:5px;font-size:10px;line-height:1.2}
  .buffrow .bn{color:#7ee787;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
  .buffrow .bt{font-variant-numeric:tabular-nums;color:#8b949e;margin-left:auto}
  .buffrow.low .bt{color:#f0883e} .buffrow.crit .bt{color:#f85149}
  .buffrow .bbar{flex:1 1 60px;height:4px;background:rgba(255,255,255,0.14);border-radius:2px;overflow:hidden}
  .buffrow .bbar > div{height:100%;background:#56d364;transition:width 200ms linear}
  /* Mob-Info-style buff rows: "Name (cur/max · time)" label over a bar. */
  .bufrows{margin-top:4px;display:flex;flex-direction:column;gap:3px}
  .bufrows.stale{opacity:0.55}
  .bufrows .src{font-size:9px;color:#6e7681}
  .bufb .lbl{font-size:10px;color:#c9d1d9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bufb .lbl .nm{color:#7ee787}
  .bufb .lbl .tk{color:#8b949e;font-variant-numeric:tabular-nums}
  .bufb .bar{height:4px;background:rgba(255,255,255,0.14);border-radius:2px;overflow:hidden;margin-top:1px}
  .bufb .bar > div{height:100%;transition:width 250ms linear}
  /* /pet health buff chips — each pet buff with its remaining time from the
     last /pet health report. Same tone tiers as the web BuffChip: dim → low
     (orange ≤6m) → crit (red ≤2m). Stale (no fresh report in N min) is faded. */
  .petbuffs{margin-top:4px;display:flex;flex-wrap:wrap;gap:4px;font-size:10px;line-height:1.2}
  .petbuffs .stale{opacity:0.5}
  .petbuff{padding:1px 5px;border-radius:3px;background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.10);color:#c9d1d9;text-shadow:0 1px 2px #000}
  .petbuff .nm{color:#7ee787}
  .petbuff .t{font-variant-numeric:tabular-nums;margin-left:4px;color:#8b949e}
  .petbuff.low .t{color:#f0883e}
  .petbuff.crit .t{color:#f85149}
  .petbuffs .src{font-size:9px;color:#6e7681;align-self:center;margin-left:2px}
  #empty{color:rgba(255,255,255,0.5);font-size:12px;text-shadow:0 1px 2px #000}
  /* drag/lock/setup — same pattern as overlay.html / triggers.html */
  #drag-controls{display:none;position:fixed;top:4px;left:4px;gap:4px;z-index:60}
  body.unlocked #drag-controls{display:flex}
  body.unlocked{outline:2px solid rgba(163,113,247,0.7);outline-offset:-2px}
  .drag-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    background:rgba(163,113,247,0.92);color:#fff;border:1px solid rgba(255,255,255,0.4);
    border-radius:4px;font-size:13px;line-height:1;cursor:move;user-select:none}
  #lock-btn{cursor:pointer;font-size:11px}
  #setupbar{display:none;position:fixed;top:0;left:0;right:0;align-items:center;gap:8px;
    padding:4px 8px;background:rgba(163,113,247,0.92);color:#fff;font-size:10px;font-weight:600;z-index:50}
  body.setup #setupbar{display:flex}
  body.setup #drag-controls{top:28px}
  body.setup #wrap{margin-top:26px}
  #setupbar input[type=range]{flex:1;cursor:pointer}
  #setupbar input[type=number]{width:48px}
  /* ✕ hide button — top-right. Works when locked via hover-interact. */
  #hide-btn{position:fixed;top:6px;right:6px;z-index:65;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;border-radius:4px;
    background:rgba(14,17,22,0.6);color:#8b949e;border:1px solid rgba(110,118,129,0.3);
    font-size:11px;line-height:1;cursor:pointer;opacity:0.45;transition:opacity .12s}
  #hide-btn:hover{opacity:1;color:#f87171;border-color:#f87171}
  body.setup #hide-btn{top:30px}
  /* ✥ persistent move square — drag without unlocking from the tray. */
  #move-btn{position:fixed;top:6px;left:6px;z-index:65;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;border-radius:4px;
    background:rgba(14,17,22,0.6);color:#8b949e;border:1px solid rgba(110,118,129,0.3);
    font-size:11px;line-height:1;cursor:move;opacity:0.45;transition:opacity .12s}
  #move-btn:hover{opacity:1;color:#58a6ff;border-color:#58a6ff}
  body.setup #move-btn{top:30px}
</style></head>
<body>
  <button id="move-btn" title="Drag from this icon to move the overlay (top-left corner — same on every overlay)">✥</button>
  <button id="hide-btn" title="Hide the charm tracker (turn back on from the tray → Overlays)">✕</button>
  <div id="drag-controls">
    <div id="move-handle" class="drag-btn" title="Drag to move">✥</div>
    <div id="lock-btn"   class="drag-btn" title="Lock in place">🔒</div>
  </div>
  <div id="setupbar">
    <span>🛠 Charm</span>
    <span>opacity</span><input id="opacitySlider" type="range" min="0.15" max="1" step="0.05" value="1" /><span id="opacityVal">100%</span>
    <span>· recharm warn at</span><input id="warnAt" type="number" min="0" max="600" step="1" value="0" /><span>s (0=off)</span>
    <button id="exitSetupBtn">Done</button>
  </div>
  <div id="wrap">
    <div class="title"><span id="conn" class="conn bad">○</span><span>🔮 Charm tracker</span></div>
    <div id="list"></div>
    <div id="empty">no active charm</div>
  </div>
<script>
  let PORT = 7779;
  window.mimic && window.mimic.onAgentPort && window.mimic.onAgentPort(p => { PORT = p; });
  window.mimic && window.mimic.getAgentPort && window.mimic.getAgentPort().then(p => { if (p) PORT = p; });

  if (window.mimic && window.mimic.onOverlayLocked) {
    window.mimic.onOverlayLocked(locked => { document.body.classList.toggle('unlocked', !locked); });
  }
  var lockBtn = document.getElementById('lock-btn');
  if (lockBtn) lockBtn.addEventListener('click', function(){ try { window.mimic.setOverlaysLocked(true); } catch (e) {} });

  // ✕ hide — see overlay.html. Hover-interact lets the click land when locked.
  var hideBtn = document.getElementById('hide-btn');
  if (hideBtn) {
    hideBtn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    hideBtn.addEventListener('mouseleave', function(){ try { window.mimic.overlayHoverInteractive(false); } catch (e) {} });
    hideBtn.addEventListener('click', function(){ try { window.mimic.hideThisOverlay(); } catch (e) {} });
  }

  // Manual drag (same Chromium transparent-window workaround as the others).
  var moveHandle = document.getElementById('move-handle');
  var moveBtn    = document.getElementById('move-btn');
  var _dragging = false;
  function _beginDrag(e){
    if (e.button !== 0) return; e.preventDefault(); _dragging = true;
    try { window.mimic.overlayDragStart(); } catch (err) {}
  }
  if (moveHandle) moveHandle.addEventListener('mousedown', _beginDrag);
  // Persistent corner square — works when locked via hover-interact.
  if (moveBtn) {
    moveBtn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    moveBtn.addEventListener('mouseleave', function(){ if (!_dragging) { try { window.mimic.overlayHoverInteractive(false); } catch (e) {} } });
    moveBtn.addEventListener('mousedown', _beginDrag);
    // Right-click the ✥ → size presets for THIS overlay. Avoids diving into
    // Setup mode just to resize one window.
    // Right-click ✥ → shared chrome menu (resize presets + Setup THIS/ALL).
    try { window.mimic.attachOverlayMenu(moveBtn); } catch (e) {}
  }
  document.addEventListener('mouseup', function(){ if (_dragging){ _dragging=false; try{window.mimic.overlayDragEnd();}catch(e){} try{window.mimic.overlayHoverInteractive(false);}catch(e){} } });
  window.addEventListener('blur', function(){ if (_dragging){ _dragging=false; try{window.mimic.overlayDragEnd();}catch(e){} } });

  // Setup mode + opacity slider.
  var _overlayKey = null;
  var _setupScope = null;
  if (window.mimic && window.mimic.onSetupMode) {
    window.mimic.onSetupMode(function(p){ _overlayKey = p && p.overlayKey; if (p && p.scope) _setupScope = p.scope; else if (p && p.active) _setupScope = 'all'; document.body.classList.toggle('setup', !!(p && p.active)); });
  }
  if (window.mimic && window.mimic.onBgAlpha) {
    window.mimic.onBgAlpha(function(v){
      var a = (typeof v === 'number' && v >= 0.15 && v <= 1.0) ? v : 0.55;
      try { document.documentElement.style.setProperty('--bg-alpha', String(a)); } catch (e) {}
    });
  }
  var slider = document.getElementById('opacitySlider'); var oVal = document.getElementById('opacityVal');
  if (slider) slider.addEventListener('input', function(){
    var v = parseFloat(slider.value || '1'); if (oVal) oVal.textContent = Math.round(v*100)+'%';
    if (_overlayKey && window.mimic && window.mimic.setOverlayOpacity) { try { window.mimic.setOverlayOpacity(_overlayKey, v); } catch (e) {} }
  });
  var doneBtn = document.getElementById('exitSetupBtn');
  if (doneBtn) doneBtn.addEventListener("click", function(){ try { document.body.classList.remove("setup"); } catch (e) {} try { if (_setupScope === "this") window.mimic.setSetupModeThis(false); else window.mimic.setSetupMode(false); } catch (e) {} _setupScope = null; });

  // Recharm-warn threshold — user-supplied seconds-since-charm to beep at. We
  // deliberately DON'T guess the charm spell's max duration (that lives in
  // Zeal's buff window, not yet wired); instead the user dials the number that
  // matches their charm so the proactive warning is theirs to tune. Persisted.
  var warnAtEl = document.getElementById('warnAt');
  try { var saved = localStorage.getItem('wpCharmWarnAt'); if (saved != null && warnAtEl) warnAtEl.value = saved; } catch (e) {}
  if (warnAtEl) warnAtEl.addEventListener('change', function(){ try { localStorage.setItem('wpCharmWarnAt', warnAtEl.value || '0'); } catch (e) {} });

  function speak(text){
    try { if (!window.speechSynthesis) return; var u = new SpeechSynthesisUtterance(text);
      u.rate = 1.05; u.volume = 1; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u); } catch (e) {}
  }
  function fmtElapsed(ms){ var s = Math.floor(ms/1000); var m = Math.floor(s/60); var r = s - m*60; return m + ':' + String(r).padStart(2,'0'); }
  // Elapsed-time red threshold — once a charm has been up this long, paint
  // the "up X:YZ" indicator red as a glanceable recharm-overdue cue. 54s is
  // the canonical bard SBB "you should have recharmed by now" mark.
  var RECHARM_RED_AT_MS = 54000;
  // Mirror of web/lib/buffs.ts shortBuffName — same shorthand the guild reads
  // on /raid + /buffs, just inlined here since charm.html is a standalone
  // localhost page (no module imports). Update both lists together when a new
  // buff surfaces.
  var SHORT_BUFF_RULES = [
    [/protection of the glades/i, 'POTG'],
    [/protection of the cabbage/i, 'POTC'],
    [/aegolism/i, 'Aego'],
    [/talisman of wunshi/i, 'ToW'],
    [/khura'?s? focusing/i, 'Khuras'],
    [/brell'?s? (?:mountainous barrier|steadfast bulwark|blessing)/i, 'Brell'],
    [/arch shielding/i, 'Arch'],
    [/koadic'?s endless intellect/i, 'KEI'],
    [/clarity ii/i, 'C2'],
    [/visions of grandeur/i, 'VoG'],
    [/gift of pure thought/i, 'GoPT'],
    [/spirit of (?:the )?wolf/i, 'SOW'],
    [/flight of eagles?/i, 'FoE'],
    [/spirit of bihli/i, 'Bihli'],
    [/focus(?:ing)? of spirit/i, 'FoS'],
    [/speed of the shissar/i, 'Shissar'],
  ];
  function shortBuffName(name){
    var raw = String(name || '').trim(); if (!raw) return raw;
    var sym = raw.match(/symbol of (?:the )?(\w+)/i);
    if (sym) { var w = sym[1]; return 'Sym ' + (w[0].toUpperCase() + w.slice(1).toLowerCase()); }
    for (var i=0;i<SHORT_BUFF_RULES.length;i++){ if (SHORT_BUFF_RULES[i][0].test(raw)) return SHORT_BUFF_RULES[i][1]; }
    return raw;
  }
  // Compact countdown: "1h12m" / "8m" / "45s" / "0s". Elapsed-adjusts the
  // "remaining" reported at observed_at_ms; once <= 0 we show 0s (rather than
  // hiding) so the chip's visible-but-spent state reads as "this expired
  // recently — re-buff."
  function fmtRem(remSecs, observedAtMs){
    if (remSecs == null) return '';
    var elapsed = observedAtMs ? Math.max(0, (Date.now() - observedAtMs) / 1000) : 0;
    var s = Math.max(0, Math.round(remSecs - elapsed));
    if (s >= 3600) { var h = Math.floor(s/3600); var mm = Math.round((s%3600)/60); return mm ? (h+'h'+mm+'m') : (h+'h'); }
    if (s >= 60)   return Math.floor(s/60) + 'm';
    return s + 's';
  }
  function buffTone(remSecs, observedAtMs){
    if (remSecs == null) return '';
    var elapsed = observedAtMs ? Math.max(0, (Date.now() - observedAtMs) / 1000) : 0;
    var s = remSecs - elapsed;
    if (s <= 120) return 'crit';
    if (s <= 360) return 'low';
    return '';
  }
  function renderPetBuffs(p){
    var buffs = Array.isArray(p.pet_buffs) ? p.pet_buffs.slice() : null;
    if (!buffs || !buffs.length) return '';
    var obs = p.pet_health_observed_at || null;
    var staleMs = obs ? (Date.now() - obs) : null;
    var staleClass = (staleMs != null && staleMs > 5*60*1000) ? ' stale' : '';
    // Sort by time-left ascending (lowest at top); untimed sink to the bottom.
    buffs.sort(function(a, b){
      var ar = (a && a.remaining_secs != null) ? a.remaining_secs : Infinity;
      var br = (b && b.remaining_secs != null) ? b.remaining_secs : Infinity;
      return ar - br;
    });
    var rows = '';
    for (var i=0;i<buffs.length;i++){
      var b = buffs[i]; if (!b || !b.name) continue;
      var bo = b.observed_at_ms || obs;
      var hasTimer = b.remaining_secs != null;
      var total = b.total_secs || null;
      // "Name (curTick/maxTick · M:SS)" — same as the Pet tracker + Mob Info.
      var tk = '';
      if (hasTimer && total) {
        var curT = Math.max(0, Math.ceil(b.remaining_secs / 6));
        var maxT = Math.max(1, Math.round(total / 6));
        tk = ' (' + curT + '/' + maxT + ' · ' + fmtRem(b.remaining_secs, bo) + ')';
      } else if (hasTimer) {
        tk = ' (' + fmtRem(b.remaining_secs, bo) + ')';
      } else { tk = ' (?)'; }
      var pct = (hasTimer && total) ? Math.max(0, Math.min(100, (b.remaining_secs / total) * 100)) : (hasTimer ? 100 : 0);
      // Buff = green, debuff (good===0) = red; unknown timer = gray.
      var col = (b.good === 0) ? '#f85149' : (!hasTimer ? '#6e7681' : '#56d364');
      // Fell off in the last 5 min → solid purple rebuff cue.
      if (b.fell_off) { col = '#a371f7'; pct = 100; tk = ' (fell off — rebuff)'; }
      var title = b.name + (b.fell_off ? ' · fell off (rebuff)' : (hasTimer ? ' · ' + fmtRem(b.remaining_secs, bo) + ' left' : ' · present (duration unknown)'));
      rows += '<div class="bufb" title="' + esc(title) + '">'
           +    '<div class="lbl"><span class="nm">' + esc(shortBuffName(b.name)) + '</span><span class="tk">' + esc(tk) + '</span></div>'
           +    '<div class="bar"><div style="width:' + pct.toFixed(0) + '%;background:' + col + '"></div></div>'
           +  '</div>';
    }
    if (!rows) return '';
    var srcLabel = obs ? '/pet health ' + Math.round((Date.now()-obs)/1000) + 's ago' : 'observed casts';
    return '<div class="bufrows' + staleClass + '">' + rows + '<div class="src" title="' + esc(srcLabel) + '">' + (staleClass ? '⏳ stale' : 'ⓘ') + '</div></div>';
  }

  // Per-charm session memory: key → { started_at, warned }. Re-armed when a
  // pet's started_at changes (re-charm = new session). Used to fire the warn
  // once and to detect breaks (was active, now gone/broken).
  var prevActive = new Map();
  // key → setTimeout handle; entries while a recharm callout is scheduled but
  // not yet spoken. Suppresses a speech if the pet's tracker entry vanishes in
  // the defer window (intentional kill of an already-broken pet).
  var pendingRecharm = new Map();
  // Snapshot of the tracker key set from the most recent poll — read by
  // deferred recharm timers so they see the latest data, not the stale set
  // from the poll that scheduled them.
  var _trackedKeysSnapshot = new Set();
  function trackedKeysNow(){ return _trackedKeysSnapshot; }
  var listEl = document.getElementById('list');
  var emptyEl = document.getElementById('empty');

  async function tick(){
    try {
      const r = await fetch('http://127.0.0.1:'+PORT+'/api/state',{cache:'no-store'});
      const s = await r.json();
      document.getElementById('conn').className = 'conn ok';
      document.getElementById('conn').textContent = '●';
      const now = Date.now();
      const warnAt = parseInt((warnAtEl && warnAtEl.value) || '0', 10) || 0;
      const LINGER_MS = 5 * 60 * 1000;
      // Show only charms owned by the active EQ window's character so the
      // tracker doesn't display every alt's pet at once after a window
      // switch. No active signal yet → show all (initial boot).
      const active = s.activeCharacter ? String(s.activeCharacter).toLowerCase() : null;
      const allPets = (s.charmPets || []);
      const pets = active
        ? allPets.filter(function(p){ return p && p.owner && String(p.owner).toLowerCase() === active; })
        : allPets;
      // Charmed pets PLUS recently-broken ones we keep showing so the mob tick
      // counter stays up after a break — until the pet dies (dropped server-side)
      // or 5 min pass.
      const shown = pets.filter(function(p){
        if (!p) return false;
        if (p.is_active) return true;
        return p.broke_at && (now - p.broke_at) < LINGER_MS;
      });

      // Recharm alert fires when a pet stops being charmed — but DEFERRED 3.5s
      // so a charm-cycler who promptly kills the now-broken mob doesn't get a
      // false-alarm "recharm pet" call: if the pet vanishes from the tracker
      // within the defer window (death detection's killer-guard removes it on
      // a player kill) we cancel the pending speech. Unexpected breaks still
      // fire after the window.
      var charmedKeys = new Set(pets.filter(function(p){ return p && p.is_active; }).map(function(p){ return p.key; }));
      // Currently-tracked keys (active OR lingering broken) — used to decide
      // whether a pending recharm got "intentionally killed" (vanishes from
      // tracker entirely) vs just broke (still in tracker as broken).
      var trackedKeys = new Set((s.charmPets || []).map(function(p){ return p && p.key; }).filter(Boolean));
      for (const [key, mem] of prevActive) {
        if (!charmedKeys.has(key) && !pendingRecharm.has(key)) {
          // Defer speech; if the pet's tracker entry disappears in this window
          // (i.e. the charmer killed it intentionally), we cancel.
          var t = setTimeout(function(){
            // If the pet is GONE from the tracker by now → intentional kill,
            // stay silent. Otherwise → real unexpected break, speak.
            if (trackedKeysNow().has(key)) speak('recharm pet');
            pendingRecharm.delete(key);
          }, 3500);
          pendingRecharm.set(key, t);
          prevActive.delete(key);
        }
      }
      // Snapshot for any pending recharm timers that fire after this poll —
      // they consult trackedKeysNow() (the LATEST poll's tracker), not the
      // stale set from this iteration.
      _trackedKeysSnapshot = trackedKeys;

      var html = '';
      var anyImminent = false;
      for (const p of shown) {
        const broke = !p.is_active;
        const startedAt = p.started_at || p.last_tick_at || now;
        const elapsed = Math.max(0, now - startedAt);
        const ticks = Math.floor(elapsed / 6000);
        // Mob tick: 6s cycle anchored on the last tick — keeps running through a
        // break so the lingering card still counts.
        const intoTick = (now - (p.last_tick_at || startedAt)) % 6000;
        const remTick = 6000 - (intoTick < 0 ? 0 : intoTick);
        const tickPct = (remTick / 6000) * 100;

        // Charm duration. If the agent matched a charm-spell cast against
        // the land we get the exact duration_sec from CHARM_SPELLS; if not
        // (cast missed by parseEvent, gauge-only land, etc.) we still want
        // a visible countdown — fall back to 60s (SBB's spell-data max of
        // 10 ticks @ L60) and flag it as estimated so the user knows it's
        // a guess. Bard SBB is the dominant charm-cycle case on Quarm.
        const durKnown = (typeof p.duration_sec === 'number' && p.duration_sec > 0);
        const durSec   = durKnown ? p.duration_sec : 60;
        const durEst   = !durKnown;
        const isBard   = p.charm_class === 'bard' || durEst;   // estimate ≈ bard tempo
        const durRemMs = Math.max(0, durSec * 1000 - elapsed);
        const durPct   = Math.max(0, Math.min(100, (durRemMs / (durSec * 1000)) * 100));
        const maxTicks = Math.max(1, Math.round(durSec / 6));
        // Bard warn fires 12s (2 ticks) before expiry instead of 6s (1 tick)
        // — gives the bard a full tick of cushion to start their re-twist
        // before the previous one drops. User feedback: 6s was too late, the
        // recharm callout landed essentially at the break.
        const warnLeadMs = isBard ? 12000 : 30000;
        // Imminent + the proactive/duration warns apply only while CHARMED — a
        // broken (lingering) pet has already broken, so no further warns/flash.
        // Suppress audio warns on ESTIMATED durations so a guessed-30s timer
        // doesn't shout "charm breaking" at the user every cycle when the real
        // spell duration is longer; the visual countdown still renders.
        const imminent = !broke && !p.is_dire_charm && durRemMs <= warnLeadMs;
        if (imminent && !durEst) anyImminent = true;

        var warnHit = false;
        if (!broke) {
          // Session memory + proactive warn (charmed pets only).
          var mem = prevActive.get(p.key);
          if (!mem || mem.started_at !== startedAt) { mem = { started_at: startedAt, warned: false, durWarned: false }; prevActive.set(p.key, mem); }
          if (warnAt > 0 && !p.is_dire_charm && !mem.warned && elapsed >= warnAt * 1000) {
            mem.warned = true; warnHit = true; speak('recharm pet');
          }
          // durRemMs > 0 guard: a session whose elapsed has run PAST its max
          // duration (durRemMs clamped to 0) is stale, not imminent — Quarm
          // charms break EARLY, never late, so "already past max" means the
          // data is zombie (e.g. a session that survived a logout). Without
          // this, "up 35:52" on a 12-min charm shouts "charm breaking in 30
          // seconds" on relogin. The real last-30s warn always fires while
          // durRemMs is still > 0, so this never suppresses a legit callout.
          if (!durEst && !p.is_dire_charm && !mem.durWarned && durRemMs <= warnLeadMs && durRemMs > 0) {
            mem.durWarned = true; warnHit = true;
            speak(isBard ? 'charm breaking' : 'charm breaking in 30 seconds');
          }
          // Bard-only "recharm NOW" — fires when ≤ 3.1s remain in the current
          // charm. Selo's Consonant Chain (the canonical Quarm bard charm song)
          // casts in ~3s, so 3.1s left is exactly the "start the recast now or
          // miss the cycle" mark. Strictly bard-class (not durEst guess) so an
          // enchanter on an estimated duration doesn't get a mistimed alert.
          if (p.charm_class === 'bard' && !durEst && !p.is_dire_charm && !mem.recharmNowWarned && durRemMs <= 3100 && durRemMs > 0) {
            mem.recharmNowWarned = true; warnHit = true;
            speak('recharm now');
          }
        }

        var cls = 'charm' + (p.is_dire_charm ? ' dire' : '') + (broke ? ' broke' : '') + (warnHit ? ' warn' : '') + (imminent ? ' imminent' : '');
        var badge = broke ? '<span class="badge">BROKE</span>'
                          + ' <button class="dismiss remove-broken" data-dismiss="' + esc(p.key || '') + '" title="Remove this broken-charm card from the tracker">remove</button>'
                  : (p.is_dire_charm ? '<span class="badge">DIRE</span>' : '<span class="badge">charm</span>');
        var brokeAgo = broke ? Math.round((now - (p.broke_at || now)) / 1000) : 0;
        var warnLine = broke
          ? ' · ⚠ RECHARM — broke ' + brokeAgo + 's ago'
          : ((warnAt > 0 && !p.is_dire_charm)
              ? ' · recharm in ' + Math.max(0, Math.ceil(warnAt - elapsed/1000)) + 's'
              : (p.is_dire_charm ? ' · permanent (until break)' : ''));
        // Live pet HP — Zeal gauge slot 16, present only for the local
        // uploader's own pet. Color the bar green→amber→red as it drops.
        var hp = (p.pet_hp_pct != null) ? Math.max(0, Math.min(100, p.pet_hp_pct)) : null;
        var hpStr = hp != null ? ' · <span class="hp">' + Math.round(hp) + '%</span>' : '';
        var hpColor = hp == null ? '#a371f7' : (hp > 50 ? '#56d364' : (hp > 20 ? '#f0883e' : '#f85149'));
        var hpBar = hp != null
          ? '<div class="hpbar"><div style="width:' + hp.toFixed(0) + '%;background:' + hpColor + '"></div></div>'
          : '';
        // Duration bar — only while charmed (a broken charm's duration is moot).
        // Tilde-prefix on estimated durations so the user knows it's a guess
        // (no detected spell cast); the countdown is still useful for tempo.
        var durStr = '', durBar = '';
        if (!broke && !p.is_dire_charm) {
          var durColor = durRemMs > warnLeadMs ? '#3b82f6' : (durRemMs > warnLeadMs/2 ? '#f0883e' : '#f85149');
          if (durEst) durColor = '#8b94a3';   // muted gray = estimate
          durStr = ' · breaks ' + (durEst ? '~' : '') + fmtElapsed(durRemMs);
          durBar = '<div class="tickbar" style="margin-top:2px"><div style="width:' + durPct.toFixed(1) + '%;background:' + durColor + '"></div></div>';
        }
        html += '<div class="' + cls + '" data-key="' + esc(p.key || '') + '">'
          + '<button class="dismiss" data-dismiss="' + esc(p.key || '') + '" title="Dismiss — remove this pet from the tracker">&times;</button>'
          + '<div class="head"><span class="pet">' + esc(p.pet || '?') + badge + '</span>'
          + '<span class="owner">' + esc(p.owner || '') + '</span></div>'
          + '<div class="meta">tick ' + Math.min(ticks, maxTicks) + '/' + maxTicks + (durEst ? '~' : '') + ' · next mob tick ' + (remTick/1000).toFixed(1) + 's · <span class="up' + (elapsed >= RECHARM_RED_AT_MS ? ' danger' : '') + '">up ' + fmtElapsed(elapsed) + '</span>' + durStr + hpStr + warnLine + '</div>'
          + hpBar
          + '<div class="tickbar"><div style="width:' + tickPct.toFixed(0) + '%"></div></div>'
          + durBar
          + renderPetBuffs(p)
          + '</div>';
      }
      listEl.innerHTML = html;
      document.body.classList.toggle('imminent', anyImminent);
      emptyEl.style.display = shown.length ? 'none' : 'block';
      _requestAutoHeight();
    } catch (e) {
      var c = document.getElementById('conn'); c.className = 'conn bad'; c.textContent = '○';
    }
  }
  // Ask Mimic to size the window to fit our content. scrollHeight of #wrap
  // is the natural height including all cards; main.js adds a small chrome
  // margin and clamps to the screen. Hysteresis on the main side keeps tiny
  // pixel jitters from snapping the window every tick.
  function _requestAutoHeight(){
    if (!(window.mimic && window.mimic.overlayAutoHeight)) return;
    var w = document.getElementById('wrap'); if (!w) return;
    // padding-bottom of wrap + a few px so the bottom card isn't flush
    var h = w.scrollHeight + 8;
    try { window.mimic.overlayAutoHeight(h); } catch (e) {}
  }
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }
  // Delegated dismiss handler — listEl is replaced every tick via innerHTML,
  // so a single delegated listener on the parent survives the re-render.
  // Stops propagation + click event from triggering hover-interactive enter/
  // leave shenanigans on the overlay drag plumbing.
  listEl.addEventListener('click', function(e){
    var btn = e.target && e.target.closest && e.target.closest('button.dismiss');
    if (!btn) return;
    e.stopPropagation();
    var key = btn.getAttribute('data-dismiss');
    if (!key) return;
    btn.disabled = true; btn.style.opacity = 0.2;
    fetch('http://127.0.0.1:'+PORT+'/api/charm-pet/dismiss', {
      method: 'POST', cache: 'no-store',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ key: key })
    }).catch(function(){}).then(function(){ tick(); });
  });
  tick(); setInterval(tick, 500);
</script>
</body></html>
