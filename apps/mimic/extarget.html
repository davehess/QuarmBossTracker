<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>extended target</title>
<style>
  /* Extended Target overlay — a raid-wide "extended target window". Polls the
     local agent's /api/extended-target (which proxies the bot's aggregation of
     every online raider's current target, Zeal slot 6). One row per target,
     SORTED BY how many raiders are on it, with HP%, the debuffs landed on it,
     a ★ on named/unique mobs, and a * caveat on non-unique names (the pipe has
     no spawn id, so same-name mobs are only told apart when their HP differs).
     Players/pets missing >15% HP for >10s fold in as "needs attention" rows.
     (Uilnayar 2026-06-29.) */
  /* --bg-alpha: card-surface alpha, driven by slider via main → preload
     'bg-alpha' IPC. 1.0 = opaque (EQ hidden). Text stays bright at every value. */
  :root{ --bg-alpha:0.5; }
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;
    font-family:ui-monospace,Menlo,Consolas,monospace;color:#fff;user-select:none;}
  #wrap{padding:6px 8px;min-width:280px;}
  .head{display:flex;align-items:baseline;gap:8px;
    font-size:12px;color:#5fd0c9;text-shadow:0 1px 2px #000;margin-bottom:4px;
    padding-left:22px;padding-right:22px;}
  .head .icon{flex-shrink:0}
  .head .ttl{color:#f6c365;font-weight:600;flex:1;min-width:0}
  .head .cnt{color:#9aa4ad;font-size:10px;font-variant-numeric:tabular-nums;flex-shrink:0}
  .head .conn{font-size:11px;flex-shrink:0}
  .conn.ok{color:#56d364} .conn.bad{color:#8b949e}
  .rows{display:flex;flex-direction:column;gap:3px;background:rgb(0 0 0 / var(--bg-alpha));
    border-radius:5px;padding:5px 6px}
  .row{position:relative;display:grid;
    grid-template-columns:2.4em minmax(0,1fr) auto;
    align-items:center;gap:6px;font-size:11px;line-height:1.3;
    padding:3px 6px;border-radius:3px;background:rgba(255,255,255,0.03);
    text-shadow:0 1px 2px #000;border-left:2px solid transparent;
    transition:background 200ms ease}
  /* Raider-count badge — how many raiders are on this target. Bigger count =
     the focus mob. */
  .row .ct{display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;
    color:#5fd0c9;background:rgba(95,208,201,0.12);border:1px solid rgba(95,208,201,0.35);
    border-radius:3px;padding:1px 0;letter-spacing:-0.02em}
  .row .nm-wrap{min-width:0;overflow:hidden}
  .row .nm{color:#e6edf3;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  /* Named/unique NPC — gold, with a ★ so it reads as "a real named mob". */
  .row.named .nm{color:#f6c365}
  .row .star{color:#f6c365;font-size:9px;margin-left:3px}
  /* The non-unique asterisk — amber, help cursor; tooltip explains the caveat. */
  .row .amb{color:#f0b429;font-weight:700;cursor:help;margin-left:2px}
  .row .dup{color:#9aa4ad;font-size:9px;margin-left:3px;font-variant-numeric:tabular-nums}
  .row.player .nm{color:#79c0ff}
  .row.pet    .nm{color:#c9a0ff}
  .row .owner{color:#8b949e;font-size:9px;margin-left:4px}
  .row .hp{font-variant-numeric:tabular-nums;font-weight:700;text-align:right;font-size:11px}
  .hp.hi{color:#56d364} .hp.mid{color:#f0b429} .hp.lo{color:#f87171} .hp.unk{color:#6e7681}
  /* HP bar under the row. */
  .bar{grid-column:1 / -1;height:4px;background:rgba(255,255,255,0.07);
    border-radius:2px;overflow:hidden;margin-top:3px}
  .bar .fill{height:100%;transition:width 250ms ease,background 250ms ease}
  .bar .fill.hi{background:#56d364} .bar .fill.mid{background:#f0b429} .bar .fill.lo{background:#f87171}
  /* Debuff chips — the detrimental casts landed on this target. */
  .debuffs{grid-column:1 / -1;display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
  .debuffs .chip{font-size:8px;line-height:1.4;padding:0 4px;border-radius:2px;
    background:rgba(163,113,247,0.16);border:1px solid rgba(163,113,247,0.4);color:#d2a8ff;
    white-space:nowrap}
  .debuffs .chip .rem{color:#9aa4ad;margin-left:3px}
  /* Pooled-group label — "on one of these N:" caption before the shared
     same-name debuff chips. Reads as a caption, not a debuff. */
  .debuffs .chip.pool-lbl{background:none;border:none;color:#8b949e;font-style:italic;
    padding:0 2px 0 0;cursor:help}
  /* Hurt rows (player/pet missing >15% for >10s) — red accent + ⚠ badge. */
  .row.hurt{background:rgba(248,113,113,0.12);border-left-color:#f87171}
  .row .warn{display:inline-flex;align-items:center;gap:2px;color:#fca5a5;font-size:9px;
    font-weight:700;margin-left:4px}
  /* Off-tank rows — a mob held at 100% HP (or otherwise) by an off-tank who
     deliberately never targets/damages it (Emperor Ssraeshza-style adds).
     Surfaced from combat-log "who's hitting whom" (incoming_mob), NOT the
     Zeal target gauge, so it can show even with zero direct targeters —
     cyan accent + a shield badge instead of the raider-count number.
     Uilnayar 2026-07-04: "there will always be mobs that we don't want to
     injure but we will off tank." */
  .row.offtank{border-left-color:#5fd0c9}
  .row .ct.offtank-ct{color:#5fd0c9;font-size:13px}
  .row .offtank-tag{display:inline-flex;align-items:center;gap:2px;color:#5fd0c9;font-size:9px;
    font-weight:700;margin-left:4px}
  /* Stale/grace-period rows — a previously-targeted, previously-hurt mob
     nobody currently targets. Dimmed + "last seen Xs ago" instead of the
     raider-count badge so it reads as memory, not live state. */
  .row.stale{opacity:0.62}
  .row .stale-tag{color:#9aa4ad;font-size:9px;font-style:italic;margin-left:4px}
  /* Off-tank toggle + quiet hint, next to the online count. */
  .head .offtank-btn{font-size:9px;padding:1px 5px;border-radius:3px;cursor:pointer;
    background:rgba(95,208,201,0.12);border:1px solid rgba(95,208,201,0.35);color:#5fd0c9;
    flex-shrink:0}
  .head .offtank-btn.on{background:rgba(95,208,201,0.9);color:#08231f}
  #empty{color:rgba(255,255,255,0.5);font-size:11px;text-shadow:0 1px 2px #000;padding:4px 0;text-align:center;font-style:italic}
  .foot{margin-top:4px;font-size:8px;color:#6e7681;padding:0 4px;line-height:1.3}
  .foot b{color:#f0b429;font-weight:700}
  /* drag/lock/setup chrome — same pattern as every other overlay. */
  #drag-controls{display:none;position:fixed;top:4px;left:4px;gap:4px;z-index:60}
  body.unlocked #drag-controls{display:flex}
  body.unlocked{outline:2px solid rgba(95,208,201,0.7);outline-offset:-2px}
  .drag-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    background:rgba(95,208,201,0.92);color:#08231f;border:1px solid rgba(255,255,255,0.4);
    border-radius:4px;font-size:13px;line-height:1;cursor:move;user-select:none}
  #lock-btn{cursor:pointer;font-size:11px}
  #setupbar{display:none;position:fixed;top:0;left:0;right:0;align-items:center;gap:8px;
    padding:4px 8px;background:rgba(95,208,201,0.92);color:#08231f;font-size:10px;font-weight:600;z-index:50}
  body.setup #setupbar{display:flex}
  body.setup #drag-controls{top:28px}
  body.setup #wrap{margin-top:26px}
  #setupbar input[type=range]{flex:1;cursor:pointer}
  #hide-btn{position:fixed;top:6px;right:6px;z-index:65;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;border-radius:4px;
    background:rgba(14,17,22,0.6);color:#8b949e;border:1px solid rgba(110,118,129,0.3);
    font-size:11px;line-height:1;cursor:pointer;opacity:0.45;transition:opacity .12s}
  #hide-btn:hover{opacity:1;color:#f87171;border-color:#f87171}
  body.setup #hide-btn{top:30px}
  #move-btn{position:fixed;top:6px;left:6px;z-index:65;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;border-radius:4px;
    background:rgba(14,17,22,0.6);color:#8b949e;border:1px solid rgba(110,118,129,0.3);
    font-size:11px;line-height:1;cursor:move;opacity:0.45;transition:opacity .12s}
  #move-btn:hover{opacity:1;color:#5fd0c9;border-color:#5fd0c9}
  body.setup #move-btn{top:30px}
</style></head>
<body>
  <button id="move-btn" title="Drag from this icon to move the overlay (right-click for resize + Setup)">✥</button>
  <button id="hide-btn" title="Hide the extended target overlay (turn back on from the tray → Overlays)">✕</button>
  <div id="drag-controls">
    <div id="move-handle" class="drag-btn" title="Drag to move">✥</div>
    <div id="lock-btn"   class="drag-btn" title="Lock in place">🔒</div>
  </div>
  <div id="setupbar">
    <span>🛠 Ext. Target</span>
    <span>opacity</span><input id="opacitySlider" type="range" min="0.15" max="1" step="0.05" value="1" /><span id="opacityVal">100%</span>
    <button id="exitSetupBtn">Done</button>
  </div>
  <div id="wrap">
    <div class="head">
      <span id="conn" class="conn bad">○</span>
      <span class="icon">🎯</span>
      <span class="ttl">Extended Target</span>
      <button type="button" class="offtank-btn" id="offtankBtn" title="Show mobs held by an off-tank at full health that nobody's targeting (Emperor-style adds)">🛡 off-tanks</button>
      <span class="cnt" id="cnt"></span>
    </div>
    <div id="rows" class="rows"></div>
    <div id="empty">waiting for raid targets…</div>
    <div class="foot" id="foot" style="display:none"><b>*</b> non-unique name — buffs/debuffs may be inaccurate (same-name mobs share a name on the pipe).</div>
  </div>
<script>
  let PORT = 7779;
  window.mimic && window.mimic.onAgentPort && window.mimic.onAgentPort(p => { PORT = p; });
  window.mimic && window.mimic.getAgentPort && window.mimic.getAgentPort().then(p => { if (p) PORT = p; });

  if (window.mimic && window.mimic.onOverlayLocked) {
    window.mimic.onOverlayLocked(locked => { document.body.classList.toggle('unlocked', !locked); });
  }
  var lockBtn = document.getElementById('lock-btn');
  if (lockBtn) lockBtn.addEventListener('click', function(){ try { window.mimic.setOverlaysLocked(true); } catch (e) {} });

  var hideBtn = document.getElementById('hide-btn');
  if (hideBtn) {
    hideBtn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    hideBtn.addEventListener('mouseleave', function(){ try { window.mimic.overlayHoverInteractive(false); } catch (e) {} });
    hideBtn.addEventListener('click', function(){ try { window.mimic.hideThisOverlay(); } catch (e) {} });
  }

  var moveHandle = document.getElementById('move-handle');
  var moveBtn    = document.getElementById('move-btn');
  var _dragging  = false;
  function _beginDrag(e){
    if (e.button !== 0) return; e.preventDefault(); _dragging = true;
    try { window.mimic.overlayDragStart(); } catch (err) {}
  }
  if (moveHandle) moveHandle.addEventListener('mousedown', _beginDrag);
  if (moveBtn) {
    moveBtn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    moveBtn.addEventListener('mouseleave', function(){ if (!_dragging) { try { window.mimic.overlayHoverInteractive(false); } catch (e) {} } });
    moveBtn.addEventListener('mousedown', _beginDrag);
    try { window.mimic.attachOverlayMenu(moveBtn); } catch (e) {}
  }
  document.addEventListener('mouseup', function(){ if (_dragging){ _dragging=false; try{window.mimic.overlayDragEnd();}catch(e){} try{window.mimic.overlayHoverInteractive(false);}catch(e){} } });
  window.addEventListener('blur', function(){ if (_dragging){ _dragging=false; try{window.mimic.overlayDragEnd();}catch(e){} } });

  var _overlayKey = null;
  var _setupScope = null;
  if (window.mimic && window.mimic.onSetupMode) {
    window.mimic.onSetupMode(function(p){
      _overlayKey = p && p.overlayKey;
      if (p && p.scope) _setupScope = p.scope;
      else if (p && p.active) _setupScope = 'all';
      document.body.classList.toggle('setup', !!(p && p.active));
    });
  }
  if (window.mimic && window.mimic.onBgAlpha) {
    window.mimic.onBgAlpha(function(v){
      var a = (typeof v === 'number' && v >= 0.15 && v <= 1.0) ? v : 0.5;
      try { document.documentElement.style.setProperty('--bg-alpha', String(a)); } catch (e) {}
    });
  }
  var slider = document.getElementById('opacitySlider'); var oVal = document.getElementById('opacityVal');
  if (slider) slider.addEventListener('input', function(){
    var v = parseFloat(slider.value || '1'); if (oVal) oVal.textContent = Math.round(v*100)+'%';
    if (_overlayKey && window.mimic && window.mimic.setOverlayOpacity) { try { window.mimic.setOverlayOpacity(_overlayKey, v); } catch (e) {} }
  });
  var doneBtn = document.getElementById('exitSetupBtn');
  if (doneBtn) doneBtn.addEventListener('click', function(){
    try { document.body.classList.remove('setup'); } catch (e) {}
    try { if (_setupScope === 'this') window.mimic.setSetupModeThis(false); else window.mimic.setSetupMode(false); } catch (e) {}
    _setupScope = null;
  });

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
  function hpTier(h){ if (h == null) return 'unk'; if (h >= 60) return 'hi'; if (h >= 30) return 'mid'; return 'lo'; }

  // Render a debuff-chip block from a debuff array. `label` (optional) prefixes
  // the block — used for the pooled same-name group ("on one of these N").
  function debuffBlock(debuffs, label){
    if (!debuffs || !debuffs.length) return '';
    var s = '<div class="debuffs">';
    if (label) s += '<span class="chip pool-lbl" title="Same-name mobs share one name on the Zeal pipe, so these debuffs can\'t be pinned to a specific one — shown pooled for the group.">' + esc(label) + '</span>';
    for (var i = 0; i < debuffs.length; i++) {
      var d = debuffs[i];
      var rem = (d.remaining_secs != null) ? '<span class="rem">' + d.remaining_secs + 's</span>' : '';
      s += '<span class="chip">' + esc(d.name) + rem + '</span>';
    }
    return s + '</div>';
  }
  // Union the debuffs across a same-name group, deduped by name (keep the max
  // remaining time seen), so the pooled block shows each unique debuff once.
  function pooledDebuffs(group){
    var byName = {};
    for (var g = 0; g < group.length; g++) {
      var ds = group[g].debuffs || [];
      for (var i = 0; i < ds.length; i++) {
        var d = ds[i], k = String(d.name || '').toLowerCase();
        if (!byName[k] || (d.remaining_secs || 0) > (byName[k].remaining_secs || 0)) byName[k] = d;
      }
    }
    return Object.keys(byName).map(function(k){ return byName[k]; });
  }
  function rowHtml(t, suppressDeb){
    var kind = t.kind || 'npc';
    var tier = hpTier(t.hp_pct);
    var named = (kind === 'npc' && t.is_named);
    var pureOffTank = !!t.off_tank && !t.raider_count;   // nobody directly targets it — only the off-tank signal
    var rowCls = 'row ' + kind + (named ? ' named' : '') + (t.hurt ? ' hurt' : '')
      + (t.off_tank ? ' offtank' : '') + (t.stale ? ' stale' : '');
    // Name + flags: ★ named, * non-unique (with caveat tooltip), #idx for split
    // same-name mobs, owner for pets.
    var nm = esc(t.name);
    if (named) nm += '<span class="star">★</span>';
    if (t.ambiguous) nm += '<span class="amb" title="Non-unique name — same-name mobs share a name on the Zeal pipe, so buffs/debuffs here may be from a different mob of the same name. Split out below by HP when health differs.">*</span>';
    if (t.dup_index) nm += '<span class="dup">#' + t.dup_index + '/' + (t.same_name_count || '?') + '</span>';
    if (kind === 'pet' && t.owner) nm += '<span class="owner">(' + esc(t.owner) + ')</span>';
    if (t.hurt) nm += '<span class="warn">⚠ ' + (t.hurt_secs || 0) + 's</span>';
    if (t.off_tank) {
      var otRaiders = (t.off_tank_raiders || []).join(', ');
      nm += '<span class="offtank-tag" title="Hit but not targeted by: ' + esc(otRaiders) + '">🛡 off-tanked' + (otRaiders ? ' (' + esc(otRaiders) + ')' : '') + '</span>';
    }
    if (t.stale) {
      var lastRaiders = (t.last_raiders || []).join(', ');
      nm += '<span class="stale-tag" title="Last targeted by: ' + esc(lastRaiders) + '">last seen ' + (t.stale_secs || 0) + 's ago</span>';
    }
    var ct = (t.raider_count != null ? t.raider_count : 0);
    var ctHtml = pureOffTank ? '🛡' : String(ct);
    var ctCls = pureOffTank ? 'ct offtank-ct' : 'ct';
    var hpTxt = (t.hp_pct != null ? Math.round(t.hp_pct) + '%' : '—');
    var bw = (t.hp_pct != null ? Math.max(0, Math.min(100, t.hp_pct)) : 0);
    // Debuff chips. Suppressed for members of a same-name group — the pipe
    // can't attribute a debuff to a SPECIFIC same-name mob, so showing them
    // divided per row is false precision (Uilnayar 2026-07-13). The group's
    // debuffs render once, pooled, in debuffBlock() below.
    var deb = suppressDeb ? '' : debuffBlock(t.debuffs);
    var ctTitle = pureOffTank ? 'held by an off-tank, not targeted' : (ct + ' raider' + (ct === 1 ? '' : 's') + ' targeting');
    return '<div class="' + rowCls + '" title="' + ctTitle + '">'
      +    '<span class="' + ctCls + '">' + ctHtml + '</span>'
      +    '<span class="nm-wrap"><span class="nm">' + nm + '</span></span>'
      +    '<span class="hp ' + tier + '">' + hpTxt + '</span>'
      +    '<div class="bar"><div class="fill ' + tier + '" style="width:' + bw + '%"></div></div>'
      +    deb
      +  '</div>';
  }

  // "Show off-tanks" toggle — pure off-tank rows (a mob held by an
  // off-tank, zero direct targeters — Emperor-style adds) are hidden by
  // default since it's a niche need; the quiet "N off-tanked" hint next to
  // the online count always shows so nobody's surprised something's
  // hidden. Persisted like the CH-chain mute toggle.
  var _showOffTank = localStorage.getItem('wp_ext_show_offtank') === '1';
  var offtankBtn = document.getElementById('offtankBtn');
  function _paintOffTankBtn(){ if (offtankBtn) offtankBtn.className = 'offtank-btn' + (_showOffTank ? ' on' : ''); }
  _paintOffTankBtn();
  if (offtankBtn) {
    offtankBtn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    offtankBtn.addEventListener('mouseleave', function(){ try { window.mimic.overlayHoverInteractive(false); } catch (e) {} });
    offtankBtn.addEventListener('click', function(){
      _showOffTank = !_showOffTank;
      localStorage.setItem('wp_ext_show_offtank', _showOffTank ? '1' : '0');
      _paintOffTankBtn();
      render(_lastPayload);
    });
  }

  var _lastPayload = null;
  function render(payload){
    _lastPayload = payload;
    var rowsEl  = document.getElementById('rows');
    var emptyEl = document.getElementById('empty');
    var cntEl   = document.getElementById('cnt');
    var footEl  = document.getElementById('foot');
    var all = (payload && Array.isArray(payload.targets)) ? payload.targets : [];
    var targets = _showOffTank ? all : all.filter(function(t){ return !(t.off_tank && !t.raider_count); });
    var offTankCount = (payload && payload.off_tank_count) || 0;
    if (!targets.length) {
      rowsEl.innerHTML = '';
      emptyEl.style.display = 'block';
      emptyEl.textContent = (payload && payload.loading) ? 'loading…'
        : (all.length ? 'no directly-targeted mobs — toggle 🛡 off-tanks to see ' + offTankCount + ' held' : 'waiting for raid targets…');
      cntEl.textContent = (!_showOffTank && offTankCount) ? '🛡 ' + offTankCount + ' off-tanked' : '';
      footEl.style.display = 'none';
      try { window.mimic && window.mimic.autoFitOverlay && window.mimic.autoFitOverlay(document.getElementById('wrap')); } catch (e) {}
      return;
    }
    emptyEl.style.display = 'none';
    var cntTxt = (payload.online != null ? payload.online + ' online' : '');
    if (!_showOffTank && offTankCount) cntTxt += (cntTxt ? ' · ' : '') + '🛡 ' + offTankCount + ' off-tanked';
    cntEl.textContent = cntTxt;
    var html = '';
    var anyAmb = false;
    // Group same-name mobs (ambiguous / same_name_count>1) so their debuffs
    // pool into ONE block instead of being falsely divided per row (Uilnayar
    // 2026-07-13). HP rows stay per-mob (HP is reliable per target). Members
    // render together at the first member's sort position; other kinds render
    // normally.
    var groupsByName = {};
    for (var gi = 0; gi < targets.length; gi++) {
      var gt = targets[gi];
      if (gt.ambiguous || (gt.same_name_count && gt.same_name_count > 1)) {
        (groupsByName[gt.name] = groupsByName[gt.name] || []).push(gt);
      }
    }
    var renderedGroup = {};
    for (var i = 0; i < targets.length; i++) {
      var t = targets[i];
      if (t.ambiguous) anyAmb = true;
      var grp = groupsByName[t.name];
      if (grp && grp.length > 1) {
        if (renderedGroup[t.name]) continue;   // group already emitted
        renderedGroup[t.name] = true;
        for (var j = 0; j < grp.length; j++) html += rowHtml(grp[j], true);   // rows w/o per-mob debuffs
        var pooled = pooledDebuffs(grp);
        if (pooled.length) html += debuffBlock(pooled, 'on one of these ' + grp.length + ':');
      } else {
        html += rowHtml(t, false);
      }
    }
    // Byte-stability guard (2026-07-07 review): identical HTML -> skip the
    // innerHTML re-layout AND the autofit IPC round-trip.
    if (rowsEl.__wpHtml !== html) {
      rowsEl.innerHTML = html;
      rowsEl.__wpHtml = html;
      try { window.mimic && window.mimic.autoFitOverlay && window.mimic.autoFitOverlay(document.getElementById('wrap')); } catch (e) {}
    }
    footEl.style.display = anyAmb ? 'block' : 'none';
  }

  async function tick(){
    try {
      var r = await fetch('http://127.0.0.1:'+PORT+'/api/extended-target', { cache: 'no-store' });
      var p = await r.json();
      document.getElementById('conn').className = 'conn ok';
      document.getElementById('conn').textContent = '●';
      render(p);
    } catch (e) {
      var c = document.getElementById('conn'); c.className = 'conn bad'; c.textContent = '○';
    }
  }
  tick(); setInterval(tick, 2000);
</script>
</body></html>
