<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Mimic — loading</title>
<style>
  html,body{height:100%;margin:0;background:#0e1116;color:#c9d1d9;
    font-family:ui-monospace,Menlo,Consolas,monospace;display:flex;align-items:center;justify-content:center}
  .box{text-align:center}
  .wolf{font-size:48px;margin-bottom:12px}
  .t{color:#58a6ff;font-size:18px}
  .s{color:#8b949e;font-size:12px;margin-top:8px}
  .spin{margin-top:18px;width:24px;height:24px;border:3px solid #2a3140;border-top-color:#58a6ff;border-radius:50%;
    animation:r .8s linear infinite;display:inline-block}
  @keyframes r{to{transform:rotate(360deg)}}
</style></head>
<body>
  <div class="box">
    <div class="wolf">🐺</div>
    <div class="t">Wolf Pack Mimic <span style="color:#8b949e;font-size:11px">beta</span></div>
    <div class="s">Starting the parser engine…</div>
    <div class="spin"></div>
    <div class="s" style="margin-top:16px">No Node.js install needed — Mimic brings its own.</div>
  </div>
</body></html>
