<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>mobinfo</title>
<style>
  /* Mob Info overlay — current target's catalog stats (HP, AC, resists, special
     attacks) from eqemu_npc_types via the bot, with the live target HP% layered
     on. Read-only; no tickdown. */
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;
    font-family:ui-monospace,Menlo,Consolas,monospace;color:#fff;user-select:none;}
  #wrap{padding:7px 9px;}
  .title{display:flex;align-items:center;gap:8px;
    font-size:12px;color:#d2a8ff;text-shadow:0 1px 2px #000;margin-bottom:5px;}
  .title > :first-child{margin-right:6px}
  /* Level / level-range badge next to the title — surfaces "L52-54" front-
     and-center so the user doesn't have to read the sub line. */
  .lvlRange{font-size:11px;color:#f0b429;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:0.5px;margin-right:auto}
  .lvlRange:empty{margin-right:auto}
  .conn{font-size:11px}
  .conn.ok{color:#56d364} .conn.bad{color:#8b949e}
  .mob{padding:5px 7px;background:rgba(8,5,16,0.72);border-radius:6px;
    border-left:3px solid #a371f7;text-shadow:0 1px 2px #000;}
  .mob .nm{font-size:12px;font-weight:bold;color:#e9d5ff}
  .mob .cls{font-size:10px;color:#9b8bb5;margin-left:4px}
  .mob .zone{font-size:9px;color:#79c0ff;margin-top:1px}
  .mob .sub{font-size:9px;color:#8b949e;margin-top:1px;font-variant-numeric:tabular-nums}
  .hpbar{height:6px;background:rgba(255,255,255,0.13);border-radius:3px;overflow:hidden;margin-top:4px}
  .hpbar > div{height:100%;transition:width 250ms linear,background 250ms linear}
  /* Mana bar — same shape as HP, blue-shifted. Sits directly under HP for
     spellcaster NPCs. Hidden when mob has 0 mana (Nagafen, melee mobs). */
  .manabar{height:5px;background:rgba(255,255,255,0.13);border-radius:3px;overflow:hidden;margin-top:2px}
  .manabar > div{height:100%;background:#5a8af0;transition:width 250ms linear}
  .mob .mana{font-size:9px;color:#79c0ff;margin-top:2px;font-variant-numeric:tabular-nums}
  /* observed buffs on the current target (timed from the cast that landed) */
  .tbuffs{margin-top:6px;display:flex;flex-direction:column;gap:3px}
  .tbuffs .hdr{font-size:9px;color:#6b7280;letter-spacing:0.05em;text-transform:uppercase}
  .tbuff{display:flex;align-items:center;gap:5px;font-size:10px;line-height:1.2}
  .tbuff .bn{color:#d2a8ff;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis}
  .tbuff .bt{font-variant-numeric:tabular-nums;color:#8b949e;margin-left:auto}
  .tbuff .bbar{flex:1 1 50px;height:4px;background:rgba(255,255,255,0.13);border-radius:2px;overflow:hidden}
  .tbuff .bbar > div{height:100%;background:#a371f7;transition:width 250ms linear}
  /* resist grid */
  .res{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:7px}
  .res .cell{text-align:center;background:rgba(255,255,255,0.05);border-radius:4px;padding:3px 0}
  .res .lab{font-size:9px;color:#8b949e;letter-spacing:0.5px}
  .res .val{font-size:13px;font-weight:bold;font-variant-numeric:tabular-nums}
  /* tabs — right margin clears the ✕ hide button at top-right (24px wide
     plus a 4px gutter), so the Loot/Spells tabs never overlap it. */
  .tabs{display:flex;gap:2px;margin-left:auto;margin-right:28px}
  .tab{background:rgba(255,255,255,0.05);color:#9aa4ad;border:1px solid rgba(255,255,255,0.10);
       border-radius:4px;padding:1px 7px;font-size:10px;cursor:pointer;font-family:inherit;letter-spacing:0.5px}
  .tab:hover{color:#fff;border-color:#a371f7}
  .tab.on{background:#2a1d3d;color:#d2a8ff;border-color:#a371f7}
  .tab .beta{font-size:8px;color:#1f1300;background:#f0b429;border-radius:2px;padding:0 3px;margin-left:3px;font-weight:600}
  /* loot list — slightly smaller text, tighter rows so the table fits more
     items at a glance. Top padding keeps the first row out from under the ✕
     hide button at top-right (previous layout had the % column overlapping). */
  .loot{margin-top:5px;padding-top:18px;display:flex;flex-direction:column;gap:1px;font-size:9px}
  .loot .row{display:flex;align-items:baseline;gap:5px;padding:1px 5px;background:rgba(255,255,255,0.03);
             border-radius:3px;border-left:2px solid transparent;line-height:1.4}
  .loot .row.t100{border-left-color:#56d364}                  /* guaranteed */
  .loot .row.t50 {border-left-color:#3b82f6}                  /* common */
  .loot .row.t20 {border-left-color:#a371f7}                  /* uncommon */
  .loot .row.t5  {border-left-color:#f0883e}                  /* rare */
  .loot .row.t1  {border-left-color:#f85149}                  /* ultra rare */
  .loot .nm{color:#e6edf3;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* Percent is the headline data point — bold + slightly larger than the chips
     so the drop rate reads at a glance, even on the narrowest overlay width.
     Tier-tinted by the row's border-left color so high-chance items pop. */
  .loot .pct{font-variant-numeric:tabular-nums;color:#c9d1d9;font-size:9px;
    font-weight:600;min-width:32px;text-align:right}
  .loot .pct.high{color:#56d364}
  .loot .row.t100 .pct{color:#56d364}
  .loot .row.t50  .pct{color:#3b82f6}
  .loot .row.t20  .pct{color:#a371f7}
  .loot .row.t5   .pct{color:#f0883e}
  .loot .row.t1   .pct{color:#f85149}
  .loot .lore{font-size:8px;color:#d2a8ff;padding:0 3px;border-radius:2px;background:rgba(163,113,247,0.2)}
  .loot .seen{font-size:8px;color:#a371f7;padding:0 4px;border-radius:2px;background:rgba(163,113,247,0.15);
              border:1px solid rgba(163,113,247,0.35);font-variant-numeric:tabular-nums;font-weight:600;letter-spacing:0.5px}
  /* Unique (only-this-mob) win counts ride brighter; shared/multi-source ones
     dim out so the eye reads "reliable" vs "approximate" at a glance. */
  .loot .seen.uniq{color:#7ee787;background:rgba(126,231,135,0.12);border-color:rgba(126,231,135,0.35)}
  .loot .seen.shared{opacity:0.7}
  .loot .unique{font-size:10px;line-height:1;margin-right:2px;color:#f0b429}
  .loot .empty{font-size:11px;color:#6e7681;font-style:italic;padding:5px 0}
  /* special attack chips */
  .spec{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
  .spec .chip{font-size:10px;padding:2px 7px;border-radius:4px;background:#2a1d3d;
    color:#d2a8ff;border:1px solid #3d2a57}
  .spec .chip.warn{background:#3d1d1d;color:#ffb3b3;border-color:#5a2a2a}
  .spec .chip.imm{background:#1d2a3d;color:#9ecbff;border-color:#2a3d57}
  #empty{color:rgba(255,255,255,0.5);font-size:12px;text-shadow:0 1px 2px #000;padding:4px 0}
  /* drag/lock/setup chrome — same pattern as the other overlays. */
  #drag-controls{display:none;position:fixed;top:4px;left:4px;gap:4px;z-index:60}
  body.unlocked #drag-controls{display:flex}
  body.unlocked{outline:2px solid rgba(163,113,247,0.7);outline-offset:-2px}
  .drag-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    background:rgba(163,113,247,0.92);color:#fff;border:1px solid rgba(255,255,255,0.4);
    border-radius:4px;font-size:13px;line-height:1;cursor:move;user-select:none}
  #lock-btn{cursor:pointer;font-size:11px}
  #setupbar{display:none;position:fixed;top:0;left:0;right:0;align-items:center;gap:8px;
    padding:4px 8px;background:rgba(163,113,247,0.92);color:#fff;font-size:10px;font-weight:600;z-index:50}
  body.setup #setupbar{display:flex}
  body.setup #drag-controls{top:28px}
  body.setup #wrap{margin-top:26px}
  #setupbar input[type=range]{flex:1;cursor:pointer}
  #hide-btn{position:fixed;top:6px;right:6px;z-index:65;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;border-radius:4px;
    background:rgba(14,17,22,0.6);color:#8b949e;border:1px solid rgba(110,118,129,0.3);
    font-size:11px;line-height:1;cursor:pointer;opacity:0.45;transition:opacity .12s}
  #hide-btn:hover{opacity:1;color:#f87171;border-color:#f87171}
  body.setup #hide-btn{top:30px}
  #move-btn{position:fixed;top:6px;left:6px;z-index:65;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;border-radius:4px;
    background:rgba(14,17,22,0.6);color:#8b949e;border:1px solid rgba(110,118,129,0.3);
    font-size:11px;line-height:1;cursor:move;opacity:0.45;transition:opacity .12s}
  #move-btn:hover{opacity:1;color:#a371f7;border-color:#a371f7}
  body.setup #move-btn{top:30px}
</style></head>
<body>
  <button id="move-btn" title="Drag from this icon to move the overlay (top-left corner — same on every overlay)">✥</button>
  <button id="hide-btn" title="Hide Mob Info (turn back on from the tray → Overlays)">✕</button>
  <div id="drag-controls">
    <div id="move-handle" class="drag-btn" title="Drag to move">✥</div>
    <div id="lock-btn"   class="drag-btn" title="Lock in place">🔒</div>
  </div>
  <div id="setupbar">
    <span>🛠 Mob Info</span>
    <span>opacity</span><input id="opacitySlider" type="range" min="0.15" max="1" step="0.05" value="1" /><span id="opacityVal">100%</span>
    <button id="exitSetupBtn">Done</button>
  </div>
  <div id="wrap">
    <div class="title">
      <span id="conn" class="conn bad">○</span>
      <span>🎯 Mob Info</span>
      <span id="lvlRange" class="lvlRange"></span>
      <span class="tabs">
        <button id="tabStats"  class="tab on" type="button">Stats</button>
        <button id="tabLoot"   class="tab"    type="button">Loot</button>
        <button id="tabSpells" class="tab"    type="button">Spells</button>
      </span>
    </div>
    <div id="body"></div>
    <div id="empty">no target</div>
  </div>
<script>
  let PORT = 7779;
  window.mimic && window.mimic.onAgentPort && window.mimic.onAgentPort(p => { PORT = p; });
  window.mimic && window.mimic.getAgentPort && window.mimic.getAgentPort().then(p => { if (p) PORT = p; });

  if (window.mimic && window.mimic.onOverlayLocked) {
    window.mimic.onOverlayLocked(locked => { document.body.classList.toggle('unlocked', !locked); });
  }
  var lockBtn = document.getElementById('lock-btn');
  if (lockBtn) lockBtn.addEventListener('click', function(){ try { window.mimic.setOverlaysLocked(true); } catch (e) {} });

  var hideBtn = document.getElementById('hide-btn');
  if (hideBtn) {
    hideBtn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    hideBtn.addEventListener('mouseleave', function(){ try { window.mimic.overlayHoverInteractive(false); } catch (e) {} });
    hideBtn.addEventListener('click', function(){ try { window.mimic.hideThisOverlay(); } catch (e) {} });
  }

  var moveHandle = document.getElementById('move-handle');
  var moveBtn    = document.getElementById('move-btn');
  var _dragging = false;
  function _beginDrag(e){
    if (e.button !== 0) return; e.preventDefault(); _dragging = true;
    try { window.mimic.overlayDragStart(); } catch (err) {}
  }
  if (moveHandle) moveHandle.addEventListener('mousedown', _beginDrag);
  if (moveBtn) {
    moveBtn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    moveBtn.addEventListener('mouseleave', function(){ if (!_dragging) { try { window.mimic.overlayHoverInteractive(false); } catch (e) {} } });
    moveBtn.addEventListener('mousedown', _beginDrag);
    // Right-click ✥ → shared chrome menu (resize presets + Setup THIS/ALL).
    try { window.mimic.attachOverlayMenu(moveBtn); } catch (e) {}
  }
  document.addEventListener('mouseup', function(){ if (_dragging){ _dragging=false; try{window.mimic.overlayDragEnd();}catch(e){} try{window.mimic.overlayHoverInteractive(false);}catch(e){} } });
  window.addEventListener('blur', function(){ if (_dragging){ _dragging=false; try{window.mimic.overlayDragEnd();}catch(e){} } });

  var _overlayKey = null;
  var _setupScope = null;
  if (window.mimic && window.mimic.onSetupMode) {
    window.mimic.onSetupMode(function(p){ _overlayKey = p && p.overlayKey; if (p && p.scope) _setupScope = p.scope; else if (p && p.active) _setupScope = 'all'; document.body.classList.toggle('setup', !!(p && p.active)); });
  }
  var slider = document.getElementById('opacitySlider'); var oVal = document.getElementById('opacityVal');
  if (slider) slider.addEventListener('input', function(){
    var v = parseFloat(slider.value || '1'); if (oVal) oVal.textContent = Math.round(v*100)+'%';
    if (_overlayKey && window.mimic && window.mimic.setOverlayOpacity) { try { window.mimic.setOverlayOpacity(_overlayKey, v); } catch (e) {} }
  });
  var doneBtn = document.getElementById('exitSetupBtn');
  if (doneBtn) doneBtn.addEventListener("click", function(){ try { document.body.classList.remove("setup"); } catch (e) {} try { if (_setupScope === "this") window.mimic.setSetupModeThis(false); else window.mimic.setSetupMode(false); } catch (e) {} _setupScope = null; });

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }
  function fmtNum(n){ if (n == null) return '?'; n = +n; if (n >= 1000000) return (n/1000000).toFixed(1)+'M'; if (n >= 1000) return Math.round(n/1000)+'k'; return String(n); }
  function fmtSecs(s){ s = Math.max(0, Math.round(s)); if (s >= 3600) return Math.floor(s/3600)+'h'+String(Math.floor((s%3600)/60)).padStart(2,'0'); var m=Math.floor(s/60); return m+':'+String(s-m*60).padStart(2,'0'); }
  // Buffs on the current target. For our own characters these are live Zeal
  // buffs (real remaining time, no original duration → full bar). For mobs /
  // other players they're observed cast-landings (proportional bar).
  // One buff/debuff row.
  function _tbuffRow(b){
    var hasRem   = b.remaining_secs != null;
    var hasTotal = hasRem && b.total_secs;
    var pct = hasTotal ? Math.max(0, Math.min(100, (b.remaining_secs / b.total_secs) * 100)) : (hasRem ? 100 : 0);
    // Buff = green, debuff (good===0) = red; unknown remaining = gray.
    var col = (b.good === 0) ? '#f85149' : (!hasRem ? '#6e7681' : '#56d364');
    // Right-side label: "cur/max · M:SS" when we know the full duration, else M:SS.
    var bt;
    if (hasTotal) bt = Math.max(0, Math.ceil(b.remaining_secs/6)) + '/' + Math.max(1, Math.round(b.total_secs/6)) + ' · ' + fmtSecs(b.remaining_secs);
    else bt = hasRem ? fmtSecs(b.remaining_secs) : '?';
    // Fell off in the last 5 min → solid purple rebuff cue.
    if (b.fell_off) { col = '#a371f7'; pct = 100; bt = 'fell off'; }
    // Owner-in-parens: charm-spell entries (Allure, etc.) carry the caster's
    // name so other Mimic users targeting the same charmed mob can see who's
    // running it. Rendered dim/italic to differentiate from the spell name
    // itself.
    var ownerStr = (b.owner) ? ' <span style="color:#8b949e;font-style:italic">(' + esc(b.owner) + ')</span>' : '';
    var tip = esc(b.name) + (b.owner ? ' · cast by ' + esc(b.owner) : '')
            + (b.fell_off ? ' · fell off (rebuff)' : (hasRem ? ' · ' + fmtSecs(b.remaining_secs) + ' left' : ' · present'));
    return '<div class="tbuff" title="'+tip+'">'
         +    '<span class="bn">'+esc(b.name)+ownerStr+'</span>'
         +    '<div class="bbar"><div style="width:'+pct.toFixed(0)+'%;background:'+col+'"></div></div>'
         +    '<span class="bt">'+bt+'</span>'
         +  '</div>';
  }
  // Render a titled section for a buff list, sorted by time-left ascending
  // (lowest at top; untimed sink to the bottom). Returns '' if the list is empty.
  function _tbuffSection(hdr, list){
    if (!list || !list.length) return '';
    list.sort(function(a, b){
      var ar = (a && a.remaining_secs != null) ? a.remaining_secs : Infinity;
      var br = (b && b.remaining_secs != null) ? b.remaining_secs : Infinity;
      return ar - br;
    });
    var rows = '';
    for (var i=0;i<list.length;i++){ var b = list[i]; if (b && b.name) rows += _tbuffRow(b); }
    if (!rows) return '';
    return '<div class="tbuffs"><div class="hdr">'+hdr+'</div>'+rows+'</div>';
  }
  function renderTargetBuffs(mi){
    var buffs = (mi && Array.isArray(mi.target_buffs)) ? mi.target_buffs.slice() : null;
    if (!buffs || !buffs.length) return '';
    // Split into Debuffs (good===0) and Buffs (everything else), debuffs first.
    var debuffs = [], goods = [];
    for (var i=0;i<buffs.length;i++){ var b = buffs[i]; if (!b || !b.name) continue; if (b.good === 0) debuffs.push(b); else goods.push(b); }
    var suffix = (mi && mi.target_is_pc) ? '(live)' : '(observed)';
    return _tbuffSection('debuffs '+suffix, debuffs) + _tbuffSection('buffs '+suffix, goods);
  }
  // Cross-client "Casting" section — who is casting what on this target, right
  // now, with a live countdown. Fed by the bot's casting relay; only raiders
  // running Mimic can be named (EQ hides others' spell/target).
  function renderTargetCasting(mi){
    var casts = (mi && Array.isArray(mi.target_casting)) ? mi.target_casting.slice() : null;
    if (!casts || !casts.length) return '';
    var now = Date.now();
    var remOf = function(c){
      if (c && c.ends_at_ms != null) return Math.max(0, (c.ends_at_ms - now) / 1000);
      return (c && c.remaining_secs != null) ? c.remaining_secs : 0;
    };
    casts.sort(function(a,b){ return remOf(a) - remOf(b); });   // finishing soonest first
    var rows = '';
    for (var i=0;i<casts.length;i++){
      var c = casts[i]; if (!c || !c.caster || !c.spell) continue;
      var rem = remOf(c);
      var tot = c.cast_secs || rem || 1;
      var pct = Math.max(0, Math.min(100, (rem / tot) * 100));
      var lbl = rem >= 0.1 ? rem.toFixed(1) + 's' : '✓';
      rows += '<div class="tbuff" title="'+esc(c.caster+' casting '+c.spell)+'">'
           +    '<span class="bn">'+esc(c.caster)+' · '+esc(c.spell)+'</span>'
           +    '<div class="bbar"><div style="width:'+pct.toFixed(0)+'%;background:#58a6ff"></div></div>'
           +    '<span class="bt">'+lbl+'</span>'
           +  '</div>';
    }
    if (!rows) return '';
    return '<div class="tbuffs"><div class="hdr">casting</div>'+rows+'</div>';
  }
  // Special attacks that are dangerous (call out red) vs immunities (blue).
  var WARN_SPECS = { 'Summon':1,'Enrage':1,'Rampage':1,'Area Rampage':1,'Flurry':1,'Bane':1 };
  function specClass(label){ if (WARN_SPECS[label]) return 'chip warn'; if (label.indexOf('Immune')===0 || label.indexOf('Un')===0) return 'chip imm'; return 'chip'; }

  var bodyEl = document.getElementById('body');
  var emptyEl = document.getElementById('empty');

  // Tab state — Stats (default) or Loot. Cached locally so a tab switch doesn't
  // wait for the next 500ms tick to repaint. Loot uses the eqemu_npc_drops view
  // for now; the deeper "Wolf Pack's observed drop rate vs published" lands once
  // we ingest OpenDKP loot history into loot_drops.
  var _tab = 'stats';
  var _lastMi = null;
  var tabStatsBtn  = document.getElementById('tabStats');
  var tabLootBtn   = document.getElementById('tabLoot');
  var tabSpellsBtn = document.getElementById('tabSpells');
  function _setTab(t){
    _tab = t;
    tabStatsBtn .classList.toggle('on', t === 'stats');
    tabLootBtn  .classList.toggle('on', t === 'loot');
    tabSpellsBtn.classList.toggle('on', t === 'spells');
    _renderBody(_lastMi);
  }
  tabStatsBtn .addEventListener('click', function(){ _setTab('stats'); });
  tabLootBtn  .addEventListener('click', function(){ _setTab('loot'); });
  tabSpellsBtn.addEventListener('click', function(){ _setTab('spells'); });
  // Hover-interact handshake — when the overlay is LOCKED (click-through),
  // mouse events normally pass through to EQ underneath. The handshake flips
  // the window briefly interactive while the cursor is over a tab button so
  // the click lands instead of going through. Same pattern the ✕ hide and
  // ✥ move buttons use. Without this, the Loot tab was un-clickable on a
  // locked overlay (the most common reason for "Loot is not clickable").
  [tabStatsBtn, tabLootBtn, tabSpellsBtn].forEach(function(btn){
    if (!btn) return;
    btn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    btn.addEventListener('mouseleave', function(){ try { window.mimic.overlayHoverInteractive(false); } catch (e) {} });
  });

  // Drop-rate buckets so each row carries a color cue. Same intent as the
  // /loot rarity labels — guaranteed > common > uncommon > rare > ultra.
  function lootTier(p){
    if (p == null) return '';
    if (p >= 95) return 't100';
    if (p >= 35) return 't50';
    if (p >= 10) return 't20';
    if (p >= 2)  return 't5';
    return 't1';
  }
  function fmtPct(p){ if (p == null) return '?'; if (p >= 99.95) return '100%'; return p.toFixed(p < 10 ? 1 : 0) + '%'; }
  function renderLoot(mob, mi){
    // Distinguish three empty states:
    //   1. We haven't targeted anything yet → nothing to render at all
    //   2. We have a target, fetch is in flight → "Loading drop table…"
    //   3. Fetch resolved with no rows → "no published drop table for this NPC"
    // Pre-tab versions of this code conflated 2 + 3, so a freshly-targeted
    // mob looked permanently empty for the first 6h cache window. Now the
    // loading state is honest.
    if (!mob) {
      if (mi && mi.loading) return '<div class="loot"><div class="empty">loading drop table…</div></div>';
      return '<div class="loot"><div class="empty">no published drop table for this NPC</div></div>';
    }
    if (!Array.isArray(mob.loot) || !mob.loot.length) {
      return '<div class="loot"><div class="empty">no published drop table for this NPC</div></div>';
    }
    var rows = '';
    for (var i=0;i<mob.loot.length;i++){
      var it = mob.loot[i]; if (!it || !it.name) continue;
      var tier = lootTier(it.pct);
      var pctTxt = fmtPct(it.pct);
      var lore = it.lore ? '<span class="lore" title="LORE — only one per character">LORE</span>' : '';
      // ⭐ = item drops only from THIS mob (so the Wolf Pack win-count is
      //     reliable as "from this mob"). Shared items (spells, gems, common
      //     cloth) get a dim count — could have come from any of N candidates.
      var unique = !!it.unique_to_mob;
      var cands  = +it.candidate_npcs || 0;
      var uniqueChip = unique ? '<span class="unique" title="Unique drop — only this NPC drops this item">⭐</span>' : '';
      // "N× won" — Wolf Pack's TOTAL OpenDKP win count for this item across
      // all sources (confident + ambiguous + unknown). For unique items the
      // count IS from this mob; for shared items it's the total ever won, and
      // the tooltip surfaces how many candidate sources exist.
      var seen = +it.seen || 0;
      var seenTip = unique
        ? 'OpenDKP win-count for this item — drops only from this NPC (unique)'
        : 'Wolf Pack OpenDKP win-count across ALL ' + cands + ' mobs that drop this item';
      var seenChip = seen > 0
        ? '<span class="seen' + (unique ? ' uniq' : ' shared') + '" title="' + esc(seenTip) + '">' + seen + '× won</span>'
        : '';
      var title = it.name + (it.pct != null ? ' · ' + pctTxt + ' published drop rate' : '')
                + (unique ? ' · unique to this mob' : (cands > 1 ? ' · also drops from ' + (cands - 1) + ' other NPC(s)' : ''))
                + (seen > 0 ? ' · won ' + seen + '× by Wolf Pack' : '');
      rows += '<div class="row ' + tier + '" title="' + esc(title) + '">'
            + uniqueChip
            + '<span class="nm">' + esc(it.name) + '</span>'
            + lore
            + seenChip
            + '<span class="pct' + (it.pct >= 50 ? ' high' : '') + '">' + pctTxt + '</span>'
            + '</div>';
    }
    return '<div class="loot">' + rows + '</div>';
  }

  function _renderBody(mi){
    if (!mi || !mi.target_name) {
      bodyEl.innerHTML = '';
      var lvlElEmpty = document.getElementById('lvlRange'); if (lvlElEmpty) lvlElEmpty.textContent = '';
      emptyEl.style.display = 'block';
      return;
    }
    emptyEl.style.display = 'none';
    var mob = mi.mob || null;
    var nm = mob && mob.name ? mob.name : mi.target_name;
    var cls = mob && mob.class ? ' <span class="cls">(' + esc(mob.class) + ')</span>' : '';
    // Header strip — always visible regardless of tab so the user always sees
    // who they're targeting + live HP%.
    var hp = (mi.target_hp_pct != null) ? Math.max(0, Math.min(100, mi.target_hp_pct)) : null;
    var hpColor = hp == null ? '#a371f7' : (hp > 50 ? '#56d364' : (hp > 20 ? '#f0883e' : '#f85149'));
    var hpBar = hp != null ? '<div class="hpbar"><div style="width:'+hp.toFixed(0)+'%;background:'+hpColor+'"></div></div>' : '';
    // Mana — comes from eqemu_npc_types.mana via the bot. Render a bar +
    // numeric line for any NPC with non-zero mana. Live tracking (per-cast
    // subtraction + regen) is a follow-up — this is the catalog baseline.
    var manaBar = '';
    var manaLine = '';
    if (mob && mob.mana && mob.mana > 0) {
      manaBar = '<div class="manabar"><div style="width:100%"></div></div>';
      manaLine = '<div class="mana">' + fmtNum(mob.mana) + ' max mana</div>';
    }
    var sub = [];
    if (mob && mob.hp != null) sub.push(fmtNum(mob.hp) + ' HP');
    if (mob && mob.mindmg != null && mob.maxdmg != null) sub.push(mob.mindmg + '–' + mob.maxdmg + ' dmg');
    // level pulled out of the sub line — surfaces in the top-right title bar
    // as its own badge below, so it stays visible regardless of which tab is
    // selected.
    if (hp != null) sub.push(Math.round(hp) + '%');
    // Title-bar level/range badge
    var lvlEl = document.getElementById('lvlRange');
    if (lvlEl) {
      if (mob && mob.level != null) {
        var max = (mob.maxlevel != null && mob.maxlevel > mob.level) ? mob.maxlevel : null;
        lvlEl.textContent = max ? ('L' + mob.level + '–' + max) : ('L' + mob.level);
      } else {
        lvlEl.textContent = '';
      }
    }

    var tabBody = '';
    if (_tab === 'loot') {
      tabBody = renderLoot(mob, mi);
    } else if (_tab === 'spells') {
      // Spells & abilities tab. Two surfaces stacked:
      //   1) Decoded special-abilities chips (rampage / triple / etc.) at top.
      //   2) The mob's spell list — name + mana + cast time + recast,
      //      sorted by priority (the eqemu npc_spells_entries priority field
      //      is the cast preference). Pulled from /api/agent/mob-info's
      //      new `spells` array; empty if the npc_spells linkage hasn't
      //      synced to Supabase yet for this mob.
      var specChips = '';
      if (mob && Array.isArray(mob.specials) && mob.specials.length){
        for (var sj=0; sj<mob.specials.length; sj++){
          var slab = mob.specials[sj];
          specChips += '<span class="'+specClass(slab)+'">'+esc(slab)+'</span>';
        }
      }
      var specBlock = '<div class="spec" style="padding-top:18px">' + (specChips || '<span class="empty" style="color:#6e7681;font-style:italic">no abilities catalogued</span>') + '</div>';
      var spellsBlock = '';
      if (mob && Array.isArray(mob.spells) && mob.spells.length > 0){
        // Split offensive (good===0 or unknown) from buff (good===1). Buffs
        // are always 'Unresist.' (you can't resist yourself); hide the column
        // entirely there. Offensive keeps the column — 'Magic -200 lure' etc.
        var RESIST_NAME = { 0:'—', 1:'Magic', 2:'Fire', 3:'Cold', 4:'Poison', 5:'Disease', 6:'Chromatic', 7:'Prismatic' };
        function fmtResist(sp){
          var t = (sp.resist_type == null) ? null : Number(sp.resist_type);
          var d = (sp.resist_diff == null) ? null : Number(sp.resist_diff);
          if (t == null || t === 0) return 'Unresist.';
          var lbl = RESIST_NAME[t] || ('R'+t);
          if (d != null && d !== 0) lbl += ' ' + (d < 0 ? d + ' lure' : '+' + d);
          return lbl;
        }
        function fmtMana(v){   return (v != null) ? esc(String(v)) : '—'; }
        function fmtCast(v){   return (v != null) ? (v >= 1000 ? (v/1000).toFixed(1)+'s' : v+'ms') : '—'; }
        function fmtRecast(v){ return (v != null) ? (v >= 1000 ? Math.round(v/1000)+'s' : v+'ms') : '—'; }
        // Render a sectioned table. withResist=false drops the Resist column
        // and uses a wider name column.
        function spellTable(label, list, withResist){
          if (!list.length) return '';
          var cols = withResist ? '1fr 80px 36px 50px 50px' : '1fr 36px 50px 50px';
          var hdr = '<div style="display:grid;grid-template-columns:'+cols+';gap:6px;font-size:9px;color:#6b7280;letter-spacing:0.05em;text-transform:uppercase;padding:0 0 2px;border-bottom:1px solid rgba(110,118,129,0.12);margin-bottom:2px">'
                  +   '<span>'+esc(label)+'</span>'
                  +   (withResist ? '<span style="text-align:right">Resist</span>' : '')
                  +   '<span style="text-align:right">Mana</span>'
                  +   '<span style="text-align:right">Cast</span>'
                  +   '<span style="text-align:right">Recast</span>'
                  + '</div>';
          var rows = '';
          for (var spi = 0; spi < list.length; spi++){
            var sp = list[spi];
            var name = esc(sp.name || ('Spell #' + sp.id));
            rows += '<div style="display:grid;grid-template-columns:'+cols+';gap:6px;padding:1px 0;font-size:10.5px;align-items:baseline">'
                  +   '<span style="color:#d2a8ff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + name + '</span>'
                  +   (withResist ? '<span style="color:#f0b429;text-align:right;font-size:9.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(fmtResist(sp)) + '</span>' : '')
                  +   '<span style="color:#79c0ff;text-align:right;font-variant-numeric:tabular-nums">' + fmtMana(sp.mana) + '</span>'
                  +   '<span style="color:#9aa4ad;text-align:right;font-variant-numeric:tabular-nums">' + fmtCast(sp.cast_ms) + '</span>'
                  +   '<span style="color:#9aa4ad;text-align:right;font-variant-numeric:tabular-nums">' + fmtRecast(sp.recast_ms) + '</span>'
                  + '</div>';
          }
          return '<div style="margin-top:8px">'+hdr+rows+'</div>';
        }
        var offensive = [], buffs = [];
        for (var spj = 0; spj < mob.spells.length; spj++) {
          var sp2 = mob.spells[spj];
          if (sp2 && sp2.good === 1) buffs.push(sp2); else offensive.push(sp2);
        }
        spellsBlock = '<div style="margin-top:8px;padding-top:6px;border-top:1px solid rgba(110,118,129,0.18)">'
                    + spellTable(offensive.length ? 'Offensive (' + offensive.length + ')' : 'Offensive', offensive, true)
                    + spellTable(buffs.length     ? 'Buffs ('     + buffs.length     + ')' : 'Buffs',     buffs,     false)
                    + '</div>';
      } else {
        spellsBlock = '<div class="sub" style="margin-top:8px;color:#6e7681">no spell list catalogued (npc_spells_id missing or eqemu_npc_spells_entries not yet synced).</div>';
      }
      tabBody = specBlock + spellsBlock;
    } else {
      // resist grid (AC + 5 resists)
      var res = '';
      if (mob) {
        var cells = [['AC', mob.ac], ['MR', mob.resists&&mob.resists.mr], ['FR', mob.resists&&mob.resists.fr],
                    ['CR', mob.resists&&mob.resists.cr], ['PR', mob.resists&&mob.resists.pr], ['DR', mob.resists&&mob.resists.dr]];
        function resColor(v){ if (v == null) return '#8b949e'; if (v >= 150) return '#f85149'; if (v >= 75) return '#f0883e'; return '#56d364'; }
        for (var i=0;i<cells.length;i++){
          var lab = cells[i][0], v = cells[i][1];
          var col = lab === 'AC' ? '#d2a8ff' : resColor(v);
          res += '<div class="cell"><div class="lab">'+lab+'</div><div class="val" style="color:'+col+'">'+(v==null?'?':v)+'</div></div>';
        }
        res = '<div class="res">'+res+'</div>';
      }
      var spec = '';
      if (mob && Array.isArray(mob.specials) && mob.specials.length){
        var chips='';
        for (var j=0;j<mob.specials.length;j++){ var lab=mob.specials[j]; chips += '<span class="'+specClass(lab)+'">'+esc(lab)+'</span>'; }
        spec = '<div class="spec">'+chips+'</div>';
      }
      var loadingNote = (!mob && mi.loading) ? '<div class="sub" style="color:#a371f7">looking up stats…</div>'
                       : (!mob ? '<div class="sub">no catalog stats for this target</div>' : '');
      tabBody = res + spec + loadingNote;
    }
    // Corpse target → splice in the just-finished fight's top-damage
    // scoreboard from /api/state.stats.currentEncounterThreat.perPlayer.
    // Reads the agent's local encounter snapshot (already on the wire for
    // the DPS overlay), so no server round-trip and no version bump
    // needed elsewhere. Top 5 players by total damage; tank bar gets a
    // taken-damage flag.
    var isCorpse = (mi.target_name || '').toLowerCase().match(/'s\s+corpse$/);
    var lastFight = '';
    if (isCorpse && mi._enc && mi._enc.perPlayer) {
      var pp = mi._enc.perPlayer;
      var names = Object.keys(pp);
      var rows = names
        .map(function(n){ var v = pp[n] || {}; return { n: n, dmg: (v.swing||0)+(v.proc||0)+(v.spell||0), took: v.took||0 }; })
        .filter(function(r){ return r.dmg > 0 || r.took > 0; })
        .sort(function(a,b){ return b.dmg - a.dmg; })
        .slice(0, 5);
      if (rows.length) {
        var max = rows[0].dmg || 1;
        var rowsHtml = rows.map(function(r){
          var pct = Math.min(100, Math.round(r.dmg / max * 100));
          var dmgTxt = r.dmg >= 1000000 ? (r.dmg/1000000).toFixed(1)+'M' : r.dmg >= 1000 ? (r.dmg/1000).toFixed(1)+'k' : String(r.dmg);
          return '<div style="display:grid;grid-template-columns:1fr 52px;gap:6px;font-size:10px;padding:1px 0;align-items:baseline">'
               +   '<span style="position:relative;color:#e6edf3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'
               +     '<span style="position:absolute;left:0;top:0;bottom:0;width:'+pct+'%;background:rgba(86,211,100,0.18);border-radius:2px;"></span>'
               +     '<span style="position:relative;padding-left:4px">'+esc(r.n)+'</span>'
               +   '</span>'
               +   '<span style="color:#56d364;text-align:right;font-variant-numeric:tabular-nums">'+dmgTxt+'</span>'
               + '</div>';
        }).join('');
        lastFight = '<div style="margin-top:8px;padding-top:6px;border-top:1px solid rgba(110,118,129,0.18)">'
                  +   '<div style="font-size:9px;color:#6b7280;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:3px">last fight (top 5)</div>'
                  +   rowsHtml
                  + '</div>';
      }
    }
    // PC target slot occupancy — "Buffs n/15 · Songs m/6". Authoritative only
    // for Mimic-watched characters (Zeal sees their real buff window); absent
    // for mobs and observed-only players.
    var slotLine = '';
    if (mi.target_slots) {
      var ts = mi.target_slots;
      var bcol = ts.buffs >= ts.buff_max ? '#f0883e' : '#56d364';
      var scol = ts.songs >= ts.song_max ? '#f0883e' : '#56d364';
      slotLine = '<div class="sub">buffs <span style="color:'+bcol+'">'+ts.buffs+'/'+ts.buff_max+'</span>'
               + ' · songs <span style="color:'+scol+'">'+ts.songs+'/'+ts.song_max+'</span></div>';
    }
    bodyEl.innerHTML = '<div class="mob">'
      + '<div><span class="nm">'+esc(nm)+'</span>'+cls+'</div>'
      + (mob && mob.zone ? '<div class="zone">@ '+esc(mob.zone)+'</div>' : '')
      + (sub.length ? '<div class="sub">'+sub.join(' · ')+'</div>' : '')
      + slotLine
      + hpBar
      + manaBar
      + manaLine
      + renderTargetCasting(mi)
      + renderTargetBuffs(mi)
      + tabBody
      + lastFight
      + '</div>';
    // Grow the host window to fit the rendered content so the Loot tab can
    // show every row without a scrollbar. Skipped when the IPC isn't wired
    // (dev / old preload).
    try {
      if (window.mimic && window.mimic.overlayAutoHeight) {
        var w = document.getElementById('wrap') || document.body;
        window.mimic.overlayAutoHeight(w.scrollHeight + 12);
      }
    } catch (e) {}
  }

  async function tick(){
    try {
      const r = await fetch('http://127.0.0.1:'+PORT+'/api/state',{cache:'no-store'});
      const s = await r.json();
      document.getElementById('conn').className = 'conn ok';
      document.getElementById('conn').textContent = '●';
      // Splice the local /api/state.stats.currentEncounterThreat onto the
      // mobInfo blob so corpse-targets can render "Last fight" damage
      // without a server change. The renderer only surfaces it when the
      // target_name ends in "'s corpse" (i.e., the just-killed mob you're
      // now standing on for loot).
      var mi = s.mobInfo;
      if (mi && s.stats && s.stats.currentEncounterThreat) {
        mi = Object.assign({}, mi, { _enc: s.stats.currentEncounterThreat });
      }
      _lastMi = mi;
      _renderBody(_lastMi);
    } catch (e) {
      var c = document.getElementById('conn'); c.className = 'conn bad'; c.textContent = '○';
    }
  }
  tick(); setInterval(tick, 500);
</script>
</body></html>
