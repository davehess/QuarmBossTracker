<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>overlay</title>
<style>
  /* Transparent always-on-top overlay. The window itself is frameless +
     transparent (set in main.js); this just paints a translucent HUD. */
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;
    font-family:ui-monospace,Menlo,Consolas,monospace;color:#e6edf3;user-select:none}
  .hud{background:rgba(14,17,22,0.78);border:1px solid rgba(88,166,255,0.4);
    border-radius:8px;margin:4px;padding:8px 10px;backdrop-filter:blur(2px)}
  .title{font-size:10px;color:#58a6ff;letter-spacing:0.1em;text-transform:uppercase;
    display:flex;justify-content:space-between}
  .boss{font-size:12px;color:#f6c365;margin:4px 0 6px}
  ul{list-style:none;margin:0;padding:0}
  li{display:flex;justify-content:space-between;font-size:11px;padding:1px 0}
  li .n{color:#c9d1d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px}
  li .d{color:#56d364}
  .dim{color:#6b7280;font-size:10px}
  .conn{font-size:9px}
  .conn.ok{color:#56d364}
  .conn.bad{color:#f87171}
  /* Drag bar — visible only when overlays are UNLOCKED. The whole strip is a
     draggable region (-webkit-app-region: drag) so grabbing it moves the
     frameless window. The lock button (no-drag) re-locks in place. */
  #dragbar{display:none;align-items:center;justify-content:space-between;
    gap:6px;margin:4px 4px 0;padding:4px 8px;border-radius:6px;
    background:rgba(31,111,235,0.85);color:#fff;font-size:10px;
    -webkit-app-region:drag;user-select:none}
  body.unlocked #dragbar{display:flex}
  body.unlocked .hud{border-color:rgba(31,111,235,0.9);
    box-shadow:0 0 0 1px rgba(31,111,235,0.6)}
  #lockbtn{-webkit-app-region:no-drag;cursor:pointer;background:#0e1116;
    border:1px solid rgba(255,255,255,0.3);border-radius:4px;color:#fff;
    font-size:10px;padding:2px 7px}
  #lockbtn:hover{background:#1a2230}
  .movehint{display:flex;align-items:center;gap:4px}
  .compass{display:inline-block;font-size:13px;line-height:1;cursor:move;
    animation:nudge 1.4s ease-in-out infinite}
  /* A gentle 4-direction nudge so the move affordance reads at a glance. */
  @keyframes nudge{
    0%,100%{transform:translate(0,0)}
    25%{transform:translate(0,-1.5px)}
    50%{transform:translate(1.5px,0)}
    75%{transform:translate(0,1.5px)}
  }
  /* When unlocked, also show resize grips at the corners as a hint. */
  body.unlocked::after{content:'⤡';position:fixed;right:2px;bottom:0;
    color:rgba(31,111,235,0.9);font-size:14px;pointer-events:none}
  /* Setup-mode control strip — appears on every overlay at once when the
     user enters Setup mode. Opacity slider + lock-here button. */
  #setupbar{display:none;align-items:center;gap:8px;margin:0 4px;padding:4px 8px;
    background:rgba(214,153,34,0.92);color:#222;font-size:10px;border-radius:0 0 6px 6px;
    -webkit-app-region:no-drag;font-weight:600}
  body.setup #setupbar{display:flex}
  #setupbar input[type=range]{flex:1;cursor:pointer}
</style></head>
<body>
  <div id="dragbar">
    <span class="movehint"><span class="compass">✥</span> drag to move&nbsp; · &nbsp;resize from edges</span>
    <button id="lockbtn">🔒 Lock here</button>
  </div>
  <div id="setupbar">
    <span>🛠 Setup</span>
    <span>opacity</span>
    <input id="opacitySlider" type="range" min="0.15" max="1" step="0.05" value="1" />
    <span id="opacityVal">100%</span>
    <button id="exitSetupBtn">Done</button>
  </div>
  <div class="hud">
    <div class="title"><span>🐺 Mimic — live</span><span id="conn" class="conn bad">○</span></div>
    <div class="boss" id="boss">—</div>
    <ul id="deeps"></ul>
    <div class="dim" id="empty">waiting for combat…</div>
  </div>
<script>
  // Poll the agent's /api/state and render the top damage + current boss. The
  // agent exposes the same `stats` object the dashboard uses; we read the
  // fields defensively since the shape evolves across agent versions.
  let PORT = 7779;
  window.mimic && window.mimic.onAgentPort && window.mimic.onAgentPort(p => { PORT = p; });
  window.mimic && window.mimic.getAgentPort && window.mimic.getAgentPort().then(p => { if (p) PORT = p; });

  // Lock/unlock — main process pushes the state; we toggle the body class so
  // the drag bar appears. The Lock-here button re-locks via IPC (no restart).
  if (window.mimic && window.mimic.onOverlayLocked) {
    window.mimic.onOverlayLocked(locked => {
      document.body.classList.toggle('unlocked', !locked);
    });
  }
  document.getElementById('lockbtn') && (document.getElementById('lockbtn').onclick = () => {
    try { window.mimic.setOverlaysLocked(true); } catch (e) {}
  });

  // Setup-mode wiring — main pushes { active, overlayKey } when entering /
  // exiting setup. We show #setupbar, hook the opacity slider, and bind the
  // Done button to flip setup mode back off (without locking) so the user
  // can still nudge things post-setup.
  var _overlayKey = null;
  if (window.mimic && window.mimic.onSetupMode) {
    window.mimic.onSetupMode(function(p) {
      _overlayKey = p && p.overlayKey;
      document.body.classList.toggle('setup', !!(p && p.active));
    });
  }
  var slider = document.getElementById('opacitySlider');
  var oVal   = document.getElementById('opacityVal');
  if (slider) {
    slider.addEventListener('input', function() {
      var v = parseFloat(slider.value || '1');
      if (oVal) oVal.textContent = Math.round(v * 100) + '%';
      if (_overlayKey && window.mimic && window.mimic.setOverlayOpacity) {
        try { window.mimic.setOverlayOpacity(_overlayKey, v); } catch (e) {}
      }
    });
  }
  var doneBtn = document.getElementById('exitSetupBtn');
  if (doneBtn) doneBtn.addEventListener('click', function() {
    try { window.mimic.setSetupMode(false); } catch (e) {}
  });

  function fmt(n){ n=Number(n)||0; return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':String(n); }

  async function tick(){
    try{
      const r = await fetch('http://127.0.0.1:'+PORT+'/api/state',{cache:'no-store'});
      const s = await r.json();
      document.getElementById('conn').className='conn ok';
      document.getElementById('conn').textContent='●';

      // Current boss/threat — try a few likely fields.
      const boss = (s.currentEncounterThreat && s.currentEncounterThreat.bossName)
                 || s.currentBoss || (s.lastEncounter && s.lastEncounter.bossName) || null;
      document.getElementById('boss').textContent = boss ? boss : '—';

      // Top damage from the agent's sessionDeeps map. Each entry is bucketed by
      // melee / spell / proc / dot — there is NO top-level .damage/.total, so we
      // sum the category totals (mirrors the agent's own DEEPS tab). Reading
      // v.damage||v.total used to miss every bucket and fall back to the object
      // itself → fmt(object) → 0, which is why every row showed 0.
      const deepsTotal = (v) => {
        if (!v || typeof v !== 'object') return Number(v) || 0;
        if (typeof v.damage === 'number') return v.damage;   // tolerate flat/array shapes
        if (typeof v.total  === 'number') return v.total;
        return ((v.melee && v.melee.total) || 0) + ((v.spell && v.spell.total) || 0)
             + ((v.proc  && v.proc.total)  || 0) + ((v.dot   && v.dot.total)   || 0);
      };
      let rows = [];
      const sd = s.sessionDeeps || s.topDamage || s.deeps;
      if (Array.isArray(sd)) rows = sd.map(d => [d.name||d.character, deepsTotal(d)]);
      else if (sd && typeof sd==='object') rows = Object.entries(sd).map(([k,v]) => [k, deepsTotal(v)]);
      // Drop NPCs (names with a space, same as the dashboard) and zero rows.
      rows = rows.filter(x => x[0] && !/\s/.test(x[0]) && x[1] > 0)
                 .sort((a,b)=>(b[1]||0)-(a[1]||0)).slice(0,5);

      const ul = document.getElementById('deeps');
      ul.innerHTML = rows.map(([n,d])=>`<li><span class="n">${n}</span><span class="d">${fmt(d)}</span></li>`).join('');
      document.getElementById('empty').style.display = rows.length ? 'none' : 'block';
    }catch(e){
      const c=document.getElementById('conn'); c.className='conn bad'; c.textContent='○';
    }
  }
  tick(); setInterval(tick, 1000);
</script>
</body></html>
