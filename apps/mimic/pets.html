<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>pets</title>
<style>
  /* Pet tracker overlay — transparent, always-on-top. For SUMMONED pets
     (mage/necro/beastlord), distinct from the charm tracker: no 6s mob-tick
     countdown, no recharm/break alarms. Shows each pet's HP and its buff
     counters from the last /pet health report, with remaining-time chips. */
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;
    font-family:ui-monospace,Menlo,Consolas,monospace;color:#fff;user-select:none;}
  #wrap{padding:6px 8px;}
  .title{display:flex;align-items:center;gap:8px;
    font-size:12px;color:#79c0ff;text-shadow:0 1px 2px #000;margin-bottom:4px;}
  .conn{font-size:11px}
  .conn.ok{color:#56d364} .conn.bad{color:#8b949e}
  .pet{position:relative;padding:5px 8px;margin-bottom:5px;background:rgba(0,0,0,0.55);
    border-radius:5px;border-left:3px solid #58a6ff;text-shadow:0 1px 2px #000;}
  .pet.stale{border-left-color:#6e7681}
  .pet .head{display:flex;justify-content:space-between;gap:8px;font-size:12px}
  .pet .nm{font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pet .owner{color:#8b949e;font-size:10px}
  .pet .meta{font-size:10px;color:#c9d1d9;margin-top:1px;font-variant-numeric:tabular-nums}
  .pet .meta .hp{color:#56d364;font-weight:bold}
  .hpbar{height:5px;background:rgba(255,255,255,0.14);border-radius:2px;overflow:hidden;margin-top:3px}
  .hpbar > div{height:100%;transition:width 200ms linear,background 200ms linear}
  /* buff chips — same tone tiers as the web BuffChip: dim → low (orange ≤6m)
     → crit (red ≤2m). */
  .petbuffs{margin-top:4px;display:flex;flex-wrap:wrap;gap:4px;font-size:10px;line-height:1.2}
  .petbuffs.stale{opacity:0.55}
  .petbuff{padding:1px 5px;border-radius:3px;background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.10);color:#c9d1d9}
  .petbuff .bn{color:#7ee787}
  .petbuff .t{font-variant-numeric:tabular-nums;margin-left:4px;color:#8b949e}
  .petbuff.low .t{color:#f0883e}
  .petbuff.crit .t{color:#f85149}
  .petbuff .t.q{color:#6e7681}
  .petbuffs .src{font-size:9px;color:#6e7681;align-self:center;margin-left:2px}
  /* Pet target — "→ Lord Nagafen 5s ago". Tiny one-liner under the HP bar. */
  .pettarget{font-size:10px;color:#9aa4ad;margin-top:3px;display:flex;
    align-items:baseline;gap:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pettarget .tgt{color:#f0883e;font-weight:600}
  .pettarget .ago{color:#6e7681;font-size:9px}
  /* combat stats — running attack signature for the current pet. dual-wield
     pill highlights when ≥2 skill buckets observed. */
  .petstats{margin-top:4px;display:flex;flex-wrap:wrap;gap:4px;font-size:10px;line-height:1.2;color:#c9d1d9}
  .petstats .blk{background:rgba(255,255,255,0.05);padding:1px 5px;border-radius:3px;border:1px solid rgba(255,255,255,0.10)}
  .petstats .blk b{color:#7ee787;font-variant-numeric:tabular-nums}
  .petstats .dw{background:#3d1d1d;color:#ff7b72;border-color:#5a2a2a;font-weight:600;letter-spacing:0.5px}
  .petstats .sk{background:rgba(88,166,255,0.10);color:#9ecbff;border-color:rgba(88,166,255,0.25)}
  /* ✕ dismiss — top-right of each card; dims by default, hover red. */
  .pet .dismiss{position:absolute;top:3px;right:4px;width:14px;height:14px;display:flex;
    align-items:center;justify-content:center;background:rgba(14,17,22,0.4);color:#6e7681;
    border:1px solid rgba(110,118,129,0.25);border-radius:3px;font-size:10px;line-height:1;
    cursor:pointer;padding:0;opacity:0.35;transition:opacity .12s;font-family:inherit}
  .pet .dismiss:hover{opacity:1;color:#f87171;border-color:#f87171;background:rgba(40,10,10,0.7)}
  #empty{color:rgba(255,255,255,0.5);font-size:12px;text-shadow:0 1px 2px #000}
  /* drag/lock/setup — same pattern as the other overlays. */
  #drag-controls{display:none;position:fixed;top:4px;left:4px;gap:4px;z-index:60}
  body.unlocked #drag-controls{display:flex}
  body.unlocked{outline:2px solid rgba(88,166,255,0.7);outline-offset:-2px}
  .drag-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    background:rgba(88,166,255,0.92);color:#fff;border:1px solid rgba(255,255,255,0.4);
    border-radius:4px;font-size:13px;line-height:1;cursor:move;user-select:none}
  #lock-btn{cursor:pointer;font-size:11px}
  #setupbar{display:none;position:fixed;top:0;left:0;right:0;align-items:center;gap:8px;
    padding:4px 8px;background:rgba(88,166,255,0.92);color:#fff;font-size:10px;font-weight:600;z-index:50}
  body.setup #setupbar{display:flex}
  body.setup #drag-controls{top:28px}
  body.setup #wrap{margin-top:26px}
  #setupbar input[type=range]{flex:1;cursor:pointer}
  #hide-btn{position:fixed;top:6px;right:6px;z-index:65;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;border-radius:4px;
    background:rgba(14,17,22,0.6);color:#8b949e;border:1px solid rgba(110,118,129,0.3);
    font-size:11px;line-height:1;cursor:pointer;opacity:0.45;transition:opacity .12s}
  #hide-btn:hover{opacity:1;color:#f87171;border-color:#f87171}
  body.setup #hide-btn{top:30px}
  #move-btn{position:fixed;top:6px;left:6px;z-index:65;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;border-radius:4px;
    background:rgba(14,17,22,0.6);color:#8b949e;border:1px solid rgba(110,118,129,0.3);
    font-size:11px;line-height:1;cursor:move;opacity:0.45;transition:opacity .12s}
  #move-btn:hover{opacity:1;color:#58a6ff;border-color:#58a6ff}
  body.setup #move-btn{top:30px}
</style></head>
<body>
  <button id="move-btn" title="Drag from this icon to move the overlay (top-left corner — same on every overlay)">✥</button>
  <button id="hide-btn" title="Hide the pet tracker (turn back on from the tray → Overlays)">✕</button>
  <div id="drag-controls">
    <div id="move-handle" class="drag-btn" title="Drag to move">✥</div>
    <div id="lock-btn"   class="drag-btn" title="Lock in place">🔒</div>
  </div>
  <div id="setupbar">
    <span>🛠 Pets</span>
    <span>opacity</span><input id="opacitySlider" type="range" min="0.15" max="1" step="0.05" value="1" /><span id="opacityVal">100%</span>
    <button id="exitSetupBtn">Done</button>
  </div>
  <div id="wrap">
    <div class="title"><span id="conn" class="conn bad">○</span><span>🐾 Pet tracker</span></div>
    <div id="list"></div>
    <div id="empty">no pet — run <b>/pet health</b> in game</div>
  </div>
<script>
  let PORT = 7779;
  window.mimic && window.mimic.onAgentPort && window.mimic.onAgentPort(p => { PORT = p; });
  window.mimic && window.mimic.getAgentPort && window.mimic.getAgentPort().then(p => { if (p) PORT = p; });

  if (window.mimic && window.mimic.onOverlayLocked) {
    window.mimic.onOverlayLocked(locked => { document.body.classList.toggle('unlocked', !locked); });
  }
  var lockBtn = document.getElementById('lock-btn');
  if (lockBtn) lockBtn.addEventListener('click', function(){ try { window.mimic.setOverlaysLocked(true); } catch (e) {} });

  var hideBtn = document.getElementById('hide-btn');
  if (hideBtn) {
    hideBtn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    hideBtn.addEventListener('mouseleave', function(){ try { window.mimic.overlayHoverInteractive(false); } catch (e) {} });
    hideBtn.addEventListener('click', function(){ try { window.mimic.hideThisOverlay(); } catch (e) {} });
  }

  // Manual drag (same Chromium transparent-window workaround as the others).
  var moveHandle = document.getElementById('move-handle');
  var moveBtn    = document.getElementById('move-btn');
  var _dragging = false;
  function _beginDrag(e){
    if (e.button !== 0) return; e.preventDefault(); _dragging = true;
    try { window.mimic.overlayDragStart(); } catch (err) {}
  }
  if (moveHandle) moveHandle.addEventListener('mousedown', _beginDrag);
  if (moveBtn) {
    moveBtn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    moveBtn.addEventListener('mouseleave', function(){ if (!_dragging) { try { window.mimic.overlayHoverInteractive(false); } catch (e) {} } });
    moveBtn.addEventListener('mousedown', _beginDrag);
  }
  document.addEventListener('mouseup', function(){ if (_dragging){ _dragging=false; try{window.mimic.overlayDragEnd();}catch(e){} try{window.mimic.overlayHoverInteractive(false);}catch(e){} } });
  window.addEventListener('blur', function(){ if (_dragging){ _dragging=false; try{window.mimic.overlayDragEnd();}catch(e){} } });

  // Setup mode + opacity slider.
  var _overlayKey = null;
  if (window.mimic && window.mimic.onSetupMode) {
    window.mimic.onSetupMode(function(p){ _overlayKey = p && p.overlayKey; document.body.classList.toggle('setup', !!(p && p.active)); });
  }
  var slider = document.getElementById('opacitySlider'); var oVal = document.getElementById('opacityVal');
  if (slider) slider.addEventListener('input', function(){
    var v = parseFloat(slider.value || '1'); if (oVal) oVal.textContent = Math.round(v*100)+'%';
    if (_overlayKey && window.mimic && window.mimic.setOverlayOpacity) { try { window.mimic.setOverlayOpacity(_overlayKey, v); } catch (e) {} }
  });
  var doneBtn = document.getElementById('exitSetupBtn');
  if (doneBtn) doneBtn.addEventListener('click', function(){ try { window.mimic.setSetupMode(false); } catch (e) {} });

  // Mirror of web/lib/buffs.ts shortBuffName + charm.html — keep all three in
  // sync when a new buff surfaces.
  var SHORT_BUFF_RULES = [
    [/protection of the glades/i, 'POTG'],
    [/protection of the cabbage/i, 'POTC'],
    [/aegolism/i, 'Aego'],
    [/talisman of wunshi/i, 'ToW'],
    [/khura'?s? focusing/i, 'Khuras'],
    [/brell'?s? (?:mountainous barrier|steadfast bulwark|blessing)/i, 'Brell'],
    [/arch shielding/i, 'Arch'],
    [/koadic'?s endless intellect/i, 'KEI'],
    [/clarity ii/i, 'C2'],
    [/visions of grandeur/i, 'VoG'],
    [/gift of pure thought/i, 'GoPT'],
    [/spirit of (?:the )?wolf/i, 'SOW'],
    [/flight of eagles?/i, 'FoE'],
    [/spirit of bihli/i, 'Bihli'],
    [/focus(?:ing)? of spirit/i, 'FoS'],
    [/speed of the shissar/i, 'Shissar'],
  ];
  function shortBuffName(name){
    var raw = String(name || '').trim(); if (!raw) return raw;
    var sym = raw.match(/symbol of (?:the )?(\w+)/i);
    if (sym) { var w = sym[1]; return 'Sym ' + (w[0].toUpperCase() + w.slice(1).toLowerCase()); }
    for (var i=0;i<SHORT_BUFF_RULES.length;i++){ if (SHORT_BUFF_RULES[i][0].test(raw)) return SHORT_BUFF_RULES[i][1]; }
    return raw;
  }
  function fmtRem(remSecs, observedAtMs){
    if (remSecs == null) return '';
    var elapsed = observedAtMs ? Math.max(0, (Date.now() - observedAtMs) / 1000) : 0;
    var s = Math.max(0, Math.round(remSecs - elapsed));
    if (s >= 3600) { var h = Math.floor(s/3600); var mm = Math.round((s%3600)/60); return mm ? (h+'h'+mm+'m') : (h+'h'); }
    if (s >= 60)   return Math.floor(s/60) + 'm';
    return s + 's';
  }
  function buffTone(remSecs, observedAtMs){
    if (remSecs == null) return '';
    var elapsed = observedAtMs ? Math.max(0, (Date.now() - observedAtMs) / 1000) : 0;
    var s = remSecs - elapsed;
    if (s <= 120) return 'crit';
    if (s <= 360) return 'low';
    return '';
  }
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }

  function fmtNum(n){ n = +n || 0; if (n >= 1000000) return (n/1000000).toFixed(1)+'M'; if (n >= 1000) return Math.round(n/1000)+'k'; return String(Math.round(n)); }
  function renderStats(p){
    var s = p.stats; if (!s || !s.total_hits) return '';
    var blocks = '';
    blocks += '<span class="blk" title="Maximum single hit observed">max <b>'+fmtNum(s.max_hit)+'</b></span>';
    blocks += '<span class="blk" title="Mean damage per hit">avg <b>'+fmtNum(s.avg_hit)+'</b></span>';
    blocks += '<span class="blk" title="Total hits landed">hits <b>'+fmtNum(s.total_hits)+'</b></span>';
    blocks += '<span class="blk" title="Cumulative damage dealt">dmg <b>'+fmtNum(s.total_damage)+'</b></span>';
    // Per-skill buckets. Multiple distinct buckets = dual-wielding two
    // different weapon skills. The inverse (two same-skill weapons) cant be
    // proven from verbs alone, just hinted at by high hits-per-fight.
    var sk = s.skills || {};
    var keys = Object.keys(sk);
    for (var i=0;i<keys.length;i++){
      var k = keys[i], v = sk[k] || {};
      blocks += '<span class="blk sk" title="'+esc(k)+': '+v.count+' hits / max '+v.max+' / total '+v.total+'">'+esc(k)+' <b>'+v.count+'</b></span>';
    }
    if (s.dual_wielding) blocks += '<span class="blk dw" title="Two or more distinct weapon skills observed — dual-wielding different weapons.">DUAL</span>';
    return '<div class="petstats">'+blocks+'</div>';
  }
  function renderBuffs(p){
    var buffs = Array.isArray(p.buffs) ? p.buffs : null;
    if (!buffs || !buffs.length) return '';
    var obs = p.observed_at || null;
    var staleMs = obs ? (Date.now() - obs) : null;
    var staleClass = (staleMs != null && staleMs > 5*60*1000) ? ' stale' : '';
    var chips = '';
    for (var i=0;i<buffs.length;i++){
      var b = buffs[i]; if (!b || !b.name) continue;
      // Per-buff observed timestamp: landing-timed buffs carry their own (fresh
      // each poll); /pet-health-only names fall back to the report time.
      var bo = b.observed_at_ms || obs;
      var hasTimer = b.remaining_secs != null;
      var tone = hasTimer ? buffTone(b.remaining_secs, bo) : '';
      var t = hasTimer ? fmtRem(b.remaining_secs, bo) : '';
      // No timer = seen in /pet health but we never witnessed it land. Fall
      // back to a TICK-COUNT + UPTIME from the report's observed timestamp
      // so the bar still tells the user how long this buff has been on
      // their pet — better than a bare "?".
      var tDisp;
      if (hasTimer) {
        tDisp = t;
      } else if (bo) {
        var upMs = Math.max(0, Date.now() - bo);
        var upS  = Math.floor(upMs/1000);
        var ticks = Math.floor(upS / 6);   // EQ tick = 6s
        var mm = Math.floor(upS/60), ss = upS - mm*60;
        tDisp = '~' + ticks + 't · ' + mm + ':' + String(ss).padStart(2,'0');
      } else {
        tDisp = '?';
      }
      var title = b.name + (hasTimer
        ? ' · ' + t + ' left (timed from observed cast)'
        : (bo ? ' · uptime estimate from first observation (duration unknown — landing not seen)'
              : ' · present (no cast seen — duration unknown)'));
      chips += '<span class="petbuff ' + (hasTimer ? tone : '') + '" title="' + esc(title) + '">'
            +    '<span class="bn">' + esc(shortBuffName(b.name)) + '</span>'
            +    '<span class="t' + (hasTimer ? '' : ' q') + '">' + tDisp + '</span>'
            +  '</span>';
    }
    if (!chips) return '';
    var srcLabel = obs ? '/pet health ' + Math.round((Date.now()-obs)/1000) + 's ago' : 'observed casts';
    return '<div class="petbuffs' + staleClass + '">' + chips + '<span class="src" title="' + esc(srcLabel) + '">' + (staleClass ? '⏳' : 'ⓘ') + '</span></div>';
  }
  // Pet target — "Attacking X Master." captured from the command ack. TTL'd
  // server-side so a stale target doesn't render past PET_TARGET_TTL_MS.
  function renderTarget(p){
    if (!p.target) return '';
    var ago = p.target_at ? Math.max(0, Math.round((Date.now() - p.target_at) / 1000)) : null;
    var agoStr = ago != null ? (ago < 60 ? ago + 's' : Math.round(ago/60) + 'm') + ' ago' : '';
    return '<div class="pettarget" title="From the pet\'s \"Attacking X Master.\" ack">→ <span class="tgt">' + esc(p.target) + '</span>'
         + (agoStr ? ' <span class="ago">' + esc(agoStr) + '</span>' : '')
         + '</div>';
  }

  var listEl = document.getElementById('list');
  var emptyEl = document.getElementById('empty');

  async function tick(){
    try {
      const r = await fetch('http://127.0.0.1:'+PORT+'/api/state',{cache:'no-store'});
      const s = await r.json();
      document.getElementById('conn').className = 'conn ok';
      document.getElementById('conn').textContent = '●';
      const pets = (s.petHealth || []);
      var html = '';
      for (const p of pets) {
        var obs = p.observed_at || null;
        var ageMs = obs ? (Date.now() - obs) : null;
        var stale = ageMs != null && ageMs > 5*60*1000;
        var hp = (p.hp_pct != null) ? Math.max(0, Math.min(100, p.hp_pct)) : null;
        var hpColor = hp == null ? '#58a6ff' : (hp > 50 ? '#56d364' : (hp > 20 ? '#f0883e' : '#f85149'));
        var hpStr = hp != null ? ' · <span class="hp">' + Math.round(hp) + '%</span>' : '';
        var hpBar = hp != null
          ? '<div class="hpbar"><div style="width:' + hp.toFixed(0) + '%;background:' + hpColor + '"></div></div>'
          : '';
        var ageStr = obs ? ' · ' + Math.round(ageMs/1000) + 's ago' : '';
        html += '<div class="pet' + (stale ? ' stale' : '') + '" data-owner="' + esc(p.owner || '') + '">'
          + '<button class="dismiss" data-dismiss="' + esc(p.owner || '') + '" title="Dismiss — remove this pet from the tracker">&times;</button>'
          + '<div class="head"><span class="nm">' + esc(p.pet || 'pet') + '</span>'
          + '<span class="owner">' + esc(p.owner || '') + '</span></div>'
          + '<div class="meta">HP' + (hp != null ? '' : ' ?') + hpStr + ageStr + '</div>'
          + hpBar
          + renderTarget(p)
          + renderBuffs(p)
          + renderStats(p)
          + '</div>';
      }
      listEl.innerHTML = html;
      emptyEl.style.display = pets.length ? 'none' : 'block';
      _requestAutoHeight();
    } catch (e) {
      var c = document.getElementById('conn'); c.className = 'conn bad'; c.textContent = '○';
    }
  }
  function _requestAutoHeight(){
    if (!(window.mimic && window.mimic.overlayAutoHeight)) return;
    var w = document.getElementById('wrap'); if (!w) return;
    try { window.mimic.overlayAutoHeight(w.scrollHeight + 8); } catch (e) {}
  }
  // Delegated dismiss handler (see charm.html for the why).
  listEl.addEventListener('click', function(e){
    var btn = e.target && e.target.closest && e.target.closest('button.dismiss');
    if (!btn) return;
    e.stopPropagation();
    var owner = btn.getAttribute('data-dismiss');
    if (!owner) return;
    btn.disabled = true; btn.style.opacity = 0.2;
    fetch('http://127.0.0.1:'+PORT+'/api/pet/dismiss', {
      method: 'POST', cache: 'no-store',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ owner: owner })
    }).catch(function(){}).then(function(){ tick(); });
  });
  tick(); setInterval(tick, 500);
</script>
</body></html>
