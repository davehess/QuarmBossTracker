<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Mimic Settings</title>
<style>
  body{margin:0;background:#0e1116;color:#c9d1d9;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;padding:20px}
  h1{color:#f6c365;font-size:16px;font-weight:normal;margin:0 0 4px}
  .sub{color:#8b949e;font-size:11px;margin-bottom:18px}
  label{display:block;color:#8b949e;font-size:11px;margin:12px 0 4px}
  input{width:100%;box-sizing:border-box;background:#161b22;border:1px solid #2a3140;border-radius:4px;
    color:#c9d1d9;padding:7px 9px;font-family:inherit;font-size:12px}
  .hint{color:#6b7280;font-size:10px;margin-top:3px}
  button{margin-top:18px;background:#1f6feb;border:none;color:#fff;padding:8px 16px;border-radius:4px;cursor:pointer;font-family:inherit}
  .ok{color:#56d364;font-size:11px;margin-left:10px}
</style></head>
<body>
  <h1>🐺 Mimic Settings</h1>
  <div class="sub">Stored locally in your user profile. Mimic brings its own Node runtime — nothing else to install.</div>

  <label>EQ folder (optional — auto-detected if blank)</label>
  <input id="eqPath" placeholder="C:\\Quarm  or  C:\\Program Files\\EverQuest" />
  <div class="hint">Where your eqlog_*_pq.proj.txt files live.</div>

  <label>Bot URL</label>
  <input id="botUrl" />
  <div class="hint">Leave the default unless an officer told you otherwise.</div>

  <label>Agent token</label>
  <input id="token" placeholder="paste from /token in Discord" />
  <div class="hint">Run /token in the Wolf Pack Discord to get the current value.</div>

  <div>
    <button id="save">Save &amp; (re)start engine</button>
    <span id="ok" class="ok"></span>
  </div>

<script>
  async function load(){
    const c = await window.mimic.getConfig();
    document.getElementById('eqPath').value = c.eqPath || '';
    document.getElementById('botUrl').value = c.botUrl || 'https://wolfpackparse.up.railway.app/api/agent/encounter';
    document.getElementById('token').value  = c.token || '';
  }
  document.getElementById('save').onclick = async () => {
    await window.mimic.saveConfig({
      eqPath: document.getElementById('eqPath').value.trim() || null,
      botUrl: document.getElementById('botUrl').value.trim(),
      token:  document.getElementById('token').value.trim() || null,
    });
    await window.mimic.relaunchAgent();
    const ok = document.getElementById('ok'); ok.textContent = '✓ saved — engine restarting';
    setTimeout(()=>ok.textContent='', 4000);
  };
  load();
</script>
</body></html>
