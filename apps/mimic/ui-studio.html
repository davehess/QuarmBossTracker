                  ' data-key="' + keyBase + 'Color" data-orig="' + escapeHtml(colorVal) + '"' +
                  ' value="' + escapeHtml(colorVal) + '"' +
                  ' style="width:48px;background:#0d1117;color:#9aa4ad;border:1px solid #21262d;border-radius:3px;padding:1px 4px;font-family:inherit;font-size:10px;text-align:right">' +
                '</div>';
              for (var ln = 0; ln < 5; ln++) {
                var lineVal = cell.lines[ln] == null ? '' : String(cell.lines[ln]);
                // Show all 5 line slots — blanks let the user add new lines.
                // Existing blanks (cell.lines never had this index) are passed
                // with no data-orig so saving a still-blank field is a no-op.
                var hasOrig = ln < cell.lines.length;
                html += '<div style="display:flex;align-items:center;gap:4px;margin-top:2px">' +
                  '<span style="color:#8b949e;font-size:9px;min-width:18px">L' + (ln+1) + ':</span>' +
                  '<input class="uiEdit" type="text"' +
                  ' data-file="' + escapeHtml(f.file) + '" data-section="Socials"' +
                  ' data-key="' + keyBase + 'Line' + (ln+1) + '" data-orig="' + escapeHtml(lineVal) + '"' +
                  ' data-was-set="' + (hasOrig ? '1' : '0') + '"' +
                  ' value="' + escapeHtml(lineVal) + '"' +
                  ' style="flex:1;background:#0d1117;color:#9aa4ad;border:1px solid #21262d;border-radius:3px;padding:1px 6px;font-family:inherit;font-size:10px"></div>';
              }
              html += '</div>';
            }
          }
          html += '</details>';
        }
      }
      // Raw section dump (for shapes we don't yet group). All keys now —
      // the old 8-key truncation hid Quarm's flat-key HotButtons / Socials
      // sections, which is what made the inspector look "incomplete".
      var sections = f.sections || [];
      html += '<details style="margin-top:8px;background:#0d1117;border:1px solid #21262d;border-radius:3px;padding:4px 6px">' +
        '<summary style="color:#8b949e;cursor:pointer;font-family:sans-serif;font-size:10px">▸ raw section dump (' + sections.length + ' sections)</summary>';
      for (var s = 0; s < Math.min(sections.length, 60); s++) {
        var sec = sections[s];
        var propKeys = Object.keys(sec.props);
        html += '<details style="margin:3px 0 3px 6px;background:#0d1117;border:1px solid #21262d;border-radius:3px;padding:4px 6px">' +
          '<summary style="color:#79c0ff;cursor:pointer">[' + escapeHtml(sec.name) + '] ' +
          '<span style="color:#8b949e;font-size:10px">(' + propKeys.length + ' keys)</span></summary>';
        for (var p = 0; p < Math.min(propKeys.length, 300); p++) {
          var key = propKeys[p];
          html += '<div style="padding:1px 0;color:#9aa4ad;font-size:10px">' +
            '<span style="color:#c9d1d9">' + escapeHtml(key) + '</span> = ' +
            escapeHtml(sec.props[key]) + '</div>';
        }
        if (propKeys.length > 300) {
          html += '<div style="color:#8b949e;font-size:10px;padding-left:6px">… and ' +
            (propKeys.length - 300) + ' more keys.</div>';
        }
        html += '</details>';
      }
      if (sections.length > 60) {
        html += '<div style="color:#8b949e;font-size:10px;margin-top:4px">… and ' +
          (sections.length - 60) + ' more sections (use a text editor to see them all).</div>';
      }
      html += '</details>';
      html += '</div>';
    }
    dlg.innerHTML = html;
    // Re-attach the resize grip (innerHTML wiped it). We rebuild it the same
    // way the first-open path did so width stays draggable on every refresh.
    var grip2 = document.createElement('div');
    grip2.id = 'uiInspectorResize';
    grip2.style.cssText = 'position:absolute;left:0;top:0;bottom:0;width:6px;cursor:ew-resize;background:transparent;z-index:5';
    grip2.title = 'Drag to resize';
    grip2.addEventListener('mousedown', function(e){
      e.preventDefault();
      var startX = e.clientX, startW = dlg.getBoundingClientRect().width;
      var min = 320, max = Math.max(min, window.innerWidth - 200);
      function onMove(ev){
        var w = startW + (startX - ev.clientX);
        if (w < min) w = min;
        if (w > max) w = max;
        dlg.style.width = w + 'px';
      }
      function onUp(){
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        try { localStorage.setItem('uiInspectorWidth', String(parseInt(dlg.style.width, 10) || 480)); } catch (e) {}
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    dlg.appendChild(grip2);
    // Dirty-state tracking — each .uiEdit input compares current value to
    // data-orig. When anything is dirty, enable the Save button.
    var saveBtn = document.getElementById('uiInspectorSave');
    function isDirty(input){
      var orig = input.getAttribute('data-orig') || '';
      var cur  = input.value;
      // A blank line that wasn't previously set is NOT dirty — saving an empty
      // L<n> only matters when there was content to clear.
      if (input.dataset.wasSet === '0' && cur === '') return false;
      return cur !== orig;
    }
    function refreshSaveBtn(){
      var anyDirty = false;
      var inputs = dlg.querySelectorAll('.uiEdit');
      for (var i = 0; i < inputs.length; i++) if (isDirty(inputs[i])) { anyDirty = true; break; }
      if (!anyDirty && typeof _chatEdits !== 'undefined' && _chatEdits.size > 0) anyDirty = true;
      if (anyDirty) {
        saveBtn.disabled = false;
        saveBtn.style.background = '#1f6feb';
        saveBtn.style.borderColor = '#1f6feb';
        saveBtn.style.color = '#fff';
        saveBtn.style.cursor = 'pointer';
      } else {
        saveBtn.disabled = true;
        saveBtn.style.background = '#21262d';
        saveBtn.style.borderColor = '#30363d';
        saveBtn.style.color = '#6e7681';
        saveBtn.style.cursor = 'not-allowed';
      }
    }
    var inputs = dlg.querySelectorAll('.uiEdit');
    for (var i = 0; i < inputs.length; i++) {
      inputs[i].addEventListener('input', refreshSaveBtn);
    }

    // ── Chat routing interactions ────────────────────────────────────────────
    // Drag a chip from one window's chip-row to another's. Drop replaces that
    // chip's window assignment (writes a new ChannelMap<filter>=<win> on save).
    // X on a chip flags it for deletion. ★ toggles "Always chat here" between
    // windows — only one at a time. All mutations push onto _chatEdits which
    // the Save handler folds into the edits array sent to writePages.
    //
    // Edit shape per item: { file, section:'ChatManager', key, value | null }.
    // - Chip move:   ChannelMap<filter> = <newWin>
    // - Chip remove: ChannelMap<filter> = null
    // - ★ pin:       ChatWindow<oldIdx>_AlwaysHere = null  +  ChatWindow<newIdx>_AlwaysHere = 1
    var _chatEdits = new Map();   // key → value (latest write wins per key)
    var chatBlock = document.getElementById('chatRoutingBlock');
    function _chatFile(){ return chatBlock ? chatBlock.dataset.file : null; }
    function _stageChatEdit(key, value){
      if (!_chatFile()) return;
      _chatEdits.set(key, value);
      refreshSaveBtn();
    }
    function _renderChatDirtyHint(){
      // No-op for now — refreshSaveBtn already enables the Save button.
      // Future: visually mark windows whose routing changed.
    }
    if (chatBlock) {
      // Drag-drop wiring. We bind on the chip and the row (drop target) — no
      // delegation so newly-added chips don't accidentally get duplicate
      // listeners. The dialog re-renders on save, which rebuilds everything.
      var chips = chatBlock.querySelectorAll('.chatChip');
      var rows  = chatBlock.querySelectorAll('.chatChipRow');
      function _setRowHover(row, on){
        if (!row) return;
        row.style.outline = on ? '1px dashed #58a6ff' : '';
        row.style.outlineOffset = on ? '2px' : '';
      }
      for (var ci2 = 0; ci2 < chips.length; ci2++) {
        var chip = chips[ci2];
        chip.addEventListener('dragstart', function(e){
          var f = this.getAttribute('data-filter');
          var fromWin = this.getAttribute('data-from-win');
          e.dataTransfer.setData('text/plain', JSON.stringify({ filter: parseInt(f, 10), fromWin: parseInt(fromWin, 10) }));
          e.dataTransfer.effectAllowed = 'move';
          this.style.opacity = '0.5';
        });
        chip.addEventListener('dragend', function(){ this.style.opacity = ''; });
      }
      for (var ri = 0; ri < rows.length; ri++) {
        var row = rows[ri];
        if (row.getAttribute('data-drop') !== '1') continue;   // tell windows aren't drop targets
        row.addEventListener('dragover', function(e){
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          _setRowHover(this, true);
        });
        row.addEventListener('dragleave', function(){ _setRowHover(this, false); });
        row.addEventListener('drop', function(e){
          e.preventDefault();
          _setRowHover(this, false);
          var raw = e.dataTransfer.getData('text/plain'); if (!raw) return;
          var data; try { data = JSON.parse(raw); } catch (er) { return; }
          var toWin = parseInt(this.getAttribute('data-win'), 10);
          if (data.fromWin === toWin) return;
          // Stage the routing edit.
          _stageChatEdit('Sec' + '\x01' + 'ChannelMap' + data.filter, { section: 'ChatManager', key: 'ChannelMap' + data.filter, value: String(toWin) });
          // Move the chip DOM-side so the UI reflects the change before save.
          var movedChip = chatBlock.querySelector('.chatChip[data-filter="' + data.filter + '"][data-from-win="' + data.fromWin + '"]');
          if (movedChip) {
            movedChip.setAttribute('data-from-win', String(toWin));
            var rm = movedChip.querySelector('.chipRemove');
            if (rm) rm.setAttribute('data-from-win', String(toWin));
            // Drop the "no routed channels" placeholder if it's here.
            var placeholder = this.querySelector('span[style*="italic"]');
            if (placeholder) placeholder.remove();
            this.appendChild(movedChip);
            // If the source row is now empty, restore its placeholder.
            var fromRow = chatBlock.querySelector('.chatChipRow[data-win="' + data.fromWin + '"]');
            if (fromRow && fromRow.querySelectorAll('.chatChip').length === 0) {
              fromRow.innerHTML = '<span style="color:#6e7681;font-size:10px;font-style:italic">no routed channels</span>';
            }
          }
        });
      }
      // X on a chip → remove that routing.
      var xBtns = chatBlock.querySelectorAll('.chipRemove');
      for (var xi = 0; xi < xBtns.length; xi++) {
        xBtns[xi].addEventListener('click', function(e){
          e.stopPropagation();
          var f = parseInt(this.getAttribute('data-filter'), 10);
          _stageChatEdit('Sec' + '\x01' + 'ChannelMap' + f, { section: 'ChatManager', key: 'ChannelMap' + f, value: null });
          var chipEl = this.closest('.chatChip');
          var rowEl  = chipEl ? chipEl.parentElement : null;
          if (chipEl) chipEl.remove();
          if (rowEl && rowEl.querySelectorAll('.chatChip').length === 0) {
            rowEl.innerHTML = '<span style="color:#6e7681;font-size:10px;font-style:italic">no routed channels</span>';
          }
        });
      }
      // ★ Always chat here — exclusive (clears any other window's flag).
      var stars = chatBlock.querySelectorAll('.alwaysHereBtn');
      for (var sti = 0; sti < stars.length; sti++) {
        stars[sti].addEventListener('click', function(){
          var newWin = parseInt(this.getAttribute('data-win'), 10);
          var holder = chatBlock.querySelector('[data-always-idx]');
          var prev = (holder && holder.dataset.alwaysIdx !== '') ? parseInt(holder.dataset.alwaysIdx, 10) : null;
          var isOff = (prev === newWin);
          // Stage edits — clear prev (if any), set new (unless toggling off).
          if (prev != null) _stageChatEdit('Sec' + '\x01' + 'ChatWindow' + prev + '_AlwaysHere', { section: 'ChatManager', key: 'ChatWindow' + prev + '_AlwaysHere', value: null });
          if (!isOff) _stageChatEdit('Sec' + '\x01' + 'ChatWindow' + newWin + '_AlwaysHere', { section: 'ChatManager', key: 'ChatWindow' + newWin + '_AlwaysHere', value: '1' });
          if (holder) holder.dataset.alwaysIdx = isOff ? '' : String(newWin);
          // Update the card highlights without a full re-render.
          var cards = chatBlock.querySelectorAll('.chatCard');
          for (var k = 0; k < cards.length; k++) {
            var c = cards[k];
            var w = parseInt(c.getAttribute('data-win'), 10);
            var on = !isOff && (w === newWin);
            c.style.background = on ? 'rgba(240,180,41,0.06)' : '#0d1117';
            c.style.borderColor = on ? '#f0b429' : '#21262d';
            var btn = c.querySelector('.alwaysHereBtn');
            if (btn) {
              btn.style.borderColor = on ? '#f0b429' : '#30363d';
              btn.style.color = on ? '#f6c365' : '#8b949e';
            }
            // Re-tag the header name with the ⭐ + bold.
            var nameSpan = c.querySelector('div span:first-child');
            if (nameSpan) {
              nameSpan.style.color      = on ? '#f6c365' : '#c9d1d9';
              nameSpan.style.fontWeight = on ? '700' : '600';
              var nm = nameSpan.textContent.replace(/^⭐\s*/, '');
              nameSpan.firstChild.textContent = (on ? '⭐ ' : '') + nm;
            }
          }
        });
      }
    }

    saveBtn.addEventListener('click', async function(){
      if (saveBtn.disabled) return;
      // Collect dirty edits — for blanked-out Line slots we send value=null so
      // the backend deletes the key. For all other fields we send the new value.
      var edits = [];
      var inputs2 = dlg.querySelectorAll('.uiEdit');
      for (var i = 0; i < inputs2.length; i++) {
        var inp = inputs2[i];
        if (!isDirty(inp)) continue;
        var v = inp.value;
        if (v === '' && inp.dataset.wasSet === '1') v = null;
        edits.push({
          file:    inp.getAttribute('data-file'),
          section: inp.getAttribute('data-section'),
          key:     inp.getAttribute('data-key'),
          value:   v,
        });
      }
      // Fold the staged chat-routing edits (drag-drop, X, ★) into the same
      // writePages call. All ChatManager edits go to the UI_<char> file.
      var chatF = _chatFile();
      if (chatF && _chatEdits.size > 0) {
        for (var ce of _chatEdits.values()) {
          edits.push({ file: chatF, section: ce.section, key: ce.key, value: ce.value });
        }
      }
      if (edits.length === 0) return;
      saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
      try {
        var res = await window.mimic.uiStudioWritePages(STATE.eqDir, edits);
        if (!res || !res.ok) {
          setStatus('save failed: ' + (res && res.error || 'unknown'), 'err');
          saveBtn.textContent = 'Save changes'; refreshSaveBtn();
          return;
        }
        setStatus(edits.length + ' edit' + (edits.length === 1 ? '' : 's') + ' saved · ' +
          (res.written || []).map(function(w){ return w.file; }).join(', '), 'ok');
        saveBtn.textContent = 'Saved ✓';
        // Re-open the inspector to refresh data-orig from disk so further
        // edits diff against the new baseline.
        setTimeout(function(){
          try { document.getElementById('inspectSocialsBtn').click(); } catch (e) {}
        }, 600);
      } catch (err) {
        setStatus('save error: ' + (err && err.message), 'err');
        saveBtn.textContent = 'Save changes'; refreshSaveBtn();
      }
    });
  }
</script>
</body></html>
