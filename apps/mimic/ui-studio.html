<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>UI Studio</title>
<style>
  html,body{margin:0;height:100%;background:#0d1117;color:#e6edf3;
    font-family:ui-sans-serif,system-ui,sans-serif;user-select:none;overflow:hidden}
  /* Page is a flex column: toolbar takes its NATURAL height (it wraps to 2+
     rows when there are many buttons) and #content fills the rest. This is why
     the panels below are flex items, not position:fixed with a hardcoded 50px
     toolbar offset — that offset broke (panel overlapped the toolbar's wrapped
     second row) the moment the bar grew past one line. */
  body{display:flex;flex-direction:column}
  #content{flex:1 1 auto;display:flex;min-height:0}
  /* Top toolbar — resolution pickers, character selector, save/load. */
  #bar{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:8px 12px;background:#161b22;
    border-bottom:1px solid #30363d;flex-wrap:wrap}
  #bar h1{font-size:13px;margin:0;color:#7ee7c7;letter-spacing:0.5px;font-weight:600;margin-right:6px}
  #bar label{font-size:11px;color:#8b949e;display:flex;align-items:center;gap:4px}
  #bar select,#bar input,#bar button{background:#0d1117;color:#e6edf3;border:1px solid #30363d;
    border-radius:4px;padding:4px 8px;font-size:11px;font-family:inherit}
  #bar select:hover,#bar input:hover{border-color:#58a6ff}
  #bar button{cursor:pointer;background:#1f6feb;border-color:#1f6feb;color:#fff;font-weight:600}
  #bar button:hover{background:#388bfd}
  #bar button.secondary{background:#21262d;border-color:#30363d;color:#c9d1d9;font-weight:500}
  #bar button.secondary:hover{background:#30363d}
  #bar button[disabled]{opacity:0.4;cursor:not-allowed}
  #bar .sep{width:1px;height:18px;background:#30363d;margin:0 2px}
  #status{margin-left:auto;font-size:10px;color:#8b949e}
  #status.ok{color:#56d364} #status.err{color:#f87171}
  /* Canvas — proportional to target resolution, scaled to fit. Black bg
     represents the EQ screen. Window rectangles overlay. */
  #stageWrap{display:flex;justify-content:center;align-items:center;flex:1 1 auto;min-width:0;
    padding:14px;background:#0a0c10;overflow:auto}
  #stage{position:relative;background:#000;border:1px solid #58a6ff;
    box-shadow:0 0 12px rgba(88,166,255,0.18)}
  /* Each window rectangle is absolutely positioned inside #stage. Color-coded
     by kind so a glance at the canvas tells you what's a chat window vs a
     buff bar vs a spell-gem strip without having to read every label. */
  .win{position:absolute;background:rgba(31,111,235,0.18);
    border:1px solid rgba(88,166,255,0.7);border-radius:2px;cursor:move;
    overflow:hidden;transition:box-shadow .12s}
  .win.kind-chat     {background:rgba(126,231,199,0.18);border-color:rgba(126,231,199,0.7)}
  .win.kind-buffs    {background:rgba(212,153,255,0.18);border-color:rgba(212,153,255,0.7)}
  .win.kind-songs    {background:rgba(255,176,217,0.18);border-color:rgba(255,176,217,0.7)}
  .win.kind-gems     {background:rgba(214,153,34,0.20);border-color:rgba(214,153,34,0.75)}
  .win.kind-inventory{background:rgba(187,154,121,0.18);border-color:rgba(187,154,121,0.7)}
  .win.kind-group    {background:rgba(105,219,124,0.18);border-color:rgba(105,219,124,0.7)}
  .win.kind-raid     {background:rgba(248,81,73,0.18);border-color:rgba(248,81,73,0.7)}
  .win.kind-target   {background:rgba(255,123,114,0.18);border-color:rgba(255,123,114,0.7)}
  .win.kind-player   {background:rgba(255,176,176,0.18);border-color:rgba(255,176,176,0.7)}
  .win.kind-hotbar   {background:rgba(240,136,62,0.18);border-color:rgba(240,136,62,0.7)}
  .win.kind-pet      {background:rgba(192,154,255,0.15);border-color:rgba(192,154,255,0.6)}
  .win.kind-compass,.win.kind-map{background:rgba(110,155,214,0.15);border-color:rgba(110,155,214,0.6)}
  .win:hover{filter:brightness(1.4);box-shadow:0 0 6px rgba(88,166,255,0.5)}
  .win.selected{border-color:#7ee7c7;background:rgba(126,231,199,0.32);
    box-shadow:0 0 10px rgba(126,231,199,0.8)}
  .win .lbl{position:absolute;top:2px;left:4px;font-size:9px;color:#fff;
    text-shadow:0 1px 2px #000;font-weight:600;pointer-events:none;
    text-overflow:ellipsis;white-space:nowrap;overflow:hidden;max-width:calc(100% - 8px)}
  .win .sz{position:absolute;bottom:2px;right:4px;font-size:8px;color:#9aa4ad;
    text-shadow:0 1px 2px #000;pointer-events:none}
  .win .grip{position:absolute;width:8px;height:8px;background:#7ee7c7;
    border:1px solid #000;border-radius:1px;z-index:5}
  .win .grip.se{right:-4px;bottom:-4px;cursor:nwse-resize}
  /* Side panel for the selected window's properties. Flex item (not fixed) so
     it sits beside the canvas under the natural-height toolbar. */
  #side{flex:0 0 240px;box-sizing:border-box;background:#161b22;
    border-left:1px solid #30363d;padding:10px;font-size:11px;overflow-y:auto;
    display:none}
  #side.on{display:block}
  #side h3{margin:0 0 8px 0;color:#7ee7c7;font-size:12px}
  #side .field{margin-bottom:6px}
  #side .field label{display:block;color:#8b949e;font-size:10px;margin-bottom:2px}
  #side .field input{width:100%;box-sizing:border-box;background:#0d1117;
    color:#e6edf3;border:1px solid #30363d;border-radius:3px;padding:3px 6px;font-size:11px}
  #side .row{display:flex;gap:6px}
  #side .row .field{flex:1}
  #side .meta{color:#6e7681;font-size:9px;margin-top:8px}
  /* Left filter panel — category toggles so the canvas isn't an unreadable
     pile of all 130 windows at once. Flex item beside the canvas. View-only
     (Save still writes every window). */
  #filterPanel{flex:0 0 186px;box-sizing:border-box;
    background:#161b22;border-right:1px solid #30363d;padding:10px;font-size:11px;
    overflow-y:auto}
  #filterPanel h3{margin:0 0 6px;color:#7ee7c7;font-size:12px}
  #filterPanel .hint{color:#6e7681;font-size:9px;margin:0 0 8px;line-height:1.4}
  #filterPanel .fbtns{display:flex;gap:6px;margin-bottom:8px}
  #filterPanel .fbtns button{flex:1;font-size:10px;padding:3px 0;background:#21262d;
    border:1px solid #30363d;color:#c9d1d9;border-radius:4px;cursor:pointer;font-family:inherit}
  #filterPanel .fbtns button:hover{background:#30363d;border-color:#58a6ff}
  #filterPanel label{display:flex;align-items:center;gap:6px;padding:3px 3px;cursor:pointer;
    color:#c9d1d9;border-radius:3px;user-select:none}
  #filterPanel label:hover{background:#0d1117}
  #filterPanel label input{margin:0}
  #filterPanel label .cnt{margin-left:auto;color:#6e7681;font-size:10px}
  #filterPanel label.empty{opacity:0.4;cursor:default}
  /* Snap edge highlight when dragging — visual feedback when a window
     edge aligns with another window edge. */
  .snap-x{position:absolute;width:1px;background:#7ee7c7;pointer-events:none;
    box-shadow:0 0 4px #7ee7c7;z-index:10}
  .snap-y{position:absolute;height:1px;background:#7ee7c7;pointer-events:none;
    box-shadow:0 0 4px #7ee7c7;z-index:10}
</style></head>
<body>
  <div id="bar">
    <h1>🎨 UI Studio</h1>
    <label>Character
      <select id="charSelect"><option value="">— pick —</option></select>
    </label>
    <span id="eqDirLabel" style="font-size:10px;color:#6e7681;max-width:240px;overflow:hidden;
      text-overflow:ellipsis;white-space:nowrap" title=""></span>
    <span class="sep"></span>
    <!-- Source/Target use a preset <select> + freeform W×H inputs. The
         dropdown's "Custom…" sentinel keeps the four most-common values one
         click away; the inputs cover widescreen / ultrawide (3840×1600,
         5120×1440) without forcing us to hard-code every monitor on Earth.
         "🖥 Detect" lists every attached display so a user with mixed
         monitors can pick the right one instead of typing. -->
    <label>Source
      <select id="srcPreset" title="Picks of common Quarm/EQ resolutions">
        <option value="3440x1440">3440×1440 (UW)</option>
        <option value="2560x1440" selected>2560×1440</option>
        <option value="1920x1080">1920×1080</option>
        <option value="1680x1050">1680×1050</option>
        <option value="__custom__">Custom…</option>
      </select>
      <input id="srcW" type="number" min="640"  max="10240" step="1" style="width:64px" title="Source width"  />
      ×
      <input id="srcH" type="number" min="480"  max="6000"  step="1" style="width:54px" title="Source height" />
    </label>
    <label>→ Target
      <select id="tgtPreset" title="Picks of common Quarm/EQ resolutions">
        <option value="3440x1440">3440×1440 (UW)</option>
        <option value="2560x1440">2560×1440</option>
        <option value="1920x1080" selected>1920×1080</option>
        <option value="1680x1050">1680×1050</option>
        <option value="__custom__">Custom…</option>
      </select>
      <input id="tgtW" type="number" min="640"  max="10240" step="1" style="width:64px" title="Target width"  />
      ×
      <input id="tgtH" type="number" min="480"  max="6000"  step="1" style="width:54px" title="Target height" />
    </label>
    <button id="detectBtn" class="secondary" title="Show attached monitors and pick one as Target">🖥 Detect</button>
    <button id="loadBtn" class="secondary">Load + Rescale</button>
    <span class="sep"></span>
    <button id="snapBtn"  class="secondary" title="Toggle snap to edges (10px)">Snap: ON</button>
    <button id="resetBtn" class="secondary" title="Undo all changes since load">Reset</button>
    <button id="saveBtn"  title="Write back to INI with .bak backup">Save</button>
    <span class="sep"></span>
    <button id="inspectSocialsBtn" class="secondary" title="Open the Hotbar/Socials inspector — see what's actually in your Sock_/Socials_ INI files">Hotbar Pages…</button>
    <button id="captureBtn"        class="secondary" title="Heuristic-parse your Sock_/Socials_ INIs into a draft PvP template JSON in your EQ folder — review + share">Capture PvP draft</button>
    <button id="cloudBackupBtn"    class="secondary" title="Upload encrypted backup of your UI ini files to the bot (existing capture flow)">☁ Backup</button>
    <button id="cloudRestoreBtn"   class="secondary" title="Pull a cloud backup into the editor — rescale it to this machine's monitor, then Save. Use this to deploy your layout on a new computer.">📥 Restore</button>
    <span id="status"></span>
  </div>
  <!-- Deferred-save banner — shown while a save is scheduled to apply when the
       character logs out. -->
  <div id="deferBanner" style="display:none;align-items:center;gap:10px;padding:6px 12px;
       background:#1c2330;border-bottom:1px solid #d6a922;color:#f0d264;font-size:11px">
    <span class="txt"></span>
    <button id="deferCancel" style="margin-left:auto;background:#21262d;color:#c9d1d9;
       border:1px solid #30363d;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer">Cancel</button>
  </div>
  <!-- PvP-set prompt — slides in from the top when the loaded character's
       class matches a bundled template. User can dismiss or open the
       details panel to preview + import. -->
  <div id="pvpPrompt" style="display:none;background:#1c2330;border-bottom:1px solid #58a6ff;
       padding:10px 16px;color:#c9d1d9;font-size:12px;display:none">
    <strong style="color:#7ee7c7" id="pvpPromptTitle">PvP set available</strong>
    <span id="pvpPromptCredit" style="color:#8b949e;margin-left:6px"></span>
    <p id="pvpPromptDesc" style="margin:4px 0;color:#9aa4ad;font-size:11px"></p>
    <button id="pvpPreviewBtn"  class="secondary">Preview</button>
    <button id="pvpImportBtn">Import to EQ folder</button>
    <button id="pvpDismissBtn"  class="secondary" style="margin-left:4px">Dismiss</button>
  </div>
  <!-- PvP-set preview panel — opened from the prompt's Preview button.
       Renders phases, spell sets, clickies, potions for the active
       template. Sits on top of the canvas as an overlay. -->
  <div id="pvpPreview" style="display:none;position:fixed;top:50px;right:0;bottom:0;width:380px;
       background:#161b22;border-left:1px solid #30363d;z-index:50;overflow-y:auto;
       padding:14px;font-size:12px;color:#c9d1d9">
    <button id="pvpPreviewClose" style="float:right;background:none;border:none;color:#8b949e;
       cursor:pointer;font-size:18px">×</button>
    <h2 id="pvpPreviewName" style="margin:0 0 4px;color:#7ee7c7;font-size:15px"></h2>
    <div id="pvpPreviewCredit" style="color:#8b949e;font-size:10px;margin-bottom:8px"></div>
    <div id="pvpPreviewBody"></div>
  </div>
  <div id="content">
    <aside id="filterPanel">
      <h3>👁 Show</h3>
      <p class="hint">Toggle window groups. View-only — Save still writes every window.</p>
      <div class="fbtns">
        <button id="filterAll">All</button>
        <button id="filterNone">None</button>
      </div>
      <div id="filterList"></div>
    </aside>
    <div id="stageWrap"><div id="stage"></div></div>
    <aside id="side">
      <h3 id="sideTitle">Window</h3>
      <div class="row">
        <div class="field"><label>X</label><input id="fX" type="number" /></div>
        <div class="field"><label>Y</label><input id="fY" type="number" /></div>
      </div>
      <div class="row">
        <div class="field"><label>Width</label><input id="fW" type="number" /></div>
        <div class="field"><label>Height</label><input id="fH" type="number" /></div>
      </div>
      <div class="meta" id="sideMeta"></div>
    </aside>
  </div>
<script>
  // ── State ────────────────────────────────────────────────────────────────
  // bundle: { file → contents } loaded from disk. We mutate per-window
  // positions in `windows[]` and re-emit on save.
  // windows: parsed window list. Each entry: {
  //   id, file, section, label, x, y, w, h, origX, origY, origW, origH,
  //   sectionStart, sectionEnd  (line numbers in the file's contents)
  // }
  var STATE = {
    character: null,
    eqDir:     null,
    bundle:    null,          // { filename → text }
    windows:   [],
    srcW:      2560, srcH: 1440,
    tgtW:      1920, tgtH: 1080,
    snapOn:    true,
    selected:  -1,
    sliceScale: 1,            // canvas → world scale for hit testing
  };

  var statusEl  = document.getElementById('status');
  var stage     = document.getElementById('stage');
  var stageWrap = document.getElementById('stageWrap');
  var side      = document.getElementById('side');

  function setStatus(msg, cls) {
    statusEl.textContent = msg || '';
    statusEl.className = cls || '';
  }

  // ── Bootstrap: list characters via existing UI Studio IPC ────────────────
  async function bootstrap(){
    try {
      var chars = await window.mimic.uiStudioListCharacters();
      var sel = document.getElementById('charSelect');
      for (var i = 0; i < chars.length; i++) {
        var c = chars[i];
        var opt = document.createElement('option');
        opt.value = c.character + '|' + c.eqDir;
        opt.textContent = c.character + (c.ini_count ? ' (' + c.ini_count + ' ini files)' : ' (no inis)');
        sel.appendChild(opt);
      }
    } catch (e) { setStatus('IPC unavailable — open via tray', 'err'); }
  }
  bootstrap();

  // Show the active EQ folder for the picked character — so a multi-folder user
  // can see which install they're editing (the dropdown only shows the name).
  function _showEqDir(dir){
    var el = document.getElementById('eqDirLabel');
    if (!el) return;
    if (!dir) { el.textContent = ''; el.title = ''; return; }
    var parts = String(dir).split(/[\\/]/).filter(Boolean);
    var tail = parts.slice(-2).join('\\');     // last two path segments
    el.textContent = '📁 …\\' + tail;
    el.title = dir;
  }
  document.getElementById('charSelect').addEventListener('change', function(){
    var v = this.value; _showEqDir(v ? v.split('|')[1] : '');
  });

  // ── INI parsing ──────────────────────────────────────────────────────────
  // EQ INI sections like:
  //   [InventoryWindow]
  //   XPos=100
  //   YPos=200
  //   Size.cx=400
  //   Size.cy=300
  // We extract each [SectionName] block, pull XPos/YPos/Size.cx/Size.cy.
  // Sections without position data are still parsed (so saving rewrites
  // verbatim), just not added to the visual list.
  function parseIni(text){
    var lines = text.split(/\r?\n/);
    var sections = [];
    var cur = null;
    for (var i = 0; i < lines.length; i++) {
      var L = lines[i];
      var m = L.match(/^\s*\[([^\]]+)\]\s*$/);
      if (m) {
        if (cur) cur.endLine = i - 1;
        cur = { name: m[1], startLine: i, endLine: lines.length - 1, props: {} };
        sections.push(cur);
        continue;
      }
      if (!cur) continue;
      var kv = L.match(/^\s*([\w.]+)\s*=\s*(.*)\s*$/);
      if (kv) cur.props[kv[1]] = kv[2];
    }
    return { lines: lines, sections: sections };
  }

  // Reconstruct file with updated position keys. Preserves line order,
  // formatting, comments. Keys present in the section are rewritten in place;
  // keys NOT present (e.g. a brand-new XPos<targetRes> block) are INSERTED
  // right after the section header. Inserting is what lets us add a widescreen
  // resolution block without disturbing the user's original-resolution layout.
  function emitIni(parsed, edits){
    // edits: { sectionName → { "XPos3840x1600": N, "YPos3840x1600": N, Width, Height } }
    var lines = parsed.lines.slice();
    // Process sections bottom-to-top so inserted lines don't shift the
    // startLine indices of sections we haven't handled yet.
    var secs = parsed.sections.slice().sort(function(a, b){ return b.startLine - a.startLine; });
    for (var i = 0; i < secs.length; i++) {
      var sec = secs[i];
      var ed = edits[sec.name];
      if (!ed) continue;
      var remaining = {};
      for (var ek in ed) remaining[ek] = ed[ek];
      for (var ln = sec.startLine + 1; ln <= sec.endLine; ln++) {
        var L = lines[ln];
        var kv = L.match(/^(\s*)([\w.]+)(\s*=\s*)(.*)$/);
        if (!kv) continue;
        var key = kv[2];
        if (remaining[key] != null) {
          lines[ln] = kv[1] + key + kv[3] + remaining[key];
          delete remaining[key];
        }
      }
      // Insert any keys that weren't already in the section.
      var toInsert = [];
      for (var rk in remaining) toInsert.push(rk + '=' + remaining[rk]);
      if (toInsert.length) {
        var args = [sec.startLine + 1, 0].concat(toInsert);
        Array.prototype.splice.apply(lines, args);
      }
    }
    return lines.join('\n');
  }

  // ── Resolution-aware position helpers ────────────────────────────────────
  // EQ stores window geometry per-resolution: XPos<W>x<H> / YPos<W>x<H>
  // (e.g. XPos2560x1440). Dimensions are bare Width/Height (NOT resolution-
  // suffixed). Older pre-/saveui files used bare XPos/YPos. Quarm's NillipussUI
  // and friends ALWAYS write the suffixed form — which is why the old parser
  // (looking for bare XPos/Size.cx) found nothing and reported "0 windows".

  // Count how many position keys exist per resolution across the whole bundle,
  // so Load can auto-select a resolution block that actually exists.
  function _detectResolutions(bundle){
    var counts = {};
    Object.keys(bundle).forEach(function(fn){
      if (fn.indexOf('__parsed') >= 0) return;
      var txt = bundle[fn];
      if (typeof txt !== 'string') return;
      var re = /^XPos(\d+)x(\d+)\s*=/gmi, m;
      while ((m = re.exec(txt))) {
        var key = m[1] + 'x' + m[2];
        counts[key] = (counts[key] || 0) + 1;
      }
    });
    return counts;   // { "2560x1440": 130, ... }
  }

  // Read a section's position at the requested resolution suffix. Falls back to
  // any other resolution block present, then to bare XPos/YPos. Returns the
  // suffix actually used so the UI can note when it had to substitute.
  function _readPos(props, suffix){
    var x = props['XPos' + suffix], y = props['YPos' + suffix], used = suffix;
    if (x == null || y == null) {
      var alt = null;
      for (var k in props) {
        var mm = k.match(/^XPos(\d+x\d+)$/i);
        if (mm && props['YPos' + mm[1]] != null) { alt = mm[1]; break; }
      }
      if (alt) { x = props['XPos' + alt]; y = props['YPos' + alt]; used = alt; }
      else if (props.XPos != null) { x = props.XPos; y = props.YPos; used = ''; }
    }
    return { x: x, y: y, used: used };
  }

  // ── Load + rescale ───────────────────────────────────────────────────────
  // Heuristic window classifier — derives a kind + icon + extracted
  // contents from a parsed [Section] block. The EQ INI format varies a
  // little between client versions, so we look for several known key
  // patterns instead of requiring exact matches.
  function classifyWindow(section) {
    var name  = section.name;
    var props = section.props || {};
    var lower = name.toLowerCase();
    var icon  = '▢';
    var kind  = 'generic';
    var contents = [];
    // Chat: explicit ChatWindow or anything starting with "CW" plus a
    // ChatChannel/ChatFilter key as a fallback signal.
    var hasChatHints = Object.keys(props).some(function(k){
      var kl = k.toLowerCase();
      return kl.indexOf('chat') >= 0 || kl.indexOf('channel') >= 0 || kl.indexOf('filter') >= 0;
    });
    if (/chat|^cw/i.test(name) || hasChatHints) {
      icon = '💬'; kind = 'chat';
      // Extract tab metadata. Try TabCount + Tab<N>Name, or Tab.<N>=, or
      // ChatChannels.<N>=. Anything that looks like a tab name gets listed.
      var tabs = [];
      Object.keys(props).forEach(function(k){
        if (/^Tab\d+Name$/i.test(k))   tabs.push(props[k]);
        else if (/^Tab\.\d+$/i.test(k)) tabs.push(props[k]);
        else if (/^TabName$/i.test(k))  tabs.push(props[k]);
      });
      if (tabs.length) contents.push({ label: 'Tabs',     value: tabs.join(', ') });
      // Channel filter, default channel, locked state.
      ['ChatChannels','ChatFilter','DefaultChannel','LockedDefault','Filters','WindowName']
        .forEach(function(k){
          if (props[k] != null && props[k] !== '') contents.push({ label: k, value: props[k] });
        });
      if (contents.length === 0) contents.push({ label: 'Type', value: 'chat window (no tab metadata in this version)' });
    } else if (/inventory/i.test(name))           { icon = '🎒'; kind = 'inventory'; }
    else  if (/buff/i.test(name))                 { icon = '✨'; kind = 'buffs'; }
    else  if (/song|melody/i.test(name))          { icon = '🎵'; kind = 'songs'; }
    else  if (/spell.*gem|gem.*spell|spellbar/i.test(name)) { icon = '🔮'; kind = 'gems'; }
    else  if (/^group/i.test(name))               { icon = '👥'; kind = 'group'; }
    else  if (/raid/i.test(name))                 { icon = '⚔️'; kind = 'raid'; }
    else  if (/target/i.test(name))               { icon = '🎯'; kind = 'target'; }
    else  if (/player|pdc|hp|mana/i.test(name))   { icon = '❤️'; kind = 'player'; }
    else  if (/hot.*button|hotbar/i.test(name))   { icon = '🔥'; kind = 'hotbar'; }
    else  if (/compass/i.test(name))              { icon = '🧭'; kind = 'compass'; }
    else  if (/map/i.test(name))                  { icon = '🗺️'; kind = 'map'; }
    else  if (/pet/i.test(name))                  { icon = '🐺'; kind = 'pet'; }
    else  if (/social/i.test(name))               { icon = '💼'; kind = 'social'; }
    // Always include WindowName when present (human-readable title).
    if (kind !== 'chat' && props.WindowName) {
      contents.push({ label: 'WindowName', value: props.WindowName });
    }
    // Pull a few common informative props as fallback contents.
    if (contents.length === 0) {
      ['Locked','Fades','Alpha'].forEach(function(k){
        if (props[k] != null) contents.push({ label: k, value: props[k] });
      });
    }
    return {
      icon:  icon,
      label: name.replace(/Window$/, '').replace(/^_+/, ''),
      kind:  kind,
      contents: contents,
    };
  }

  // ── Resolution preset ↔ W/H input wiring ─────────────────────────────────
  // The preset dropdown is just a convenience picker — the W/H inputs are
  // the source of truth (we read them at Load time). A custom value typed
  // into the inputs flips the preset to "Custom…" so the UI stays honest.
  function _syncPresetFromInputs(side) {
    var w = parseInt(document.getElementById(side + 'W').value, 10);
    var h = parseInt(document.getElementById(side + 'H').value, 10);
    var sel = document.getElementById(side + 'Preset');
    var match = '__custom__';
    for (var i = 0; i < sel.options.length; i++) {
      var v = sel.options[i].value;
      if (v === '__custom__') continue;
      var p = v.split('x');
      if (parseInt(p[0], 10) === w && parseInt(p[1], 10) === h) { match = v; break; }
    }
    sel.value = match;
  }
  function _syncInputsFromPreset(side) {
    var sel = document.getElementById(side + 'Preset');
    if (sel.value === '__custom__') return;     // leave inputs alone
    var p = sel.value.split('x');
    document.getElementById(side + 'W').value = p[0];
    document.getElementById(side + 'H').value = p[1];
  }
  ['src', 'tgt'].forEach(function(side){
    document.getElementById(side + 'Preset').addEventListener('change', function(){ _syncInputsFromPreset(side); });
    document.getElementById(side + 'W').addEventListener('input', function(){ _syncPresetFromInputs(side); });
    document.getElementById(side + 'H').addEventListener('input', function(){ _syncPresetFromInputs(side); });
    _syncInputsFromPreset(side);     // initial fill from default-selected preset
  });

  // ── Display detector ─────────────────────────────────────────────────────
  // Enumerate the user's monitors via Electron's `screen` API and pop a
  // floating picker. Selecting a display sets the TARGET resolution to that
  // monitor's full pixel size (EQ runs fullscreen → not workAreaSize).
  // Clicking the body dismisses; Esc dismisses. No-op if the IPC bridge
  // isn't there (file:// dev harness etc.).
  document.getElementById('detectBtn').addEventListener('click', async function(){
    if (!window.mimic || !window.mimic.uiStudioListDisplays) {
      setStatus('display detection unavailable', 'err'); return;
    }
    var r = await window.mimic.uiStudioListDisplays().catch(function(){ return null; });
    if (!r || !Array.isArray(r.displays) || r.displays.length === 0) {
      setStatus('no displays detected', 'err'); return;
    }
    _showDisplayPicker(r.displays);
  });
  function _showDisplayPicker(displays) {
    var old = document.getElementById('displayPicker');
    if (old) old.remove();
    var dlg = document.createElement('div');
    dlg.id = 'displayPicker';
    dlg.style.cssText = 'position:fixed;top:50px;left:50%;transform:translateX(-50%);' +
      'background:#161b22;border:1px solid #58a6ff;border-radius:6px;z-index:100;' +
      'padding:10px;font-size:12px;color:#c9d1d9;min-width:280px;box-shadow:0 4px 16px rgba(0,0,0,0.5)';
    var html = '<div style="color:#7ee7c7;font-weight:600;margin-bottom:6px">Pick a display for Target</div>' +
      '<div style="color:#8b949e;font-size:10px;margin-bottom:8px">EQ runs fullscreen at the monitor\'s full pixel size — pick the screen you play on.</div>';
    for (var i = 0; i < displays.length; i++) {
      var d = displays[i];
      html += '<button data-w="' + d.w + '" data-h="' + d.h + '" ' +
        'style="display:block;width:100%;text-align:left;background:#0d1117;color:#e6edf3;' +
        'border:1px solid #30363d;border-radius:4px;padding:6px 8px;margin-bottom:4px;' +
        'cursor:pointer;font-size:11px;font-family:inherit">' + escapeHtml(d.label) +
        (d.scaleFactor !== 1 ? ' <span style="color:#8b949e">@ ' + d.scaleFactor + 'x DPI</span>' : '') +
        '</button>';
    }
    html += '<div style="margin-top:6px;text-align:right">' +
      '<button id="displayPickerCancel" style="background:transparent;color:#8b949e;border:1px solid #30363d;border-radius:4px;padding:3px 10px;cursor:pointer;font-size:11px">Cancel</button>' +
      '</div>';
    dlg.innerHTML = html;
    document.body.appendChild(dlg);
    dlg.querySelectorAll('button[data-w]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var w = parseInt(this.dataset.w, 10), h = parseInt(this.dataset.h, 10);
        document.getElementById('tgtW').value = w;
        document.getElementById('tgtH').value = h;
        _syncPresetFromInputs('tgt');
        dlg.remove();
        setStatus('target set to ' + w + '×' + h + ' — click Load + Rescale to apply', 'ok');
      });
    });
    document.getElementById('displayPickerCancel').addEventListener('click', function(){ dlg.remove(); });
    var esc = function(e){ if (e.key === 'Escape') { dlg.remove(); document.removeEventListener('keydown', esc); } };
    document.addEventListener('keydown', esc);
  }

  document.getElementById('loadBtn').addEventListener('click', loadAndRescale);
  async function loadAndRescale(){
    var sel = document.getElementById('charSelect').value;
    if (!sel) { setStatus('pick a character', 'err'); return; }
    var parts = sel.split('|');
    STATE.character = parts[0];
    STATE.eqDir     = parts[1];
    _showEqDir(STATE.eqDir);
    // Read the W/H inputs (source of truth — preset dropdown is just a picker).
    var sW = parseInt(document.getElementById('srcW').value, 10);
    var sH = parseInt(document.getElementById('srcH').value, 10);
    var tW = parseInt(document.getElementById('tgtW').value, 10);
    var tH = parseInt(document.getElementById('tgtH').value, 10);
    if (!sW || !sH || !tW || !tH || sW < 640 || sH < 480 || tW < 640 || tH < 480) {
      setStatus('enter valid Source/Target sizes (≥ 640×480)', 'err'); return;
    }
    STATE.srcW = sW; STATE.srcH = sH;
    STATE.tgtW = tW; STATE.tgtH = tH;
    setStatus('loading ' + STATE.character + '…');
    try {
      STATE.bundle = await window.mimic.uiStudioReadBundle(STATE.character, STATE.eqDir);
    } catch (e) { setStatus('read failed: ' + e.message, 'err'); return; }
    if (!STATE.bundle || Object.keys(STATE.bundle).length === 0) {
      setStatus('no ini files for ' + STATE.character, 'err');
      return;
    }
    // Scan the active UI skin's XML files for each window's design CX/CY —
    // gives us authoritative MAX sizes when the INI's W/H is stale (saved at a
    // different resolution, partial save, never resized in-game, etc).
    // Failure is non-fatal; we just fall back to the INI sizes.
    try {
      var scan = await window.mimic.uiStudioScanWindowDefaults(STATE.eqDir);
      STATE.xmlSizes = (scan && scan.ok && scan.sizes) || {};
      STATE.xmlSkin  = (scan && scan.skin) || null;
    } catch (e) { STATE.xmlSizes = {}; STATE.xmlSkin = null; }
    STATE.fromCloud = false;
    _renderLoadedBundle();
  }

  // Parse + rescale + render whatever is currently in STATE.bundle. Shared by
  // the local "Load + Rescale" path and the cloud "Restore from backup" path —
  // both end up with a { filename → text } bundle, so the only difference is
  // where the bytes came from. Reads Source/Target from STATE (already set by
  // the caller).
  function _renderLoadedBundle(){
    // Parse every ini, extract windows with position data.
    STATE.windows = [];
    // Detect which resolution blocks the file actually contains. If the chosen
    // Source resolution has no matching XPos<res> anywhere, fall back to the
    // dominant resolution that IS present so we don't report "0 windows" for a
    // file that's simply saved at a different resolution than the dropdown.
    var resCounts = _detectResolutions(STATE.bundle);
    var srcSuffix = STATE.srcW + 'x' + STATE.srcH;
    var autoSwitched = false;
    if (!resCounts[srcSuffix]) {
      var dom = null, domN = 0;
      for (var rk in resCounts) { if (resCounts[rk] > domN) { domN = resCounts[rk]; dom = rk; } }
      if (dom) {
        var dp = dom.split('x');
        STATE.srcW = parseInt(dp[0], 10); STATE.srcH = parseInt(dp[1], 10);
        srcSuffix = dom; autoSwitched = true;
        document.getElementById('srcW').value = STATE.srcW;
        document.getElementById('srcH').value = STATE.srcH;
        _syncPresetFromInputs('src');
      }
    }
    STATE.srcSuffix = srcSuffix;
    var fxX = STATE.tgtW / STATE.srcW;
    var fxY = STATE.tgtH / STATE.srcH;
    var seq = 0;
    var fnames = Object.keys(STATE.bundle).filter(function(k){ return k.indexOf('__parsed') < 0; });
    for (var fi = 0; fi < fnames.length; fi++) {
      var fname = fnames[fi];
      var parsed = parseIni(STATE.bundle[fname]);
      STATE.bundle[fname + '__parsed'] = parsed;
      var chatMeta = _buildChatMeta(parsed);   // per-file chat-window routing
      for (var i = 0; i < parsed.sections.length; i++) {
        var s = parsed.sections[i];
        var pos = _readPos(s.props, srcSuffix);
        if (pos.x == null || pos.y == null) continue;
        var x = parseInt(pos.x, 10), y = parseInt(pos.y, 10);
        if (isNaN(x) || isNaN(y)) continue;
        // Dimensions: bare Width/Height (real Quarm key), then legacy Size.cx/cy.
        // Windows with no size entry use EQ's default size — we DON'T fabricate
        // a Width/Height for them on save (could pin an auto-sizing window).
        var rawW = s.props.Width  != null ? s.props.Width  : s.props['Size.cx'];
        var rawH = s.props.Height != null ? s.props.Height : s.props['Size.cy'];
        var hasWH = (rawW != null && rawH != null);
        var w = hasWH ? parseInt(rawW, 10) : 200;
        var h = hasWH ? parseInt(rawH, 10) : 100;
        if (isNaN(w)) { w = 200; hasWH = false; }
        if (isNaN(h)) { h = 100; hasWH = false; }
        // Rescale to target resolution.
        x = Math.round(x * fxX);
        y = Math.round(y * fxY);
        w = Math.round(w * fxX);
        h = Math.round(h * fxY);
        // Classify the window type + extract contents-of-interest for the
        // side panel. Most windows are self-describing by section name;
        // chat windows are the interesting one — they carry tab + channel
        // metadata that the user wants visible without poking through INIs.
        var classify = classifyWindow(s);
        var cIdx     = (classify.kind === 'chat') ? _chatIndexOf(s.name) : null;
        var cMeta    = (cIdx != null) ? (chatMeta[cIdx] || { index: cIdx }) : null;
        // XML max-size cap. The skin XML defines each window's design size; we
        // clamp the visual w/h to that (rescaled to the target resolution
        // proportionally — XML sizes are at the design resolution, typically
        // 1024×768 or 1920×1080 depending on the skin). When the INI has no
        // size we ALSO fall back to the XML size so the window still renders.
        var xmlMax = (STATE.xmlSizes || {})[s.name] || null;
        if (xmlMax) {
          // Scale the XML size with the same fx factors used elsewhere so it
          // reads correctly in the target resolution canvas.
          var xCx = Math.round(xmlMax.cx * fxX);
          var xCy = Math.round(xmlMax.cy * fxY);
          // Apply as a cap. If INI w/h reads bigger than the XML allows, the
          // INI was wrong (or saved at a different scale) — clamp down so the
          // visual matches what EQ will actually show.
          if (xCx > 0 && w > xCx) w = xCx;
          if (xCy > 0 && h > xCy) h = xCy;
          // If hasWH was false (no size in INI), use XML as the actual size.
          if (!hasWH && xCx > 0 && xCy > 0) { w = xCx; h = xCy; }
        }
        STATE.windows.push({
          id:     'w' + (seq++),
          file:   fname,
          section: s.name,
          label:  classify.icon + ' ' + classify.label,
          kind:    classify.kind,
          category: _categoryOf(s.name, chatMeta),
          contents: classify.contents,
          props:    s.props,
          hasWH:    hasWH,
          srcSuffix: pos.used,
          chatMeta: cMeta,
          xmlMax:   xmlMax,    // { cx, cy, file } at the skin's design resolution
          x: x, y: y, w: w, h: h,
          origX: x, origY: y, origW: w, origH: h,
        });
      }
    }
    STATE.autoSwitched = autoSwitched;
    if (STATE.windows.length === 0) {
      // Window-position data lives in EQ's UI_<char>_pq.proj.ini. Quarm has no
      // /saveui command — the client writes this file automatically when you
      // /camp, /quit, or zone. So "0 windows" means either the file isn't
      // there yet (brand-new character who hasn't camped) or it exists but we
      // couldn't parse a position out of it (send us the file so we can fix it).
      var hadUiFile = false;
      try {
        hadUiFile = Object.keys(STATE.bundle || {}).some(function(k){
          return /^UI_/i.test(k) && k.indexOf('__parsed') < 0;
        });
      } catch (e) {}
      setStatus(
        hadUiFile
          ? 'Found UI_' + STATE.character + '_pq.proj.ini but read 0 window positions. ' +
            'If this looks wrong, use ☁ Backup to send it to us so we can fix the parser. (Hotbar Pages still works.)'
          : 'No saved layout for ' + STATE.character + ' yet. Quarm writes UI_' + STATE.character +
            '_pq.proj.ini automatically when you /camp, /quit, or zone — do that once, then Load again. ' +
            '(There is no /saveui on Quarm. Hotbar Pages still works without it.)',
        'err'
      );
    } else {
      var msg;
      if (STATE.fromCloud) {
        msg = '☁ restored ' + STATE.windows.length + ' windows from cloud backup · set Target to ' +
          'this machine\'s resolution, then Save to write ' + STATE.tgtW + '×' + STATE.tgtH + ' to ' + STATE.character + '\'s EQ folder';
      } else {
        msg = 'loaded ' + STATE.windows.length + ' windows · ' +
          STATE.srcW + '×' + STATE.srcH + ' → ' + STATE.tgtW + '×' + STATE.tgtH +
          ' · Save writes a ' + STATE.tgtW + '×' + STATE.tgtH + ' block (keeps your original)';
        if (STATE.autoSwitched) {
          msg = 'file is saved at ' + STATE.srcW + '×' + STATE.srcH + ' — ' + msg;
        }
      }
      setStatus(msg, 'ok');
    }
    buildFilterPanel();
    renderStage();
    maybePromptPvpSet().catch(function(){});
    _showDeferBanner().catch(function(){});   // reflect any background pending save for this char
  }

  // ── Category filter ──────────────────────────────────────────────────────
  // 130 windows at once is unreadable, so we bucket each into a broad group and
  // let the user toggle groups on/off on the left. First-match-wins order, so
  // e.g. ZealMap groups under Zeal (not Map) and BagBank under Bags. Defaults
  // hide the high-count clutter (the ~50 bag windows + transient popups) and
  // show the persistent HUD + chat. `on` is the default-visible flag.
  var FILTER_CATEGORIES = [
    { key:'zeal',    label:'🐺 Zeal',          on:true,  test:function(n){ return /^zeal/i.test(n); } },
    { key:'chat',    label:'💬 Chat',          on:true,  test:function(n){ return /chat/i.test(n); } },
    // Per-sender Tell windows — assigned via ChatManager (DefaultChannel 3),
    // NOT by name (they're named "Chat 11" etc. like real chats). test:false
    // so the name-matcher never grabs them; _categoryOf routes them here.
    // Default OFF — these are the big chat-window clutter the user doesn't
    // arrange (one per person who's ever /tell'd them).
    { key:'tells',   label:'🗨 Tell windows',  on:false, test:function(){ return false; } },
    { key:'group',   label:'👥 Group',         on:true,  test:function(n){ return /^group/i.test(n); } },
    { key:'raid',    label:'⚔️ Raid',          on:true,  test:function(n){ return /^raid/i.test(n); } },
    { key:'player',  label:'❤️ Player / Pet',  on:true,  test:function(n){ return /^player|^pet/i.test(n); } },
    { key:'target',  label:'🎯 Target',        on:true,  test:function(n){ return /target/i.test(n); } },
    { key:'hotbars', label:'🔥 Hotbar / Cast', on:true,  test:function(n){ return /hotbutton|hotbar|^actions|castspell|gemsgame|spellgem|casting/i.test(n); } },
    { key:'buffs',   label:'✨ Buffs / Songs',  on:true,  test:function(n){ return /buff|song|melody|shortduration/i.test(n); } },
    { key:'nav',     label:'🧭 Map / Compass',  on:true,  test:function(n){ return /map|compass|tracking/i.test(n); } },
    { key:'spells',  label:'📖 Spells / Skills',on:false, test:function(n){ return /spellbook|^skills|aawindow/i.test(n); } },
    { key:'bags',    label:'🎒 Bags / Inv',    on:false, test:function(n){ return /^bag|inventory|^bank/i.test(n); } },
    { key:'vendor',  label:'💰 Vendor / Trade', on:false, test:function(n){ return /merchant|bazaar|^trade|^give|loot/i.test(n); } },
    { key:'other',   label:'▢ Other',          on:false, test:function(){ return true; } },   // fallback (must be last)
  ];
  function _categoryMeta(key) {
    for (var i = 0; i < FILTER_CATEGORIES.length; i++) if (FILTER_CATEGORIES[i].key === key) return FILTER_CATEGORIES[i];
    return FILTER_CATEGORIES[FILTER_CATEGORIES.length - 1];
  }
  // Build a chat-window index → { defaultChannel } map from a parsed ini's
  // [ChatManager] section. EQ stores per-window routing as flat keys:
  //   ChatWindow<N>_DefaultChannel = <int>   (3 = tell → per-sender tell window)
  //   ChatWindow<N>_Name           = <label>
  // Position sections map by ordinal: MainChat = window 0, "Chat <N>" = N.
  function _buildChatMeta(parsed) {
    var meta = {};
    for (var i = 0; i < parsed.sections.length; i++) {
      if (parsed.sections[i].name !== 'ChatManager') continue;
      var props = parsed.sections[i].props || {};
      for (var key in props) {
        var m = key.match(/^ChatWindow(\d+)_(DefaultChannel|Name|ChatChannel)$/i);
        if (m) {
          var idx = parseInt(m[1], 10);
          if (!meta[idx]) meta[idx] = { index: idx };
          if (/Name$/i.test(m[2])) meta[idx].name = String(props[key]);
          else if (/DefaultChannel$/i.test(m[2])) meta[idx].defaultChannel = parseInt(props[key], 10);
          else if (/ChatChannel$/i.test(m[2])) meta[idx].chatChannel = parseInt(props[key], 10);
        }
        // ChannelMap<filter> = <windowIndex> → which filters route to a window.
        var mk = key.match(/^ChannelMap(\d+)$/);
        if (mk) {
          var win = parseInt(props[key], 10);
          if (!meta[win]) meta[win] = { index: win };
          if (!meta[win].filters) meta[win].filters = [];
          meta[win].filters.push(parseInt(mk[1], 10));
        }
      }
    }
    return meta;
  }
  // Index for a position-section name → ChatManager window index. MainChat = 0;
  // "Chat <N>" = N. Returns null for non-chat sections.
  function _chatIndexOf(sectionName) {
    var n = String(sectionName || '');
    if (/^mainchat$/i.test(n)) return 0;
    var m = n.match(/^chat\s*(\d+)$/i);
    return m ? parseInt(m[1], 10) : null;
  }
  function _categoryOf(section, chatMeta) {
    var n = String(section || '');
    // Chat windows split into real chat vs per-sender Tell windows via the
    // ChatManager routing. Position sections: MainChat = window 0, "Chat <N>"
    // = window N. DefaultChannel 3 = tell → Tell window.
    var idx = null;
    if (/^mainchat$/i.test(n)) idx = 0;
    else { var cm = n.match(/^chat\s*(\d+)$/i); if (cm) idx = parseInt(cm[1], 10); }
    if (idx != null || /^chatwindow$/i.test(n)) {
      var info = (chatMeta && idx != null) ? chatMeta[idx] : null;
      return (info && info.defaultChannel === 3) ? 'tells' : 'chat';
    }
    for (var i = 0; i < FILTER_CATEGORIES.length; i++) {
      if (FILTER_CATEGORIES[i].key === 'chat' || FILTER_CATEGORIES[i].key === 'tells') continue;
      if (FILTER_CATEGORIES[i].test(n)) return FILTER_CATEGORIES[i].key;
    }
    return 'other';
  }
  function _catVisible(key) {
    if (STATE.catVisible && key in STATE.catVisible) return STATE.catVisible[key];
    return _categoryMeta(key).on;   // default before the panel is built
  }
  function buildFilterPanel() {
    // Count windows per category from the loaded set.
    var counts = {};
    for (var i = 0; i < STATE.windows.length; i++) {
      var c = STATE.windows[i].category || 'other';
      counts[c] = (counts[c] || 0) + 1;
    }
    // Seed visibility from defaults on first build; preserve user choices after.
    if (!STATE.catVisible) {
      STATE.catVisible = {};
      for (var j = 0; j < FILTER_CATEGORIES.length; j++) STATE.catVisible[FILTER_CATEGORIES[j].key] = FILTER_CATEGORIES[j].on;
    }
    var html = '';
    for (var k = 0; k < FILTER_CATEGORIES.length; k++) {
      var cat = FILTER_CATEGORIES[k];
      var n = counts[cat.key] || 0;
      var checked = STATE.catVisible[cat.key] ? ' checked' : '';
      var emptyCls = n === 0 ? ' class="empty"' : '';
      html += '<label' + emptyCls + '><input type="checkbox" data-cat="' + cat.key + '"' + checked + (n === 0 ? ' disabled' : '') + '>'
            + '<span>' + cat.label + '</span><span class="cnt">' + n + '</span></label>';
    }
    var list = document.getElementById('filterList');
    list.innerHTML = html;
    list.querySelectorAll('input[data-cat]').forEach(function(cb){
      cb.addEventListener('change', function(){
        STATE.catVisible[this.dataset.cat] = this.checked;
        if (STATE.selected >= 0 && STATE.windows[STATE.selected] &&
            !_catVisible(STATE.windows[STATE.selected].category)) STATE.selected = -1;
        renderStage();
      });
    });
  }
  function _setAllFilters(on) {
    if (!STATE.catVisible) STATE.catVisible = {};
    for (var i = 0; i < FILTER_CATEGORIES.length; i++) STATE.catVisible[FILTER_CATEGORIES[i].key] = on;
    document.querySelectorAll('#filterList input[data-cat]').forEach(function(cb){ if (!cb.disabled) cb.checked = on; });
    if (!on) STATE.selected = -1;
    renderStage();
  }
  document.getElementById('filterAll').addEventListener('click', function(){ _setAllFilters(true); });
  document.getElementById('filterNone').addEventListener('click', function(){ _setAllFilters(false); });

  // After a character loads, look up their live class via the agent's
  // /api/state and ask Mimic if any bundled PvP-set template matches.
  // First match → render the promo bar at the top of the editor. Silent
  // when no template matches the class (or the agent has no class data
  // yet because EQ isn't running).
  async function maybePromptPvpSet(){
    var klass = null;
    try {
      var r = await fetch('http://127.0.0.1:7779/api/state', { cache: 'no-store' });
      var s = await r.json();
      var clients = Array.isArray(s.zealClients) ? s.zealClients : [];
      for (var i = 0; i < clients.length; i++) {
        if (clients[i] && String(clients[i].character).toLowerCase() === STATE.character.toLowerCase()) {
          klass = clients[i].class || null;
          break;
        }
      }
      // Fallback: bardMelody output now also carries the class.
      if (!klass && s.bardMelody) {
        for (var k in s.bardMelody) {
          if (k.toLowerCase() === STATE.character.toLowerCase()) {
            klass = s.bardMelody[k].characterClass; break;
          }
        }
      }
    } catch (e) {}
    if (!klass) {
      hidePvpPrompt();
      return;
    }
    var sets = await window.mimic.uiStudioListPvpSets(klass).catch(function(){ return []; });
    if (!sets || sets.length === 0) {
      hidePvpPrompt();
      return;
    }
    showPvpPrompt(sets[0], klass);
  }

  // ── Stage rendering ──────────────────────────────────────────────────────
  function renderStage(){
    // Compute canvas size to fit the stageWrap area while preserving aspect.
    var maxW = stageWrap.clientWidth  - 28;
    var maxH = stageWrap.clientHeight - 28;
    var rx = maxW / STATE.tgtW, ry = maxH / STATE.tgtH;
    STATE.sliceScale = Math.min(rx, ry, 1);
    var cw = Math.round(STATE.tgtW * STATE.sliceScale);
    var ch = Math.round(STATE.tgtH * STATE.sliceScale);
    stage.style.width  = cw + 'px';
    stage.style.height = ch + 'px';
    var html = '';
    var shown = 0;
    for (var i = 0; i < STATE.windows.length; i++) {
      var w = STATE.windows[i];
      // Category filter — hidden groups are skipped on the canvas (Save still
      // writes them; this is view-only).
      if (!_catVisible(w.category)) continue;
      shown++;
      var sx = Math.round(w.x * STATE.sliceScale);
      var sy = Math.round(w.y * STATE.sliceScale);
      var sw = Math.max(8, Math.round(w.w * STATE.sliceScale));
      var sh = Math.max(8, Math.round(w.h * STATE.sliceScale));
      var sel = (STATE.selected === i) ? ' selected' : '';
      var kindCls = w.kind ? ' kind-' + w.kind : '';
      // Chat windows get a richer label: "WindowName (Chat #) · default ch X"
      // — the ChatManager-supplied name (when present) reads more naturally
      // than the position-section name ("Chat12" → "F THIS CHAT (Chat 12)").
      var lbl = w.label;
      if (w.kind === 'chat' && w.chatMeta) {
        var disp = w.chatMeta.name && w.chatMeta.name !== w.label ? w.chatMeta.name : w.label;
        var idx  = w.chatMeta.index;
        lbl = disp + (idx != null ? ' (Chat ' + idx + ')' : '');
      }
      html += '<div class="win' + sel + kindCls + '" data-i="' + i + '" '
            + 'style="left:' + sx + 'px;top:' + sy + 'px;width:' + sw + 'px;height:' + sh + 'px;">'
            + '<span class="lbl">' + escapeHtml(lbl) + '</span>'
            + '<span class="sz">' + w.w + '×' + w.h + '</span>'
            + (STATE.selected === i ? '<div class="grip se" data-grip="se"></div>' : '')
            + '</div>';
    }
    stage.innerHTML = html;
    updateSidePanel();
  }
  window.addEventListener('resize', function(){ if (STATE.windows.length) renderStage(); });

  function escapeHtml(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }

  // ── Drag + resize ────────────────────────────────────────────────────────
  var DRAG = null;   // { i, mode, startX, startY, origX, origY, origW, origH }

  stage.addEventListener('mousedown', function(e){
    var el = e.target.closest('.win');
    if (!el) { STATE.selected = -1; renderStage(); return; }
    var i = parseInt(el.dataset.i, 10);
    STATE.selected = i;
    var grip = e.target.dataset.grip;
    var mode = grip ? 'resize-' + grip : 'move';
    DRAG = {
      i: i, mode: mode,
      startMx: e.clientX, startMy: e.clientY,
      origX: STATE.windows[i].x, origY: STATE.windows[i].y,
      origW: STATE.windows[i].w, origH: STATE.windows[i].h,
    };
    renderStage();
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e){
    if (!DRAG) return;
    var dx = (e.clientX - DRAG.startMx) / STATE.sliceScale;
    var dy = (e.clientY - DRAG.startMy) / STATE.sliceScale;
    var w = STATE.windows[DRAG.i];
    if (DRAG.mode === 'move') {
      w.x = Math.round(DRAG.origX + dx);
      w.y = Math.round(DRAG.origY + dy);
    } else if (DRAG.mode === 'resize-se') {
      w.w = Math.max(16, Math.round(DRAG.origW + dx));
      w.h = Math.max(16, Math.round(DRAG.origH + dy));
    }
    // Snap-to-edges of other windows + screen edges (10px tolerance in
    // world coords). Only on move, not resize.
    if (STATE.snapOn && DRAG.mode === 'move') applySnap(w);
    // Clamp to screen bounds.
    if (w.x < 0) w.x = 0;
    if (w.y < 0) w.y = 0;
    if (w.x + w.w > STATE.tgtW) w.x = STATE.tgtW - w.w;
    if (w.y + w.h > STATE.tgtH) w.y = STATE.tgtH - w.h;
    renderStage();
  });

  document.addEventListener('mouseup', function(){ DRAG = null; });

  function applySnap(target) {
    var TOL = 10;  // world-pixel tolerance
    // Screen edges
    var edges = { x: [0, STATE.tgtW], y: [0, STATE.tgtH] };
    for (var i = 0; i < STATE.windows.length; i++) {
      if (i === DRAG.i) continue;
      var o = STATE.windows[i];
      edges.x.push(o.x, o.x + o.w);
      edges.y.push(o.y, o.y + o.h);
    }
    // Snap left edge and right edge to any candidate X.
    var bestL = TOL + 1, bestLval = null;
    var bestR = TOL + 1, bestRval = null;
    for (var k = 0; k < edges.x.length; k++) {
      var ex = edges.x[k];
      if (Math.abs(target.x - ex)               < bestL) { bestL = Math.abs(target.x - ex);               bestLval = ex; }
      if (Math.abs(target.x + target.w - ex)    < bestR) { bestR = Math.abs(target.x + target.w - ex);    bestRval = ex; }
    }
    if (bestL <= TOL) target.x = bestLval;
    else if (bestR <= TOL) target.x = bestRval - target.w;
    var bestT = TOL + 1, bestTval = null;
    var bestB = TOL + 1, bestBval = null;
    for (var k2 = 0; k2 < edges.y.length; k2++) {
      var ey = edges.y[k2];
      if (Math.abs(target.y - ey)               < bestT) { bestT = Math.abs(target.y - ey);               bestTval = ey; }
      if (Math.abs(target.y + target.h - ey)    < bestB) { bestB = Math.abs(target.y + target.h - ey);    bestBval = ey; }
    }
    if (bestT <= TOL) target.y = bestTval;
    else if (bestB <= TOL) target.y = bestBval - target.h;
  }

  // ── Side panel ───────────────────────────────────────────────────────────
  function updateSidePanel(){
    if (STATE.selected < 0) { side.className = ''; stageWrap.className = ''; return; }
    var w = STATE.windows[STATE.selected];
    side.className = 'on'; stageWrap.className = 'has-side';
    document.getElementById('sideTitle').textContent = w.label;
    document.getElementById('fX').value = w.x;
    document.getElementById('fY').value = w.y;
    document.getElementById('fW').value = w.w;
    document.getElementById('fH').value = w.h;
    var meta = 'File: <b>' + escapeHtml(w.file) + '</b>'
             + '<br>Section: <b>' + escapeHtml(w.section) + '</b>'
             + '<br>Read from: <b>' + escapeHtml(w.srcSuffix ? w.srcSuffix + ' block' : 'bare XPos/YPos') + '</b>'
             + (w.hasWH ? '' : '<br><span style="color:#8b949e">auto-size (no Width/Height written)</span>')
             + '<br>Original: ' + w.origX + ',' + w.origY + ' ' + w.origW + '×' + w.origH;
    if (w.contents && w.contents.length > 0) {
      meta += '<hr style="border:none;border-top:1px solid #30363d;margin:8px 0">'
            + '<div style="color:#7ee7c7;font-size:11px;margin-bottom:4px">Contains</div>';
      for (var ci = 0; ci < w.contents.length; ci++) {
        var c = w.contents[ci];
        meta += '<div style="margin-bottom:3px"><span style="color:#8b949e">' + escapeHtml(c.label) + ':</span> '
              + '<span style="color:#e6edf3;word-break:break-all">' + escapeHtml(c.value) + '</span></div>';
      }
    }
    document.getElementById('sideMeta').innerHTML = meta;
  }
  ['fX','fY','fW','fH'].forEach(function(id){
    document.getElementById(id).addEventListener('input', function(){
      if (STATE.selected < 0) return;
      var w = STATE.windows[STATE.selected];
      var v = parseInt(this.value, 10) || 0;
      if (id === 'fX') w.x = v; else if (id === 'fY') w.y = v;
      else if (id === 'fW') w.w = v; else if (id === 'fH') w.h = v;
      renderStage();
    });
  });

  // ── Toolbar actions ──────────────────────────────────────────────────────
  document.getElementById('snapBtn').addEventListener('click', function(){
    STATE.snapOn = !STATE.snapOn;
    this.textContent = 'Snap: ' + (STATE.snapOn ? 'ON' : 'OFF');
  });
  document.getElementById('resetBtn').addEventListener('click', function(){
    for (var i = 0; i < STATE.windows.length; i++) {
      var w = STATE.windows[i];
      w.x = w.origX; w.y = w.origY; w.w = w.origW; w.h = w.origH;
    }
    renderStage();
    setStatus('reset to last load', 'ok');
  });
  // Build the { filename → new text } bundle for the current edits, writing
  // into the TARGET resolution's suffix block (XPos<W>x<H>); emitIni inserts
  // the block if absent, leaving other-resolution blocks intact.
  function _buildSaveBundle(){
    var tgtSuffix = STATE.tgtW + 'x' + STATE.tgtH;
    var edits = {};
    for (var i = 0; i < STATE.windows.length; i++) {
      var w = STATE.windows[i];
      if (!edits[w.file]) edits[w.file] = {};
      var e = {};
      e['XPos' + tgtSuffix] = w.x;
      e['YPos' + tgtSuffix] = w.y;
      if (w.hasWH) { e.Width = w.w; e.Height = w.h; }   // never fabricate a size
      edits[w.file][w.section] = e;
    }
    var newBundle = {};
    for (var fname in edits) {
      var parsed = STATE.bundle[fname + '__parsed'];
      if (!parsed) continue;
      newBundle[fname] = emitIni(parsed, edits[fname]);
    }
    return { newBundle: newBundle, tgtSuffix: tgtSuffix };
  }

  // Is this character currently logged in? We ask the agent's Zeal state — a
  // character with a live Zeal pipe is in-game right now.
  async function _isCharActiveInZeal(charLower){
    try {
      var r = await fetch('http://127.0.0.1:7779/api/state', { cache: 'no-store' });
      var s = await r.json();
      var clients = Array.isArray(s.zealClients) ? s.zealClients : [];
      return clients.some(function(c){ return c && String(c.character).toLowerCase() === charLower; });
    } catch (e) { return null; }   // null = unknown (agent not reachable)
  }

  async function _writeBundle(newBundle, tgtSuffix, opts){
    var deferred = opts && opts.deferred;
    var res = await window.mimic.uiStudioWriteBundle(STATE.eqDir, newBundle, deferred ? { backupTag: 'eq' } : null);
    if (!res || !res.ok) { setStatus('save failed: ' + (res && res.error ? res.error : 'unknown'), 'err'); return false; }
    var resWarn = '';
    try {
      var disp = await window.mimic.uiStudioListDisplays();
      if (disp && disp.primary && (disp.primary.w !== STATE.tgtW || disp.primary.h !== STATE.tgtH)) {
        resWarn = ' · ⚠ your monitor is ' + disp.primary.w + '×' + disp.primary.h +
          ' — set Target to that (🖥 Detect) or EQ reads a different block';
      }
    } catch (e2) {}
    if (deferred) {
      setStatus('✅ applied ' + Object.keys(newBundle).length + ' file(s) now that ' + STATE.character +
        ' logged out — EQ\'s last copy backed up as .bak-eq. Log back in to see it.' + resWarn, resWarn ? 'err' : 'ok');
    } else {
      setStatus('saved ' + Object.keys(newBundle).length + ' file(s) · wrote ' + tgtSuffix +
        ' block · log the character in to apply (EQ reads positions at login)' + resWarn, resWarn ? 'err' : 'ok');
    }
    return true;
  }

  // Deferred save: hold the edits and apply them automatically once the
  // character leaves the Zeal pipe (logged out) — at which point EQ has written
  // its final layout and won't clobber ours. The watcher runs in Mimic's
  // BACKGROUND process, so it works even after UI Studio is closed (and across
  // a Mimic restart). The renderer just queues/cancels and reflects status.
  async function _cancelDefer(silent){
    try { await window.mimic.uiStudioCancelDefer({ character: STATE.character, eqDir: STATE.eqDir }); } catch (e) {}
    var b = document.getElementById('deferBanner'); if (b) b.style.display = 'none';
    if (!silent) setStatus('scheduled save cancelled', 'ok');
  }
  async function _queueDefer(newBundle, tgtSuffix){
    var res = await window.mimic.uiStudioDeferSave({
      character: STATE.character, eqDir: STATE.eqDir, bundle: newBundle, tgtSuffix: tgtSuffix,
    }).catch(function(e){ return { ok: false, error: e && e.message }; });
    if (!res || !res.ok) { setStatus('could not schedule: ' + (res && res.error ? res.error : 'unknown'), 'err'); return; }
    _showDeferBanner();
    setStatus('scheduled — applies automatically when ' + STATE.character + ' logs out (you can close UI Studio)', 'ok');
  }
  // Reflect the background queue in the banner: show it if THIS character has a
  // pending save. Polled lightly + after actions so an applied/closed save
  // clears the banner.
  async function _showDeferBanner(){
    var b = document.getElementById('deferBanner'); if (!b) return;
    var list = [];
    try { list = await window.mimic.uiStudioPendingList(); } catch (e) {}
    var mine = (list || []).find(function(e){
      return STATE.character && String(e.character).toLowerCase() === STATE.character.toLowerCase() && e.eqDir === STATE.eqDir;
    });
    if (mine) {
      b.style.display = 'flex';
      b.querySelector('.txt').textContent = '⏳ Scheduled: your layout applies automatically when ' +
        STATE.character + ' logs out of EverQuest. (Background — safe to close UI Studio.)';
    } else {
      b.style.display = 'none';
    }
  }
  setInterval(function(){ _showDeferBanner().catch(function(){}); }, 10000);

  document.getElementById('saveBtn').addEventListener('click', async function(){
    if (!STATE.character || !STATE.eqDir) { setStatus('nothing to save', 'err'); return; }
    var built = _buildSaveBundle();
    // Is the character logged in right now? If so, a plain Save won't apply
    // (EQ keeps the layout in memory, ignores it on a skin reload, and
    // overwrites the file on the next camp/zone/quit). Offer to schedule.
    var active = await _isCharActiveInZeal(STATE.character.toLowerCase());
    if (active) {
      var schedule = window.confirm(
        STATE.character + ' is logged into EverQuest right now.\n\n' +
        'EQ keeps the UI layout in memory while in-game and OVERWRITES this file\n' +
        'when the character camps / zones / quits — so saving now usually won\'t\n' +
        'stick, and a skin reload won\'t re-read it.\n\n' +
        'OK  = schedule it: apply automatically when ' + STATE.character + ' logs out\n' +
        '         (recommended — runs in the background; you can close UI Studio)\n' +
        'Cancel = save right now anyway');
      if (schedule) { _queueDefer(built.newBundle, built.tgtSuffix); return; }
    }
    setStatus('saving…');
    try { await _writeBundle(built.newBundle, built.tgtSuffix, { deferred: false }); }
    catch (e) { setStatus('save failed: ' + e.message, 'err'); }
  });
  document.getElementById('deferCancel').addEventListener('click', function(){ _cancelDefer(false); });

  // ── Capture / Backup / Inspect Socials ───────────────────────────────────
  // Surfaces the existing _readUiBundle + ui-studio-capture cloud-backup
  // flow inside the visual editor (previously only reachable from the
  // dashboard), plus a new local-only "Capture PvP draft" that
  // heuristic-parses Sock_/Socials_ INI into a sharable template JSON.
  document.getElementById('cloudBackupBtn').addEventListener('click', async function(){
    if (!STATE.character || !STATE.eqDir) { setStatus('load a character first', 'err'); return; }
    setStatus('uploading encrypted backup…');
    try {
      var res = await window.mimic.uiStudioCapture({
        character: STATE.character, eqDir: STATE.eqDir,
        label: 'UI Studio · ' + new Date().toLocaleString(),
      });
      if (res && res.ok) setStatus('cloud backup OK · ' + res.file_count + ' file(s) uploaded', 'ok');
      else setStatus('backup failed: ' + (res && res.error ? res.error : 'unknown'), 'err');
    } catch (e) { setStatus('backup failed: ' + e.message, 'err'); }
  });

  // ── Cloud restore — deploy a backup on a new machine ─────────────────────
  // Pulls a snapshot INTO the editor (not straight to disk), so the same
  // rescale-and-save path runs against the cloud bundle. New-machine flow:
  // pick the character (its EQ folder is the write target) → 📥 Restore →
  // pick a backup → 🖥 Detect the new monitor as Target → Save.
  function _selectedCharEqDir(){
    var sel = document.getElementById('charSelect').value;
    if (!sel) return null;
    var parts = sel.split('|');

  async function _doCloudRestore(who, id, snapSrcW, snapSrcH){
    setStatus('downloading backup…');
    var r = await window.mimic.uiStudioGetSnapshot({ character: who.character, id: id })
      .catch(function(e){ return { ok: false, error: e && e.message }; });
    if (!r || !r.ok || !r.files) { setStatus('download failed: ' + (r && r.error ? r.error : 'unknown'), 'err'); return; }
    // Establish editor context from the snapshot + the picked character.
    STATE.character = who.character;
    STATE.eqDir     = who.eqDir;
    STATE.bundle    = r.files;
    // Source resolution: prefer the snapshot's captured display size, then the
    // value already in the Source inputs. _renderLoadedBundle's resolution
    // auto-detect will still correct this to whatever block the INI actually
    // contains, so it's just a starting hint.
    var sW = snapSrcW || r.source_width  || parseInt(document.getElementById('srcW').value, 10) || 2560;
    var sH = snapSrcH || r.source_height || parseInt(document.getElementById('srcH').value, 10) || 1440;
    STATE.srcW = sW; STATE.srcH = sH;
    document.getElementById('srcW').value = sW;
    document.getElementById('srcH').value = sH;
    _syncPresetFromInputs('src');
    // Target stays whatever the user set (they should 🖥 Detect their new monitor).
    STATE.tgtW = parseInt(document.getElementById('tgtW').value, 10) || sW;
    STATE.tgtH = parseInt(document.getElementById('tgtH').value, 10) || sH;
    STATE.fromCloud = true;
    STATE.selected = -1;
    _renderLoadedBundle();
  }

  function openSocialsInspector(res) {

      dlg = document.createElement('div');

      document.body.appendChild(dlg);
      // Resize handle pinned to the left edge — drag to resize between 320px
      // and viewport-200px. cursor:ew-resize; persists to localStorage on
      // release. Persistent across opens since the dialog div is reused.
      var grip = document.createElement('div');
      grip.id = 'uiInspectorResize';

          document.removeEventListener('mouseup', onUp);
