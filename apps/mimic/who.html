<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>who</title>
<style>
  /* /who overlay — the latest /who you ran (Current) + people who were in a
     recent /who this session but aren't anymore (Recently gone). Anonymous rows
     are de-anon'd from our who history (last known class/level/guild + Zek flag).
     All local + instant; reads the agent /api/state. */
  /* --bg-alpha: card-surface alpha, driven by slider via main → preload
     'bg-alpha' IPC. 1.0 = opaque (EQ hidden); text stays bright at every value. */
  :root{ --bg-alpha:0.5; }
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;
    font-family:ui-monospace,Menlo,Consolas,monospace;color:#fff;user-select:none;}
  #wrap{padding:6px 8px;}
  .title{display:flex;align-items:center;gap:8px;
    font-size:12px;color:#7ee7c7;text-shadow:0 1px 2px #000;margin-bottom:4px;}
  .conn{font-size:11px}
  .conn.ok{color:#56d364} .conn.bad{color:#8b949e}
  .sec{margin-bottom:6px}
  .sec-h{font-size:10px;color:#8b949e;letter-spacing:0.5px;margin:3px 0 2px;text-transform:uppercase}
  .sec-h .n{color:#7ee7c7}
  .rowlist{display:flex;flex-direction:column;gap:1px;background:rgb(0 0 0 / var(--bg-alpha));border-radius:5px;padding:4px 6px}
  /* "recently gone" rolls down to ~70% of the main surface alpha so the section reads as faded. */
  .gone .rowlist{background:rgb(0 0 0 / calc(var(--bg-alpha) * 0.7))}
  .r{display:flex;align-items:baseline;gap:5px;font-size:11px;line-height:1.45;text-shadow:0 1px 2px #000}
  .r .nm{font-weight:bold;color:#e6edf3;flex-shrink:0}
  .r.zek .nm{color:#ff7b72}
  .r .guild{color:#6e9bd6;font-size:10px;flex-shrink:0}
  /* spacer pushes everything after it to the right edge — anon/gm/zek
     flags, then class, then level (rightmost). */
  .r .sp{flex:1;min-width:4px}
  .r .flag{font-size:9px;padding:0 4px;border-radius:3px;flex-shrink:0}
  .r .flag.anon{background:#2d2150;color:#c9a0ff}
  /* Copy-name button on unknown-identity rows — dim until hovered so it
     doesn't clutter the roster; turns green briefly after a copy. */
  .r .copybtn{background:none;border:none;color:#6e7681;cursor:pointer;font-size:11px;
    padding:0 3px;line-height:1;opacity:0.65}
  .r .copybtn:hover{color:#e6edf3;opacity:1}
  .r .copybtn.copied{color:#56d364;opacity:1}
  /* Crowd-sourced class picker — set an anon player's class for the guild. */
  .r .clspick{font-family:inherit;font-size:10px;background:#151b26;color:#e6edf3;
    border:1px solid #30414f;border-radius:3px;padding:0 2px;margin:0 2px 0 4px;
    max-width:118px;cursor:pointer;height:16px;line-height:14px}
  .r .clspick:hover{border-color:#58a6ff}
  .r .flag.gm{background:#3d3416;color:#f0d264}
  .r .flag.zek{background:#3d1d1d;color:#ff7b72}
  /* Class + level columns: dim, right-side. Italic on de-anon'd values
     (sourced from who history, not the live row) so the user can tell. */
  .r .klass{font-size:10px;color:#9aa4ad;flex-shrink:0}
  .r .lvl{font-size:10px;color:#9aa4ad;font-variant-numeric:tabular-nums;flex-shrink:0;min-width:28px;text-align:right}
  .r .klass.deanon,.r .lvl.deanon{font-style:italic;color:#6e7681}
  .r .goneAt{font-size:10px;color:#9aa4ad;flex-shrink:0}
  .gone .r .nm{color:#9aa4ad;font-weight:normal}
  .gone .r{opacity:0.85}
  #empty{color:rgba(255,255,255,0.5);font-size:12px;text-shadow:0 1px 2px #000;padding:3px 0}
  /* drag/lock/setup chrome — same pattern as the other overlays. */
  #drag-controls{display:none;position:fixed;top:4px;left:4px;gap:4px;z-index:60}
  body.unlocked #drag-controls{display:flex}
  body.unlocked{outline:2px solid rgba(126,231,199,0.7);outline-offset:-2px}
  .drag-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    background:rgba(45,166,138,0.92);color:#fff;border:1px solid rgba(255,255,255,0.4);
    border-radius:4px;font-size:13px;line-height:1;cursor:move;user-select:none}
  #lock-btn{cursor:pointer;font-size:11px}
  #setupbar{display:none;position:fixed;top:0;left:0;right:0;align-items:center;gap:8px;
    padding:4px 8px;background:rgba(45,166,138,0.92);color:#fff;font-size:10px;font-weight:600;z-index:50}
  body.setup #setupbar{display:flex}
  body.setup #drag-controls{top:28px}
  body.setup #wrap{margin-top:26px}
  #setupbar input[type=range]{flex:1;cursor:pointer}
  #hide-btn{position:fixed;top:6px;right:6px;z-index:65;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;border-radius:4px;
    background:rgba(14,17,22,0.6);color:#8b949e;border:1px solid rgba(110,118,129,0.3);
    font-size:11px;line-height:1;cursor:pointer;opacity:0.45;transition:opacity .12s}
  #hide-btn:hover{opacity:1;color:#f87171;border-color:#f87171}
  body.setup #hide-btn{top:30px}
  #move-btn{position:fixed;top:6px;left:6px;z-index:65;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;border-radius:4px;
    background:rgba(14,17,22,0.6);color:#8b949e;border:1px solid rgba(110,118,129,0.3);
    font-size:11px;line-height:1;cursor:move;opacity:0.45;transition:opacity .12s}
  #move-btn:hover{opacity:1;color:#2da68a;border-color:#2da68a}
  body.setup #move-btn{top:30px}
</style></head>
<body>
  <button id="move-btn" title="Drag from this icon to move the overlay (top-left corner — same on every overlay)">✥</button>
  <button id="hide-btn" title="Hide the /who overlay (turn back on from the tray → Overlays)">✕</button>
  <div id="drag-controls">
    <div id="move-handle" class="drag-btn" title="Drag to move">✥</div>
    <div id="lock-btn"   class="drag-btn" title="Lock in place">🔒</div>
  </div>
  <div id="setupbar">
    <span>🛠 /who</span>
    <span>opacity</span><input id="opacitySlider" type="range" min="0.15" max="1" step="0.05" value="1" /><span id="opacityVal">100%</span>
    <button id="exitSetupBtn">Done</button>
  </div>
  <div id="wrap">
    <div class="title"><span id="conn" class="conn bad">○</span><span>👁 /who</span></div>
    <div id="body"></div>
    <div id="empty">run <b>/who</b> in game</div>
  </div>
<script>
  let PORT = 7779;
  window.mimic && window.mimic.onAgentPort && window.mimic.onAgentPort(p => { PORT = p; });
  window.mimic && window.mimic.getAgentPort && window.mimic.getAgentPort().then(p => { if (p) PORT = p; });

  if (window.mimic && window.mimic.onOverlayLocked) {
    window.mimic.onOverlayLocked(locked => { document.body.classList.toggle('unlocked', !locked); });
  }
  var lockBtn = document.getElementById('lock-btn');
  if (lockBtn) lockBtn.addEventListener('click', function(){ try { window.mimic.setOverlaysLocked(true); } catch (e) {} });

  var hideBtn = document.getElementById('hide-btn');
  if (hideBtn) {
    hideBtn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    hideBtn.addEventListener('mouseleave', function(){ try { window.mimic.overlayHoverInteractive(false); } catch (e) {} });
    hideBtn.addEventListener('click', function(){ try { window.mimic.hideThisOverlay(); } catch (e) {} });
  }

  var moveHandle = document.getElementById('move-handle');
  var moveBtn    = document.getElementById('move-btn');
  var _dragging = false;
  function _beginDrag(e){
    if (e.button !== 0) return; e.preventDefault(); _dragging = true;
    try { window.mimic.overlayDragStart(); } catch (err) {}
  }
  if (moveHandle) moveHandle.addEventListener('mousedown', _beginDrag);
  if (moveBtn) {
    moveBtn.addEventListener('mouseenter', function(){ try { window.mimic.overlayHoverInteractive(true); } catch (e) {} });
    moveBtn.addEventListener('mouseleave', function(){ if (!_dragging) { try { window.mimic.overlayHoverInteractive(false); } catch (e) {} } });
    moveBtn.addEventListener('mousedown', _beginDrag);
    // Right-click ✥ → shared chrome menu (resize presets + Setup THIS/ALL).
    try { window.mimic.attachOverlayMenu(moveBtn); } catch (e) {}
  }
  document.addEventListener('mouseup', function(){ if (_dragging){ _dragging=false; try{window.mimic.overlayDragEnd();}catch(e){} try{window.mimic.overlayHoverInteractive(false);}catch(e){} } });
  window.addEventListener('blur', function(){ if (_dragging){ _dragging=false; try{window.mimic.overlayDragEnd();}catch(e){} } });

  var _overlayKey = null;
  var _setupScope = null;
  if (window.mimic && window.mimic.onSetupMode) {
    window.mimic.onSetupMode(function(p){ _overlayKey = p && p.overlayKey; if (p && p.scope) _setupScope = p.scope; else if (p && p.active) _setupScope = 'all'; document.body.classList.toggle('setup', !!(p && p.active)); });
  }
  if (window.mimic && window.mimic.onBgAlpha) {
    window.mimic.onBgAlpha(function(v){
      var a = (typeof v === 'number' && v >= 0.15 && v <= 1.0) ? v : 0.5;
      try { document.documentElement.style.setProperty('--bg-alpha', String(a)); } catch (e) {}
    });
  }
  var slider = document.getElementById('opacitySlider'); var oVal = document.getElementById('opacityVal');
  if (slider) slider.addEventListener('input', function(){
    var v = parseFloat(slider.value || '1'); if (oVal) oVal.textContent = Math.round(v*100)+'%';
    if (_overlayKey && window.mimic && window.mimic.setOverlayOpacity) { try { window.mimic.setOverlayOpacity(_overlayKey, v); } catch (e) {} }
  });
  var doneBtn = document.getElementById('exitSetupBtn');
  if (doneBtn) doneBtn.addEventListener("click", function(){ try { document.body.classList.remove("setup"); } catch (e) {} try { if (_setupScope === "this") window.mimic.setSetupModeThis(false); else window.mimic.setSetupMode(false); } catch (e) {} _setupScope = null; });

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }
  function ago(iso){ if(!iso) return ''; var ms = Date.now() - Date.parse(iso); if(!(ms>0)) return ''; var s=Math.floor(ms/1000); if(s<60) return s+'s'; var m=Math.floor(s/60); if(m<60) return m+'m'; return Math.floor(m/60)+'h'; }
  function _requestAutoHeight(){
    if (!(window.mimic && window.mimic.overlayAutoHeight)) return;
    var w = document.getElementById('wrap'); if (!w) return;
    try { window.mimic.overlayAutoHeight(w.scrollHeight + 8); } catch (e) {}
  }

  // Crowd-sourced class picker (Uilnayar 2026-07-14): anyone who KNOWS an anon
  // player's class (inspected their gear, etc.) can set it for the whole guild
  // from the dropdown on that row. The pick POSTs to the agent → who_overrides →
  // propagates via /who-lookup. _pendingClass keeps a just-made pick shown +
  // editable for a grace window so a mis-click can be corrected before the row
  // resolves to the plain class.
  var WHO_CLASSES = ['Warrior','Cleric','Paladin','Ranger','Shadow Knight','Druid','Monk','Bard','Rogue','Shaman','Necromancer','Wizard','Magician','Enchanter','Beastlord'];
  var _pendingClass = {};        // nameLower → { cls, at }
  var CLASS_GRACE_MS = 12000;    // keep the dropdown editable this long after a pick
  function classPickerHtml(name){
    var nk = (name || '').toLowerCase();
    var pend = (_pendingClass[nk] && _pendingClass[nk].cls) || '';
    var opts = '<option value="">— class? —</option>';
    for (var i=0;i<WHO_CLASSES.length;i++){
      var c = WHO_CLASSES[i];
      opts += '<option value="' + esc(c) + '"' + (c===pend ? ' selected' : '') + '>' + esc(c) + '</option>';
    }
    return '<select class="clspick" data-name="' + esc(name) + '" title="Know their class? Set it for the whole guild">' + opts + '</select>';
  }

  function rowHtml(p, gone){
    var zek = !!(p.known && p.known.is_zek);
    var cls = 'r' + (zek ? ' zek' : '');
    // De-anon fallback: when the LIVE row is anon (class/level/guild null),
    // fill in from who history so the right-side columns still render. Mark
    // those values italic so the user can tell live vs known at a glance.
    var liveLvl   = p.level;
    var liveKlass = p.class;
    var liveGuild = p.guild;
    var lvl   = liveLvl   || (p.known && p.known.level) || null;
    var klass = liveKlass || (p.known && p.known.class) || null;
    var guild = liveGuild || (p.known && p.known.guild) || null;
    var lvlIsDeanon   = !liveLvl   && lvl   != null;
    var klassIsDeanon = !liveKlass && klass != null;
    // Show the picker when class is unknown, OR briefly after a pick (grace)
    // so a wrong choice is correctable before the row collapses to the class.
    var nkey = (p.name || '').toLowerCase();
    var recentPick = _pendingClass[nkey] && (Date.now() - _pendingClass[nkey].at) < CLASS_GRACE_MS;
    var showPicker = !!p.name && (!klass || recentPick);
    var parts = ['<span class="nm">' + esc(p.name || '?') + '</span>'];
    if (showPicker) {
      parts.push(classPickerHtml(p.name));
      // Copy-name stays for the Quarm-Discord lookup path.
      parts.push('<button class="copybtn" data-name="' + esc(p.name) + '" title="Copy name — search Quarm Discord for their public posts">⧉</button>');
    }
    if (guild) parts.push('<span class="guild">&lt;' + esc(guild) + '&gt;</span>');
    parts.push('<span class="sp"></span>');
    if (p.anonymous) parts.push('<span class="flag anon">anon</span>');
    if (p.gm)        parts.push('<span class="flag gm">GM</span>');
    if (zek)         parts.push('<span class="flag zek">ZEK</span>');
    if (klass && !showPicker) parts.push('<span class="klass' + (klassIsDeanon ? ' deanon' : '') + '">' + esc(klass) + '</span>');
    if (lvl)   parts.push('<span class="lvl'   + (lvlIsDeanon   ? ' deanon' : '') + '">L' + lvl + '</span>');
    if (gone)  parts.push('<span class="goneAt">· ' + ago(p.observedAt) + ' ago</span>');
    return '<div class="' + cls + '">' + parts.join('') + '</div>';
  }

  var bodyEl = document.getElementById('body');
  var emptyEl = document.getElementById('empty');

  // Copy-name buttons: rows re-render every 500ms, so everything is
  // DELEGATED off bodyEl. The hover-interact handshake is mandatory — a
  // locked overlay is click-through, so without it the click would fall
  // through to EQ (overlay checklist item 3). mouseover/out (which bubble)
  // stand in for mouseenter/leave.
  var _copyFlashUntil = 0;
  bodyEl.addEventListener('mouseover', function(e){
    if (e.target && e.target.classList && e.target.classList.contains('copybtn')) {
      try { window.mimic.overlayHoverInteractive(true); } catch (err) {}
    }
  });
  bodyEl.addEventListener('mouseout', function(e){
    if (e.target && e.target.classList && e.target.classList.contains('copybtn')) {
      try { window.mimic.overlayHoverInteractive(false); } catch (err) {}
    }
  });
  bodyEl.addEventListener('click', function(e){
    var btn = e.target && e.target.classList && e.target.classList.contains('copybtn') ? e.target : null;
    if (!btn) return;
    var name = btn.getAttribute('data-name') || '';
    if (!name) return;
    function flash(){ btn.textContent = '✓'; btn.classList.add('copied'); _copyFlashUntil = Date.now() + 1200; }
    try { navigator.clipboard.writeText(name).then(flash, flash); }
    catch (err) {
      // execCommand fallback for older Electron renderers.
      try {
        var ta = document.createElement('textarea');
        ta.value = name; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        flash();
      } catch (err2) {}
    }
  });

  // Class picker: hover-interact handshake (locked overlay is click-through)
  // + change → POST the pick to the local agent (which forwards to the bot).
  bodyEl.addEventListener('mouseover', function(e){
    if (e.target && e.target.classList && e.target.classList.contains('clspick')) {
      try { window.mimic.overlayHoverInteractive(true); } catch (err) {}
    }
  });
  bodyEl.addEventListener('mouseout', function(e){
    if (e.target && e.target.classList && e.target.classList.contains('clspick')) {
      try { window.mimic.overlayHoverInteractive(false); } catch (err) {}
    }
  });
  bodyEl.addEventListener('change', function(e){
    var sel = e.target && e.target.classList && e.target.classList.contains('clspick') ? e.target : null;
    if (!sel) return;
    var name = sel.getAttribute('data-name') || '';
    var cls  = sel.value || '';
    if (!name || !cls) return;
    _pendingClass[name.toLowerCase()] = { cls: cls, at: Date.now() };   // shown + editable through the grace window
    try {
      fetch('http://127.0.0.1:'+PORT+'/api/who-class', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, class: cls }),
      }).catch(function(){});
    } catch (err) {}
  });

  async function tick(){
    if (Date.now() < _copyFlashUntil) return;   // let the ✓ copied flash survive a beat
    // Don't repaint the list while someone is mid-pick — an innerHTML swap would
    // slam the open dropdown shut (the "let me correct it" window).
    var _ae = document.activeElement;
    if (_ae && _ae.classList && _ae.classList.contains('clspick')) return;
    try {
      const r = await fetch('http://127.0.0.1:'+PORT+'/api/state',{cache:'no-store'});
      const s = await r.json();
      document.getElementById('conn').className = 'conn ok';
      document.getElementById('conn').textContent = '●';
      const w = s.whoSnapshot;
      if (!w || !Array.isArray(w.current) || !w.current.length) { bodyEl.innerHTML = ''; emptyEl.style.display = 'block'; _requestAutoHeight(); return; }
      emptyEl.style.display = 'none';
      var h = '';
      h += '<div class="sec"><div class="sec-h">Current <span class="n">' + w.current.length + '</span> · ' + ago(new Date(w.capturedAt).toISOString()) + ' ago</div><div class="rowlist">';
      for (var i=0;i<w.current.length;i++) h += rowHtml(w.current[i], false);
      h += '</div></div>';
      if (Array.isArray(w.recentGone) && w.recentGone.length) {
        h += '<div class="sec gone"><div class="sec-h">Recently gone <span class="n">' + w.recentGone.length + '</span></div><div class="rowlist">';
        for (var j=0;j<w.recentGone.length;j++) h += rowHtml(w.recentGone[j], true);
        h += '</div></div>';
      }
      if (bodyEl.__wpHtml !== h) {   // byte-stability guard (2026-07-07)
        bodyEl.innerHTML = h;
        bodyEl.__wpHtml = h;
        _requestAutoHeight();
      }
    } catch (e) {
      var c = document.getElementById('conn'); c.className = 'conn bad'; c.textContent = '○';
    }
  }
  tick(); setInterval(tick, 500);
</script>
</body></html>
