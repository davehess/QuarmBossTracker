[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Only rebuild/redeploy the BOT when files the bot actually depends on change.
# Railway's Dockerfile does `COPY . .`, so before this every push to main —
# including web-only (Vercel) and beta-graduation (agent/Mimic) changes —
# rebuilt and bounced the bot (~30-45s down). Mid-raid that stalled agent
# uploads and backed up client queues (Hitya raid-night 2026-07-13).
#
# Gitignore-style, evaluated from repo root. We include EVERYTHING (`**`) then
# subtract the sibling components that deploy elsewhere or aren't bot runtime:
#   web/      → Vercel        apps/     → Mimic (GitHub Actions)
#   packages/ → agent (bundled in Mimic / release-parser.yml)
#   docs/ releases/ experiments/ → non-code
# Negations REQUIRE the preceding `**` include (Railway rule). This errs toward
# deploying: any NEW top-level bot dir is auto-included, so we never silently
# skip a real bot deploy — only the known non-bot trees are excluded.
# (config-as-code watchPatterns OVERRIDE any dashboard Watch Paths setting.)
watchPatterns = [
  "**",
  "!web/**",
  "!apps/**",
  "!packages/**",
  "!docs/**",
  "!releases/**",
  "!experiments/**",
  "!supabase/**",   # migrations apply via the GitHub↔Supabase integration — no bot restart needed
]

[deploy]
startCommand = "node index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# #58 zero-downtime: healthcheck the readiness-gated /health, NOT "/". `/` returns
# 200 the instant the HTTP server binds (before the Discord client connects or
# state loads), so Railway used to cut over to a not-yet-ready container. /health
# returns 503 until _botReady (Discord ready + state loaded) and 503 again once a
# SIGTERM graceful drain begins, so Railway only routes traffic to a container
# that can actually serve it and drains the old one cleanly on the overlap window.
# (Full overlap/zero-downtime also needs the Railway plan's overlap feature; this
# config + the bot's graceful SIGTERM drain is our half.)
healthcheckPath = "/health"
healthcheckTimeout = 120
